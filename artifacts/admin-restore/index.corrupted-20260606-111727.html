<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台管理</title>
    <style>
      :root {
        --navy: #12243d;
        --navy-2: #1b3559;
        --bg: #eef4f9;
        --panel: #ffffff;
        --line: #d9e3ee;
        --text: #1f2d3d;
        --muted: #6b7c90;
        --primary: #246bfe;
        --primary-soft: #e8f0ff;
        --danger: #d92d20;
        --warning: #b7791f;
        --success: #15803d;
        --radius: 8px;
        font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .hidden { display: none !important; }

      .login-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.72), rgba(238,244,249,.9)),
          var(--bg);
      }
      .login-card {
        width: min(420px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 32px;
        box-shadow: 0 20px 50px rgba(18, 36, 61, .12);
      }
      .login-card h1 { margin: 0 0 8px; font-size: 26px; }
      .login-card p { margin: 0 0 28px; color: var(--muted); }
      .field { display: grid; gap: 8px; margin-bottom: 16px; }
      .field label { font-size: 13px; color: #30445f; font-weight: 600; }
      .field input, .field select, .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        background: #fff;
        outline: none;
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-soft);
      }
      .btn {
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 9px 12px;
        background: #f7f9fc;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 36px;
      }
      .btn.primary { background: var(--primary); color: #fff; }
      .btn.danger { color: var(--danger); background: #fff5f5; border-color: #ffd0d0; }
      .btn.ghost { background: transparent; border-color: var(--line); }
      .btn.full { width: 100%; }
      .btn[disabled] { opacity: .58; cursor: not-allowed; }
      .error-text { color: var(--danger); font-size: 13px; min-height: 18px; }
      .toast-message {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 12;
        max-width: min(360px, calc(100vw - 36px));
        padding: 12px 14px;
        border: 1px solid #bde8c8;
        border-radius: 8px;
        background: #f0fff4;
        color: var(--success);
        box-shadow: 0 18px 40px rgba(18, 36, 61, .14);
      }

      .admin-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 236px minmax(0, 1fr);
      }
      .sidebar {
        background: var(--navy);
        color: #dce8f7;
        padding: 18px 14px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .brand {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 10px;
        font-weight: 700;
        color: #fff;
      }
      .brand-mark {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        background: var(--primary);
        display: grid;
        place-items: center;
      }
      .nav { margin-top: 18px; display: grid; gap: 4px; }
      .nav button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #dce8f7;
        text-align: left;
        padding: 11px 12px;
      }
      .nav button.active, .nav button:hover {
        background: var(--navy-2);
        color: #fff;
      }
      .main { min-width: 0; display: grid; grid-template-rows: 60px minmax(0, 1fr); }
      .topbar {
        background: rgba(255,255,255,.88);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        position: sticky;
        top: 0;
        z-index: 3;
      }
      .topbar h2 { margin: 0; font-size: 18px; }
      .account-menu { display: flex; align-items: center; gap: 10px; color: var(--muted); }
      .content { padding: 20px; min-width: 0; }
      .page-grid { min-width: 0; }
      .state-panel {
        min-height: 260px;
        display: grid;
        place-items: center;
        gap: 8px;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        color: var(--muted);
      }
      .state-panel strong { color: var(--text); font-size: 16px; }
      .state-panel[data-state="forbidden"] { border-color: #ffd0d0; background: #fffafa; }

      .grid { display: grid; gap: 14px; }
      .cards { grid-template-columns: repeat(4, minmax(150px, 1fr)); }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px;
      }
      .metric-label { color: var(--muted); font-size: 13px; }
      .metric-value { font-size: 26px; margin-top: 8px; font-weight: 700; }
      .metric-note { margin-top: 8px; color: var(--muted); font-size: 12px; }
      .trend-bars {
        height: 156px;
        display: grid;
        grid-template-columns: repeat(5, minmax(54px, 1fr));
        gap: 10px;
        align-items: end;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbff;
        padding: 12px;
      }
      .trend-bar {
        min-width: 0;
        height: 100%;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 5px;
        align-items: end;
        color: var(--muted);
        font-size: 12px;
      }
      .trend-bar span,
      .trend-bar em {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .trend-bar em {
        color: var(--text);
        font-style: normal;
        font-weight: 700;
      }
      .trend-bar i { justify-self: start; font-style: normal; }
      .trend-bar b {
        display: block;
        width: 100%;
        min-height: 18px;
        border-radius: 6px 6px 3px 3px;
        background: linear-gradient(180deg, #246bfe, #8fb5ff);
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .toolbar .filters { display: flex; gap: 8px; flex-wrap: wrap; }
      .toolbar input, .toolbar select {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        min-height: 36px;
      }
      .table-wrap {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: auto;
        max-width: 100%;
      }
      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
        font-size: 13px;
        table-layout: fixed;
      }
      .table-wrap.compact table { min-width: 760px; font-size: 12px; }
      .table-wrap.dense table { min-width: 900px; font-size: 12px; }
      .table-wrap.models table { min-width: 1040px; }
      .table-wrap.users table { min-width: 980px; }
      .table-wrap.settings table { min-width: 820px; }
      th, td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .table-wrap.compact th,
      .table-wrap.compact td,
      .table-wrap.dense th,
      .table-wrap.dense td { padding: 9px 10px; }
      td .metric-note { overflow-wrap: anywhere; white-space: normal; }
      th { background: #f6f9fd; color: #415672; font-weight: 700; }
      td.actions, th.actions {
        position: sticky;
        right: 0;
        background: #fff;
        box-shadow: -8px 0 12px rgba(18, 36, 61, .05);
        width: 164px;
        min-width: 164px;
        max-width: 164px;
        overflow: visible;
      }
      .table-wrap.compact td.actions,
      .table-wrap.compact th.actions { width: 84px; min-width: 84px; max-width: 84px; }
      .table-wrap.dense td.actions,
      .table-wrap.dense th.actions { width: 132px; min-width: 132px; max-width: 132px; }
      .table-wrap.users td.actions,
      .table-wrap.users th.actions { width: 184px; min-width: 184px; max-width: 184px; }
      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border-radius: 999px;
        padding: 2px 8px;
        background: #eef3f8;
        color: #3c526e;
        font-size: 12px;
      }
      .tag.green { background: #e9f8ef; color: var(--success); }
      .tag.blue { background: var(--primary-soft); color: var(--primary); }
      .tag.warn { background: #fff5df; color: var(--warning); }
      .actions-row { display: flex; gap: 6px; flex-wrap: nowrap; }
      .table-wrap.dense .actions-row { gap: 4px; }
      .icon-btn {
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #fff;
      }
      .table-wrap.users .icon-btn {
        width: 22px;
        height: 28px;
        font-size: 12px;
      }
      .btn:disabled,
      .icon-btn:disabled {
        cursor: not-allowed;
        opacity: .45;
        filter: grayscale(.18);
      }
      .workbench {
        display: grid;
        grid-template-columns: 176px minmax(0, 1fr) minmax(220px, 248px);
        gap: 14px;
        align-items: start;
      }
      .workbench > * { min-width: 0; }
      .workbench-aside { position: sticky; top: 76px; }
      .anchor-list { display: grid; gap: 6px; }
      .anchor-list a {
        color: #405875;
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 6px;
      }
      .anchor-list a.active, .anchor-list a:hover { background: var(--primary-soft); color: var(--primary); }
      .section { display: grid; gap: 14px; }
      .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .inline-check { display: inline-flex; align-items: center; gap: 8px; margin: 0 0 12px; color: #30445f; font-size: 13px; font-weight: 600; }
      .inline-check input { width: 16px; height: 16px; accent-color: var(--primary); }
      .model-wizard-drawer {
        background:
          linear-gradient(180deg, rgba(232,240,255,.7), rgba(255,255,255,0) 240px),
          #fff;
      }
      .model-wizard-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: start;
        margin-bottom: 18px;
      }
      .model-wizard-head h3 { margin: 0 0 6px; font-size: 20px; }
      .model-wizard-head p { margin: 0; color: var(--muted); line-height: 1.7; }
      .model-wizard-steps {
        display: grid;
        grid-template-columns: repeat(5, minmax(100px, 1fr));
        gap: 8px;
        margin: 0 0 18px;
      }
      .wizard-step {
        border: 1px solid #cfe0ff;
        background: rgba(255,255,255,.78);
        border-radius: 8px;
        padding: 10px;
        min-height: 70px;
      }
      .wizard-step strong { display: block; color: var(--primary); margin-bottom: 4px; }
      .wizard-step span { color: #52677f; font-size: 12px; line-height: 1.5; }
      .wizard-section {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: rgba(255,255,255,.88);
        margin-bottom: 14px;
      }
      .wizard-section-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }
      .wizard-section-head h4 { margin: 0 0 4px; font-size: 16px; }
      .wizard-section-head p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.6; }
      .choice-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }
      .template-tools {
        display: grid;
        grid-template-columns: minmax(220px, 1fr);
        gap: 10px;
        margin-bottom: 12px;
      }
      .template-menu {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }
      .template-menu button {
        border: 1px solid #d7e3f5;
        border-radius: 8px;
        background: #fff;
        color: #30445f;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 46px;
        padding: 10px 12px;
        text-align: left;
      }
      .template-menu button strong {
        display: block;
        font-size: 14px;
      }
      .template-menu button span {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }
      .template-menu button.active {
        border-color: var(--primary);
        background: var(--primary-soft);
        color: var(--primary);
        box-shadow: 0 0 0 3px rgba(38, 99, 235, .08);
      }
      .template-menu button.active span { color: var(--primary); }
      .template-tools input,
      .template-tools select {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: #fff;
        color: var(--text);
      }
      .template-tools select.hidden-control {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
      .model-template-scroll {
        max-height: min(420px, 52vh);
        overflow: auto;
        padding: 3px 3px 8px;
        scrollbar-gutter: stable;
      }
      .template-card small {
        color: #5f7288;
        line-height: 1.5;
      }
      .template-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .template-meta b {
        border: 1px solid #d7e3f5;
        border-radius: 999px;
        padding: 2px 7px;
        background: #f7fbff;
        color: #40566d;
        font-size: 11px;
        font-weight: 700;
      }
      .prompt-limit-pill {
        border: 1px solid #d9e3ee;
        border-radius: 7px;
        background: #fbfdff;
        color: #30445f;
        display: grid;
        gap: 2px;
        padding: 7px 8px;
      }
      .prompt-limit-pill strong {
        color: var(--primary);
        font-size: 12px;
      }
      .prompt-limit-pill span {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }
      .capability-card,
      .template-card {
        position: relative;
        display: grid;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
        min-height: 94px;
      }
      .capability-card input,
      .template-card input {
        position: absolute;
        top: 12px;
        right: 12px;
        accent-color: var(--primary);
      }
      .capability-card:has(input:checked),
      .template-card:has(input:checked) {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-soft);
      }
      .choice-title { font-weight: 700; color: var(--text); padding-right: 24px; }
      .choice-copy { color: var(--muted); font-size: 12px; line-height: 1.55; }
      .wizard-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }
      .summary-chip {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbff;
        padding: 10px;
      }
      .summary-chip span { display: block; color: var(--muted); font-size: 12px; }
      .summary-chip strong { display: block; margin-top: 4px; overflow-wrap: anywhere; }
      .price-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .advanced-config {
        border: 1px dashed #b8c7da;
        border-radius: 8px;
        padding: 12px;
        background: #fbfdff;
        margin-bottom: 14px;
      }
      .advanced-config summary {
        cursor: pointer;
        font-weight: 700;
        color: #30445f;
      }
      .advanced-config .metric-note { margin-bottom: 12px; }
      .secret-env-guide strong {
        display: block;
        color: var(--text);
        margin-bottom: 6px;
      }
      .secret-env-guide .json-box {
        min-height: auto;
        margin-top: 10px;
      }
      .wizard-actions {
        position: sticky;
        bottom: -20px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 12px 0 0;
        background: linear-gradient(180deg, rgba(255,255,255,0), #fff 28%);
      }
      .json-box {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0f172a;
        color: #dbeafe;
        padding: 12px;
        min-height: 110px;
        overflow: auto;
        font-family: Consolas, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .check-list { display: grid; gap: 8px; }
      .check-list div { display: flex; justify-content: space-between; gap: 12px; }
      .check-list span:last-child { min-width: 0; text-align: right; overflow-wrap: anywhere; }
      .drawer {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, .32);
        display: grid;
        justify-items: end;
        z-index: 10;
      }
      .drawer-panel {
        width: min(460px, 100%);
        background: #fff;
        min-height: 100vh;
        max-height: 100vh;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 20px;
        box-shadow: -20px 0 50px rgba(15, 23, 42, .18);
      }
      .drawer-panel.model-wizard-drawer {
        width: min(980px, calc(100vw - 96px));
        max-width: 100%;
        overflow-x: hidden;
        box-sizing: border-box;
      }
      .drawer-panel.model-wizard-drawer * { min-width: 0; }
      .model-wizard-drawer .choice-grid {
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      }
      .model-wizard-drawer #model-template-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .model-wizard-drawer .choice-title,
      .model-wizard-drawer .choice-copy,
      .model-wizard-drawer .template-card small,
      .model-wizard-drawer .field span,
      .model-wizard-drawer input,
      .model-wizard-drawer select {
        overflow-wrap: anywhere;
      }
      .drawer-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
      .drawer-head h3 { margin: 0; }
      .prompt-studio {
        display: grid;
        grid-template-columns: 178px minmax(0, 1fr) minmax(320px, .65fr);
        gap: 14px;
        align-items: start;
      }
      .prompt-type-list {
        display: grid;
        gap: 7px;
      }
      .prompt-type-list button {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: #30445f;
        min-height: 42px;
        padding: 9px 10px;
        text-align: left;
      }
      .prompt-type-list button.active {
        border-color: var(--primary);
        background: var(--primary-soft);
        color: var(--primary);
        font-weight: 700;
      }
      .prompt-preview {
        display: grid;
        gap: 10px;
      }
      .prompt-preview textarea {
        min-height: 116px;
        resize: vertical;
      }
      .prompt-compose-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .prompt-compose-grid .field { margin: 0; }
      .prompt-compose-grid select[multiple] { min-height: 84px; }
      .prompt-editor-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 8px 0 12px;
      }
      .prompt-section-title {
        color: #dbeafe;
        font-weight: 700;
      }
      .deerflow-signature {
        position: fixed;
        right: 14px;
        bottom: 10px;
        z-index: 2;
        color: rgba(64, 88, 117, .52);
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 0;
        background: rgba(255,255,255,.72);
        border: 1px solid rgba(217, 227, 238, .8);
        border-radius: 6px;
        padding: 4px 7px;
        backdrop-filter: blur(8px);
      }
      .deerflow-signature:hover,
      .deerflow-signature:focus {
        color: var(--primary);
        border-color: var(--primary-soft);
      }

      @media (max-width: 1100px) {
        .admin-shell { grid-template-columns: 72px minmax(0, 1fr); }
        .brand span, .nav span { display: none; }
        .cards { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
        .workbench { grid-template-columns: minmax(0, 1fr); }
        .workbench-aside { position: static; }
        .anchor-list {
          grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        }
        .form-grid { grid-template-columns: 1fr; }
        .choice-grid,
        .wizard-summary,
        .price-grid,
        .prompt-studio,
        .prompt-compose-grid { grid-template-columns: 1fr; }
        .template-tools { grid-template-columns: 1fr; }
        .model-wizard-steps { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      @media (max-width: 920px) {
        .content > .grid {
          grid-template-columns: minmax(0, 1fr) !important;
        }
        .trend-bars {
          grid-template-columns: repeat(5, minmax(42px, 1fr));
          gap: 6px;
          padding: 10px;
        }
        .topbar {
          min-height: 72px;
          height: auto;
          align-items: flex-start;
          flex-direction: column;

      function routeFromPath() {
        const path = location.pathname;
        if (path.includes("/models/new") || /^\/admin\/models\/[^/]+/.test(path)) return "model-workbench";
        if (path.includes("/models")) return "models";
        if (path.includes("/users")) return "users";
        if (path.includes("/prompts")) return "prompts";
        if (path.includes("/risks") || path.includes("/audit-events")) return "risks";
        if (path.includes("/settings") || path.includes("/admin-accounts")) return "settings";
        if (path.includes("/account")) return "account";
        return "dashboard";
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          credentials: "include",
          headers: { "content-type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw Object.assign(new Error(payload.error?.message || "请求失败"), { payload, status: response.status });
        return payload;
      }

      function hasPermission(permission) {
        const permissions = state.session?.permissions || [];
        return permissions.includes(permission);
      }

      function permissionAttrs(permission) {
        if (hasPermission(permission)) {
          return `data-required-permission="${permission}"`;
        }
        return `data-required-permission="${permission}" disabled aria-disabled="true" title="无权限执行该操作"`;
      }

      function setPageLoading(page, loading) {
        state.loadingPages[page] = Boolean(loading);
      }

      function setPageForbidden(page, error) {
        const code = error?.payload?.error?.code;
        if (code === "admin_forbidden" || error?.status === 403) {
          state.forbiddenPages[page] = error.payload?.error?.message || "无权限访问该页面";
          return true;
        }
        delete state.forbiddenPages[page];
        return false;
      }

      function clearPageForbidden(page) {
        delete state.forbiddenPages[page];
      }

      function renderPageState(page) {
        if (state.loadingPages[page]) {
          return `<section class="state-panel" data-state="loading"><strong>正在加载后台数据</strong><span>${pages[page] || "后台页面"}</span></section>`;
        }
        if (state.forbiddenPages[page]) {
          return `<section class="state-panel" data-state="forbidden"><strong>无权限访问该页面</strong><span>${state.forbiddenPages[page]}</span></section>`;

        return "";
      }

      function setSubmitting(form, submitting, submittingText = "正在提交") {
        form.setAttribute("data-submitting", submitting ? "true" : "false");
        form.querySelectorAll("button").forEach((button) => {
          if (submitting) {
            button.disabled = true;
            button.dataset.originalText = button.dataset.originalText || button.textContent;
            button.textContent = submittingText;
          } else if (button.dataset.originalText) {
            button.disabled = false;
            button.textContent = button.dataset.originalText;
          } else {
            button.disabled = false;
          }
        });
      }

      function showToast(message = "操作成功") {
        const toast = document.getElementById("toast");
        if (!toast) return;
        toast.textContent = message || "操作成功";
        toast.classList.remove("hidden");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.add("hidden"), 2400);
      }

      async function runAdminMutation(form, errorElement, action, successMessage = "操作成功") {
        if (form.dataset.submitting === "true") return;
        errorElement.textContent = "";
        setSubmitting(form, true);
        try {
          const result = await action();
          showToast(successMessage || "操作成功");
          return result;
        } catch (err) {
          errorElement.textContent = err.payload?.error?.message || err.message || "操作失败";
          throw err;
        } finally {
          setSubmitting(form, false);
        }
      }

      function normalizeModelTemplate(template) {
        return {
          ...template,
          providerConfig: template.providerConfig || template.defaultProviderConfig || {},
          pricing: template.pricing || template.defaultPricing || { unit: template.mediaType || "request", baseCredits: 100 },
          promptLimit: normalizePromptLimit(template),
          parameterSchema: template.parameterSchema || {},
          defaultParams: template.defaultParams || {},
          limits: template.limits || {},
          uiConfig: template.uiConfig || {},
          dispatchPolicy: template.dispatchPolicy || template.defaultDispatchPolicy || {
            submitQueueName: template.mediaType === "image" ? "generation-submit-image" : "generation-submit-video",
            pollQueueName: template.invocationMode === "async_polling" ? "generation-poll-video" : null,
            providerRpmLimit: 60,
            providerConcurrentLimit: 5,
            submitConcurrencyLimit: 5,
            pollingIntervalMs: 15000,
            pollingConcurrencyLimit: 20,
          },
        };
      }

      function normalizePromptLimit(template) {
        const limits = template.limits || {};
        const maxLength = Number(template.promptLimit?.maxLength || limits.maxPromptLength || (template.mediaType === "image" ? 4000 : 2000));
        const unit = template.promptLimit?.unit || limits.promptLengthUnit || "characters";
        const sourceName = template.promptLimit?.sourceName || limits.promptLimitSourceName || "平台默认限制";
        const source = template.promptLimit?.source || limits.promptLimitSource || "platform_default";
        const sourceUrl = template.promptLimit?.sourceUrl || limits.promptLimitSourceUrl || "";
        const note = template.promptLimit?.note || limits.promptLimitNote || "";
        return {
          maxLength,
          unit,
          label: template.promptLimit?.label || `${maxLength.toLocaleString("zh-CN")} ${unit === "tokens" ? "tokens" : "字符"}`,
          sourceName,
          source,
          sourceUrl,
          note,
        };
      }

      function dashboardTrendHtml(metrics) {
        const series = [
          { label: "生成", value: Number(metrics.generationCountToday || 0), tone: "blue" },
          { label: "积分", value: Number(metrics.creditsConsumedToday || 0), tone: "green" },
          { label: "订单", value: Number(metrics.paidOrdersToday || 0), tone: "blue" },
          { label: "风险", value: Number(metrics.riskPendingCount || 0), tone: "warn" },
          { label: "失败", value: Number(metrics.failedTaskCount || 0), tone: "warn" },
        ];
        const max = Math.max(...series.map((item) => item.value), 1);
        return `<div class="trend-bars">${series.map((item) => {
          const height = Math.max(18, Math.round((item.value / max) * 100));
          return `<div class="trend-bar"><span>${item.label}</span><em>${item.value.toLocaleString()}</em><i class="tag ${item.tone}">${height}%</i><b style="height:${height}%"></b></div>`;
        }).join("")}</div>`;
      }

          failedItems: checks.filter((check) => !check.ok),
        };

      function isValidProviderEndpoint(endpoint) {
        const value = String(endpoint || "").trim();
        if (!value) return false;
        if (value.startsWith("/")) return !value.startsWith("//") && !/\s/.test(value);
        try {
          const parsed = new URL(value);
          return ["http:", "https:"].includes(parsed.protocol) && Boolean(parsed.hostname);
        } catch {
          return false;
        }
      }

      function filteredStoryboardPromptPackages(packageType = state.storyboardPromptType) {
        const keyword = String(state.storyboardPromptKeyword || "").trim().toLowerCase();
        return (state.storyboardPrompts.packages || [])
          .filter((item) => item.package_type === packageType || item.packageType === packageType)
          .filter((item) => {
            if (!keyword) return true;
            return [item.name, item.code, (item.tags || []).join(" ")].join(" ").toLowerCase().includes(keyword);
          })
          .sort((a, b) => Number(b.sort_order || b.sortOrder || 0) - Number(a.sort_order || a.sortOrder || 0));
      }

      function storyboardPromptPackageById(id) {
        return (state.storyboardPrompts.packages || []).find((item) => String(item.id) === String(id));

      function storyboardPromptTypeLabel(type) {
        return storyboardPromptPackageTypes.find((item) => item.key === type)?.label || type || "-";
      }

      function storyboardPromptTypeOptions(selected, includeSpecial = true) {
        return storyboardPromptPackageTypes
          .filter((item) => includeSpecial || !["template", "preview"].includes(item.key))
          .map((item) => `<option value="${item.key}" ${item.key === selected ? "selected" : ""}>${item.label}</option>`)
          .join("");
      }

      function storyboardPromptSelectField(label, selectionKey, packageType, multiple) {
        const selected = state.storyboardPromptSelection[selectionKey] || (multiple ? [] : "");
        const values = Array.isArray(selected) ? selected.map(String) : [String(selected)];
        const options = filteredStoryboardPromptPackages(packageType)
          .filter((item) => item.status !== "disabled")
          .map((item) => `<option value="${escapeAttribute(item.id)}" ${values.includes(String(item.id)) ? "selected" : ""}>${escapeHtml(item.name)}</option>`)
          .join("");
        const multipleAttr = multiple ? "multiple" : "";
        const changeValue = multiple ? "Array.from(this.selectedOptions).map(option => option.value)" : "this.value";
        return `<label class="field"><span>${label}</span><select ${multipleAttr} onchange="updateStoryboardPromptSelection('${selectionKey}', ${changeValue})">${options}</select></label>`;
      }

      function ensureStoryboardPromptSelection() {
        const firstEnabled = (type) => filteredStoryboardPromptPackages(type).find((item) => item.status !== "disabled")?.id || "";
        const selection = state.storyboardPromptSelection;
        selection.base_prompt = selection.base_prompt || defaultBaseStoryboardPrompt;
        selection.genre_package_id = selection.genre_package_id || firstEnabled("genre");
        selection.output_package_id = selection.output_package_id || firstEnabled("output");
        if (!selection.emotion_package_ids.length) selection.emotion_package_ids = filteredStoryboardPromptPackages("emotion").slice(0, 1).map((item) => item.id);
        if (!selection.camera_package_ids.length) selection.camera_package_ids = filteredStoryboardPromptPackages("camera").slice(0, 2).map((item) => item.id);
        if (!selection.taboo_package_ids.length) selection.taboo_package_ids = filteredStoryboardPromptPackages("taboo").filter((item) => item.is_global_default || item.is_default).slice(0, 2).map((item) => item.id);
      }

      function localStoryboardPromptSections() {
        const selection = state.storyboardPromptSelection;
        const sections = [{ type: "base", title: "基础改编任务", content: selection.base_prompt || defaultBaseStoryboardPrompt }];
        const append = (type, ids) => {
          const list = (Array.isArray(ids) ? ids : [ids]).map(storyboardPromptPackageById).filter(Boolean);
          list.forEach((item) => sections.push({ type, title: `${storyboardPromptTypeLabel(type)}?${item.name}`, content: item.prompt_content || item.promptContent || "" }));
        };
        append("genre", selection.genre_package_id);
        append("emotion", selection.emotion_package_ids);
        append("camera", selection.camera_package_ids);
        append("output", selection.output_package_id);
        append("taboo", selection.taboo_package_ids);
        if (selection.extra_request) sections.push({ type: "extra", title: "用户额外要求", content: selection.extra_request });
        return sections;
      }

      function composeStoryboardPromptLocal() {
        const sections = localStoryboardPromptSections();
        state.storyboardPrompts.sections = sections;
        state.storyboardPrompts.composedPrompt = sections.map((section) => `[${section.title}]\n${section.content}`).join("\n\n");
      }

      function openCreditSetBalanceDrawer(userId) {
        const user = state.users.find((item) => item.userId === userId);
        const currentCredits = Number(user?.availableCredits || 0);
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          <div class="drawer-head"><h3>调整到目标积�?/h3><button class="icon-btn" onclick="closeDrawer()">×</button></div>
          <p style="color:var(--muted);line-height:1.7">�?${user?.displayName || userId} 手动修改可用积分。系统会自动计算差额，并通过添加或扣减接口写�?credit_ledger_entries，不直接改余额缓存��?/p>
          <form id="credit-set-balance-form">
            <div class="check-list" style="margin-bottom:14px;">
              <div><span>当前可用积分</span><span id="credit-current-balance">${currentCredits.toLocaleString()}</span></div>
              <div><span>调整差额</span><span id="credit-balance-delta">-</span></div>
            </div>
            <label class="field"><span>目标可用积分</span><input name="targetBalance" type="number" min="0" step="1" required /></label>
            <label class="field"><span>工单�?/span><input name="workOrderNo" placeholder="例如：CS-20260605-001" required /></label>
            <label class="field"><span>操作原因</span><textarea name="reason" rows="4" required placeholder="例如：财务核账后修正用户可用积分"></textarea></label>
            <div class="error-text" id="credit-set-balance-error"></div>
            <button class="btn primary full" type="submit">确认调整积分</button>
          </form>
        </aside>`;
        const formElement = document.getElementById("credit-set-balance-form");
        const targetInput = formElement.elements.targetBalance;
        const deltaNode = document.getElementById("credit-balance-delta");
        const updateDelta = () => {
          const target = Number(targetInput.value);
          if (!Number.isFinite(target) || targetInput.value === "") {
            deltaNode.textContent = "-";
            return;
          }
          const delta = Math.trunc(target) - currentCredits;
          deltaNode.textContent = `${delta > 0 ? "+" : ""}${delta.toLocaleString()}`;
        };
        targetInput.addEventListener("input", updateDelta);
        formElement.addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const error = document.getElementById("credit-set-balance-error");
          const workOrderNo = requireWorkOrder(form, error);
          if (!workOrderNo) return;
          const targetBalance = Number(form.get("targetBalance"));
          if (!Number.isInteger(targetBalance) || targetBalance < 0) {
            error.textContent = "目标可用积分必须是大于等�?0 的整";
            return;
          }
          const delta = targetBalance - currentCredits;
          if (delta === 0) {
            error.textContent = "目标积分与当前积分一致，无需调整";
            return;
          }
          const direction = delta > 0 ? "grant" : "deduct";
          await runAdminMutation(event.currentTarget, error, async () => {
            await api(`/api/admin/users/${userId}/credits/${direction}`, {
              method: "POST",
              headers: { "idempotency-key": `admin-ui-credit-set-balance-${userId}-${Date.now()}` },
              body: JSON.stringify({
                amount: Math.abs(delta),
                reason: String(form.get("reason") || "").trim(),
                workOrderNo,
              }),
            });
            await loadUsers();
            closeDrawer();
            renderShell();
          }, "积分已调整到目标").catch(() => undefined);
        });
      }

      function parseConfigValue(rawValue, valueType) {
        if (valueType === "string") return rawValue;
        if (valueType === "number") {
          const value = Number(rawValue);
          if (!Number.isFinite(value)) throw new Error("请输入有效数");
          return value;
        }
        if (valueType === "boolean") {
          if (rawValue === "true" || rawValue === "弢��? || rawValue === "1"") return true;
          if (rawValue === "false" || rawValue === "关闭" || rawValue === "0") return false;
          throw new Error("布尔值请输入 true �?false");
        }
        if (valueType === "string_array") {
          const parsed = rawValue.trim().startsWith("[")
            ? JSON.parse(rawValue)
            : rawValue.split(",").map((item) => item.trim()).filter(Boolean);
          if (!Array.isArray(parsed) || parsed.some((item) => typeof item !== "string")) {
            throw new Error("字符串数组请输入 JSON 数组或��号分隔文本");
          }
          return parsed;
        }
        return JSON.parse(rawValue);
      }

      function requireDangerConfirm(form, errorElement, expectedText) {
        const actual = String(form.get("dangerConfirm") || "").trim();
        if (actual !== expectedText) {
          errorElement.textContent = `请先输入二次确认文本?${expectedText}`;
          return false;
        }
        return true;
      }

      function requireWorkOrder(form, errorElement) {
        const workOrderNo = String(form.get("workOrderNo") || "").trim();
        if (!/^[A-Za-z]{2,8}-\d{8}-\d{3,8}$/.test(workOrderNo)) {
          errorElement.textContent = "请填写有效工单号，例�?CS-20260605-001";
          return "";
        }
        return workOrderNo.toUpperCase();
      }

      function cloneJson(value) {
        return JSON.parse(JSON.stringify(value || {}));
      }

      function resolveModelTemplate(model = {}) {
        return modelTemplates.find((template) => template.id === model.templateId)
          || modelTemplates.find((template) => (
            template.providerProtocol === model.providerProtocol
            && template.mediaType === model.mediaType
            && template.invocationMode === model.invocationMode
          ))
          || modelTemplates.find((template) => template.providerProtocol === model.providerProtocol)
          || modelTemplates.find((template) => template.id === "volcengine-seedance-video")
          || modelTemplates[0];
      }

      function capabilityCards(selectedTaskModes = [], template = modelTemplates[0]) {
        const selected = new Set(selectedTaskModes || []);
        const allowed = new Set(template.allowedTaskModes || []);
        return modelCapabilityOptions
          .filter((option) => option.mediaType === template.mediaType || allowed.has(option.taskMode))
          .map((option) => {
            const checked = selected.has(option.taskMode) || (!selected.size && (template.defaultTaskModes || []).includes(option.taskMode));
            return `<label class="capability-card ${checked ? "selected" : "}"">
              <input class="model-task-mode-option" type="checkbox" name="taskMode" value="${escapeAttribute(option.taskMode)}" ${checked ? "checked" : ""} />
              <span class="choice-title">${escapeHtml(option.label)}</span>
              <span class="choice-copy">${escapeHtml(option.helper)}</span>
              <small>${escapeHtml(option.taskMode)}</small>
            </label>`;
          })
          .join("");
      }

      function templateCards(selectedTemplateId, filters = {}) {
        const keyword = String(filters.keyword || "").trim().toLowerCase();
        const mediaType = String(filters.mediaType || "video");
        const templates = modelTemplates.filter((template) => {
          const matchesMedia = template.mediaType === mediaType;
          const searchable = [
            template.id,
            template.name,
            template.providerName,
            template.providerModelHint,
            template.family,
            template.providerProtocol,
          ].join(" ").toLowerCase();
          return matchesMedia && (!keyword || searchable.includes(keyword));
        });
        if (!templates.length) {
          return `<div class="empty-state">没有匹配的模型模板，清空搜索词或切换类型后再试��?/div>`;
        }
        return templates.map((template) => `<label class="template-card ${template.id === selectedTemplateId ? "selected" : "}" data-template-search="${escapeAttribute([template.id, template.name, template.providerName, template.family].join(" "))}"">
          <input type="radio" name="templateId" value="${escapeAttribute(template.id)}" ${template.id === selectedTemplateId ? "checked" : ""} />
          <span class="choice-title">${escapeHtml(template.name)}</span>
          <span class="choice-copy">${escapeHtml(template.providerName)} / ${escapeHtml(template.providerProtocol)}</span>
          <span class="template-meta">
            <b>${template.mediaType === "video" ? "视频" : "图片"}</b>
            <b>${template.invocationMode === "async_polling" ? "异步轮询" : "同步调用"}</b>
            <b>${template.adapterMode === "native" ? "原生适配" : "HTTP 代理"}</b>
          </span>
          ${promptLimitBadge(template)}
          <small>${escapeHtml((template.defaultTaskModes || []).join(" / "))}</small>
        </label>`).join("");
      }

      function promptLimitBadge(template = {}) {
        const limit = template.promptLimit || normalizePromptLimit(template);
        const sourceLabel = limit.source === "official" ? "官方" : limit.source === "provider_proxy" ? "代理文档" : "平台默认";
        return `<span class="prompt-limit-pill">
          <strong>提示词上限：${escapeHtml(limit.label)}</strong>
          <span>${escapeHtml(sourceLabel)} · ${escapeHtml(limit.sourceName || "待供应商确认")}</span>
        </span>`;
      }

      function promptLimitFromDraft(model = {}, template = modelTemplates[0]) {
        const templateLimit = template.promptLimit || normalizePromptLimit(template);
        const promptSchema = model.parameterSchema?.prompt || {};
        const limits = model.limits || {};
        const maxLength = Number(limits.maxPromptLength || promptSchema.maxLength || templateLimit.maxLength || 2000);
        const unit = String(limits.promptLengthUnit || promptSchema.limitUnit || templateLimit.unit || "characters");
        return {
          maxLength: Number.isFinite(maxLength) && maxLength > 0 ? maxLength : 2000,
          unit: unit === "tokens" ? "tokens" : "characters",
        };
      }

      function promptLimitLabel(maxLength, unit) {
        return `${Number(maxLength).toLocaleString("zh-CN")} ${unit === "tokens" ? "Tokens" : "字数"}`;
      }

      function formValue(form, name) {
        if (form instanceof FormData) return form.get(name);
        return form.elements?.[name]?.value;
      }

      function promptLimitFromForm(form) {
        const maxLength = Number(formValue(form, "promptMaxLength") || 0);
        const unit = String(formValue(form, "promptLengthUnit") || "characters") === "tokens" ? "tokens" : "characters";
        if (!Number.isFinite(maxLength) || maxLength <= 0) {
          throw new Error("提示词上限必须大�?0");
        }
        return { maxLength, unit, label: promptLimitLabel(maxLength, unit) };
      }

      function applyPromptLimitToConfig(schema, limits, form) {
        const limit = promptLimitFromForm(form);
        const nextSchema = { ...(schema || {}) };
        nextSchema.prompt = {
          ...(nextSchema.prompt || { label: "提示", type: "string", required: true }),
          maxLength: limit.maxLength,
          limitUnit: limit.unit,
        };
        const nextLimits = {
          ...(limits || {}),
          maxPromptLength: limit.maxLength,
          promptLengthUnit: limit.unit,
          promptLimitLabel: limit.label,
          promptLimitSource: "manual",
          promptLimitSourceName: "运营手动配置",
          promptLimitNote: "后台管理端手动填写的提示词长度限制�",
        };
        return { schema: nextSchema, limits: nextLimits };
      }

      function syncPromptLimitFromForm(form) {
        const schema = parseJsonTextarea(new FormData(form), "parameterSchema");
        const limits = parseJsonTextarea(new FormData(form), "limits");
        const synced = applyPromptLimitToConfig(schema, limits, form);
        form.elements.parameterSchema.value = JSON.stringify(synced.schema, null, 2);
        form.elements.limits.value = JSON.stringify(synced.limits, null, 2);
        refreshParameterSchemaList(synced.schema);
      }

      function refreshModelTemplateGrid(form) {
        const selectedMediaType = document.getElementById("model-template-media-filter").value;
        const rawSelectedTemplateId = String(new FormData(form).get("templateId") || "");
        const rawSelectedTemplate = modelTemplates.find((template) => template.id === rawSelectedTemplateId);
        const selectedTemplateId = rawSelectedTemplate?.mediaType === selectedMediaType
          ? rawSelectedTemplate.id
          : resolveModelTemplate({
          providerProtocol: form.elements.providerProtocol.value,
          mediaType: form.elements.mediaType.value,
          invocationMode: form.elements.invocationMode.value,
        }).id;
        document.getElementById("model-template-grid").innerHTML = templateCards(selectedTemplateId, {
          keyword: document.getElementById("model-template-search").value,
          mediaType: selectedMediaType,
        });
      }

      function templateMediaCounts() {
        return modelTemplates.reduce((counts, template) => {
          if (template.mediaType === "image" || template.mediaType === "video") {
            counts[template.mediaType] = (counts[template.mediaType] || 0) + 1;
          }
          return counts;
        }, { image: 0, video: 0 });
      }

      function updateTemplateMediaTabs() {
        const selectedMedia = document.getElementById("model-template-media-filter")?.value || "video";
        const counts = templateMediaCounts();
        const imageCount = document.getElementById("image-template-count");
        const videoCount = document.getElementById("video-template-count");
        if (imageCount) imageCount.textContent = `${counts.image || 0} 个模板`;
        if (videoCount) videoCount.textContent = `${counts.video || 0} 个模板`;
        document.querySelectorAll(".template-media-tab").forEach((button) => {
          const active = button.dataset.templateMedia === selectedMedia;
          button.classList.toggle("active", active);
          button.setAttribute("aria-selected", active ? "true" : "false");
          button.tabIndex = active ? 0 : -1;
        });
      }

      function setTemplateMediaFilter(form, mediaType) {
        const nextMediaType = mediaType === "image" ? "image" : "video";
        const mediaFilter = document.getElementById("model-template-media-filter");
        mediaFilter.value = nextMediaType;
        const selectedTemplateId = String(new FormData(form).get("templateId") || "");
        const selectedTemplate = modelTemplates.find((template) => template.id === selectedTemplateId);
        if (!selectedTemplate || selectedTemplate.mediaType !== nextMediaType) {
          const firstTemplate = modelTemplates.find((template) => template.mediaType === nextMediaType);
          if (firstTemplate) applyModelTemplateToForm(form, firstTemplate.id);
        }

      function modelWizardSummary(model = {}, template = modelTemplates[0]) {
        const protocol = model.providerProtocol || template.providerProtocol;
        const invocationMode = model.invocationMode || template.invocationMode;
        const mediaType = model.mediaType || template.mediaType;
        const limit = template.promptLimit || normalizePromptLimit(template);
        return [
          ["供应商模", template.name],
          ["协议", protocol],
          ["调用方式", invocationMode === "async_polling" ? "异步轮询" : "同步调用"],
          ["媒体类型", mediaType === "video" ? "视频" : "图片"],
          ["提示词限", `${limit.label} · ${limit.sourceName}`],
        ].map(([label, value]) => `<span class="summary-chip"><strong>${label}</strong>${escapeHtml(value)}</span>`).join("");
      }

      function secretReferenceOptions(selected, template = null, draft = {}) {
        const references = state.settings.secretReferences || [];
        const filtered = references.filter((secret) => secretMatchesModel(secret, template, draft));
        const values = new Set(filtered.map((item) => item.envName).filter(Boolean));
        if (selected) values.add(selected);
        const options = [...values].map((envName) => {
          const secret = references.find((item) => item.envName === envName);
          const label = secret?.secretRef
            ? `${secret.secretRef} · ${secretProviderChannelLabel(secret.providerChannel)} · ${secretScopeText(secret)} (${envName})`
            : envName;
          return `<option value="${escapeAttribute(envName)}" ${envName === selected ? "selected" : ""}>${escapeHtml(label)}</option>`;
        });
        if (!selected && !options.length) {
          options.unshift(`<option value="" selected>请先在系统设置中新增密钥引用</option>`);
        } else if (!selected) {
          options.unshift(`<option value="" selected>请��择密钥引用</option>`);
        }
        return options.join("");
      }

      function secretMatchesModel(secret, template, draft = {}) {
        if (!template) return true;
        const provider = String(template.providerName || draft.providerName || "").toLowerCase();
        const mediaType = String(template.mediaType || draft.mediaType || "");
        const modelCode = String(draft.modelCode || template.modelCodeHint || template.id || "");
        const providerMatched = !secret.providerName || String(secret.providerName).toLowerCase() === provider;
        const mediaTypes = Array.isArray(secret.mediaTypes) ? secret.mediaTypes : [];
        const mediaMatched = !mediaTypes.length || mediaTypes.includes(mediaType);
        const modelCodes = Array.isArray(secret.modelCodes) ? secret.modelCodes : [];
        const modelMatched = !modelCodes.length || modelCodes.includes(modelCode) || modelCodes.includes(template.id);
        return providerMatched && mediaMatched && modelMatched;
      }

      function secretProviderChannelLabel(channel) {
        return channel === "proxy" ? "中转�? : "官方"";
      }

      function secretProviderChannelOptions(selected) {
        return [
          ["official", "官方密钥"],
          ["proxy", "中转站密"],
        ].map(([value, label]) => `<option value="${value}" ${value === selected ? "selected" : "}>${label}</option>`).join(");
      }

      function secretAuthSchemeOptions(selected) {
        return [
          ["bearer", "Bearer Token"],
          ["raw", "原样 Token"],
          ["none", "不自动加鉴权"],
        ].map(([value, label]) => `<option value="${value}" ${value === selected ? "selected" : "}>${label}</option>`).join(");
      }

      function secretScopeText(secret) {
        const mediaTypes = Array.isArray(secret.mediaTypes) && secret.mediaTypes.length
          ? secret.mediaTypes.map((item) => item === "video" ? "视频" : "图片").join("/")
          : "图片/视频";
        const modelCount = Array.isArray(secret.modelCodes) ? secret.modelCodes.length : 0;
        return modelCount ? `${mediaTypes} · ${modelCount} 个模型` : `${mediaTypes} · 全部模型`;
      }

      function secretScopeLabel(secret) {
        const modelCodes = Array.isArray(secret.modelCodes) ? secret.modelCodes : [];
        const modelText = modelCodes.length
          ? modelCodes.slice(0, 3).join(" / ") + (modelCodes.length > 3 ? ` �?${modelCodes.length} 个` : "")
          : "全部模型";
        return `${escapeHtml(secretScopeText(secret))}<div class="metric-note">${escapeHtml(modelText)}</div>`;
      }

      function secretModelCount(mediaType) {
        return modelTemplates.filter((template) => template.mediaType === mediaType).length;
      }

      function secretModelOptions(mediaType = "image") {
        const allLabel = mediaType === "video" ? "全部视频模型" : "全部图片模型";
        const options = modelTemplates
          .filter((template) => template.mediaType === mediaType)
          .map((template) => {
            const value = template.modelCodeHint || template.id;
            const mediaLabel = template.mediaType === "video" ? "视频" : "图片";
            return `<option value="${escapeAttribute(value)}">${escapeHtml(`${mediaLabel} · ${template.name} · ${value}`)}</option>`;
          })
          .join("");
        return `<option value="">${allLabel}</option>${options}`;
      }

      function setSecretModelPanel(mediaType = "image") {
        const nextMedia = mediaType === "video" ? "video" : "image";
        document.querySelectorAll(".secret-model-tab").forEach((button) => {
          const active = button.dataset.secretMedia === nextMedia;
          button.classList.toggle("active", active);
          button.setAttribute("aria-selected", active ? "true" : "false");
        });
        document.querySelectorAll(".secret-model-select").forEach((panel) => {
          panel.classList.toggle("hidden", panel.dataset.secretModelPanel !== nextMedia);
        });
      }

      function setSecretProviderChannel(channel = "official") {
        const nextChannel = channel === "proxy" ? "proxy" : "official";
        const form = document.getElementById("secret-reference-form");
        if (form?.elements.providerChannel) {
          form.elements.providerChannel.value = nextChannel;
        }
        document.querySelectorAll(".secret-channel-tab").forEach((button) => {
          const active = button.dataset.secretChannel === nextChannel;
          button.classList.toggle("active", active);
          button.setAttribute("aria-selected", active ? "true" : "false");
        });
        document.querySelectorAll("[data-secret-channel-panel]").forEach((panel) => {
          panel.classList.toggle("hidden", panel.dataset.secretChannelPanel !== nextChannel);
        });
        const baseUrl = form?.elements.baseUrl;
        if (baseUrl) {
          baseUrl.required = nextChannel === "proxy";
        }
      }

      function updateSecretEnvExample() {
        const form = document.getElementById("secret-reference-form");
        const example = document.getElementById("secret-env-example");
        if (!example) return;
        const rawEnvName = String(form?.elements.envName?.value || "").trim();
        const envName = rawEnvName || "VOLCENGINE_ARK_API_KEY";
        example.textContent = `${envName}=你的真实密钥`;
      }

      function secretReferenceByEnv(envName) {
        return (state.settings.secretReferences || []).find((secret) => secret.envName === envName);
      }

      function applySecretReferenceToProviderConfig(form) {
        const secret = secretReferenceByEnv(String(form.elements.apiKeyEnv?.value || ""));
        const current = parseJsonTextarea(new FormData(form), "providerConfig");
        const next = {
          ...current,
          apiKeyEnv: String(form.elements.apiKeyEnv?.value || ""),
        };
        if (secret?.baseUrl) {
          next.baseURL = secret.baseUrl;
        }
        if (secret?.authHeaderName) {
          next.authHeaderName = secret.authHeaderName;
        }
        if (secret?.authScheme) {
          next.authScheme = secret.authScheme;
        }
        if (secret?.extraHeaders && Object.keys(secret.extraHeaders).length) {
          next.extraHeaders = {
            ...(next.extraHeaders || {}),
            ...secret.extraHeaders,
          };
        }
        form.elements.providerConfig.value = JSON.stringify(next, null, 2);
      }

      function updatePricingPreviewFromForm(form) {
        const pricing = {
          ...parseJsonTextarea(new FormData(form), "pricing"),
          unit: String(form.elements.pricingUnit?.value || "request"),
          baseCredits: Number(form.elements.baseCredits?.value || 0),
        };
        delete pricing.qualityMultipliers;
        delete pricing.resolutionMultipliers;
        delete pricing.durationMultipliers;
        form.elements.pricing.value = JSON.stringify(pricing, null, 2);
      }

      function applyModelTemplateToForm(form, templateId, preserveExisting = false) {
        const template = modelTemplates.find((item) => item.id === templateId) || modelTemplates[0];
        form.elements.providerName.value = template.providerName;
        form.elements.providerProtocol.value = template.providerProtocol;
        form.elements.invocationMode.value = template.invocationMode;
        form.elements.mediaType.value = template.mediaType;
        form.elements.apiKeyEnv.innerHTML = secretReferenceOptions(form.elements.apiKeyEnv.value, template, {
          modelCode: form.elements.modelCode.value,
          providerName: template.providerName,
          mediaType: template.mediaType,
        });
        document.getElementById("model-wizard-summary").innerHTML = modelWizardSummary({
          providerProtocol: template.providerProtocol,
          invocationMode: template.invocationMode,
          mediaType: template.mediaType,
        }, template);
        const currentModes = preserveExisting
          ? [...new FormData(form).getAll("taskMode")]
          : template.defaultTaskModes;
        document.getElementById("model-capability-grid").innerHTML = capabilityCards(currentModes, template);
        if (!preserveExisting) {
          form.elements.providerConfig.value = JSON.stringify(cloneJson(template.providerConfig), null, 2);
          form.elements.pricing.value = JSON.stringify(cloneJson(template.pricing), null, 2);
          form.elements.parameterSchema.value = JSON.stringify(cloneJson(template.parameterSchema), null, 2);
          form.elements.defaultParams.value = JSON.stringify(cloneJson(template.defaultParams), null, 2);
          form.elements.limits.value = JSON.stringify(cloneJson(template.limits), null, 2);
          form.elements.uiConfig.value = JSON.stringify(cloneJson(template.uiConfig), null, 2);
          const promptLimit = promptLimitFromDraft(template, template);
          form.elements.promptMaxLength.value = Number(promptLimit.maxLength || 2000);
          form.elements.promptLengthUnit.value = promptLimit.unit || "characters";
          syncPromptLimitFromForm(form);
          if (!form.elements.modelCode.value && template.modelCodeHint) form.elements.modelCode.value = template.modelCodeHint;
          if (!form.elements.providerModel.value && template.providerModelHint) form.elements.providerModel.value = template.providerModelHint;
          form.elements.baseCredits.value = Number(template.pricing.baseCredits || 0);
          form.elements.pricingUnit.value = template.pricing.unit || "request";
          updatePricingPreviewFromForm(form);
          form.elements.submitQueueName.value = template.dispatchPolicy.submitQueueName || "";
          form.elements.pollQueueName.value = template.dispatchPolicy.pollQueueName || "";
          form.elements.providerRpmLimit.value = Number(template.dispatchPolicy.providerRpmLimit || 60);
          form.elements.providerConcurrentLimit.value = Number(template.dispatchPolicy.providerConcurrentLimit || 5);
          form.elements.submitConcurrencyLimit.value = Number(template.dispatchPolicy.submitConcurrencyLimit || 5);
          form.elements.pollingIntervalMs.value = Number(template.dispatchPolicy.pollingIntervalMs || 15000);
        }
      }

      function validateModelWizardForm(formElement) {
        try {
          const form = formElement instanceof FormData ? formElement : new FormData(formElement);
          const providerConfig = parseJsonTextarea(form, "providerConfig");
          const pricing = parseJsonTextarea(form, "pricing");
          parseJsonTextarea(form, "parameterSchema");
          parseJsonTextarea(form, "defaultParams");
          parseJsonTextarea(form, "limits");
          parseJsonTextarea(form, "uiConfig");
          promptLimitFromForm(form);
          if (!String(form.get("modelCode") || ").trim()) return { ok: false, message: "请填写模型编"" };
          if (!String(form.get("displayName") || ").trim()) return { ok: false, message: "请填写中文名"" };
          if (!String(form.get("providerModel") || ").trim()) return { ok: false, message: "请填写供应商真实模型"" };
          if (!String(form.get("apiKeyEnv") || providerConfig.apiKeyEnv || ").trim()) return { ok: false, message: "请��择密钥引用"" };
          if (!form.getAll("taskMode").length) return { ok: false, message: "请至少��择丢�个模型能" };
          const baseCredits = Number(form.get("baseCredits") || pricing.baseCredits || 0);
          if (!Number.isFinite(baseCredits) || baseCredits <= 0) return { ok: false, message: "基础积分必须大于 0" };
          if (String(form.get("invocationMode")) === "async_polling" && !providerConfig.queryTaskEndpoint) {
            return { ok: false, message: "异步轮询模型必须配置 queryTaskEndpoint" };
          }
          if (!String(form.get("submitQueueName") || ").trim()) return { ok: false, message: "请填写提交队"" };
          if (!String(form.get("reason") || ").trim()) return { ok: false, message: "请填写操作原"" };
          return { ok: true, message: "" };
        } catch (err) {
          return { ok: false, message: err.message || "模型配置校验失败" };
        }
      }

      async function validateModelDraftWithBackend(payload) {
        const result = await api("/api/admin/models/validate-draft", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        const data = result.data || {};
        const failedItems = data.failedItems || [];
        return {
          ok: Boolean(data.ok),
          message: failedItems.length
            ? `后端校验未��过?${failedItems.map((item) => item.message).join("?")}`
            : "",
        };
      }

      function buildModelPayloadFromWizard(form) {

          ...parseJsonTextarea(form, "providerConfig"),
          apiKeyEnv: String(form.get("apiKeyEnv") || "").trim(),

          ...parseJsonTextarea(form, "pricing"),
          unit: String(form.get("pricingUnit") || "request"),
          baseCredits: Number(form.get("baseCredits") || 0),
        };
        delete pricing.qualityMultipliers;
        delete pricing.resolutionMultipliers;
        delete pricing.durationMultipliers;
        return {
          modelCode: String(form.get("modelCode") || "").trim(),
          displayName: String(form.get("displayName") || "").trim(),
          providerName: String(form.get("providerName") || "").trim(),
          providerModel: String(form.get("providerModel") || "").trim(),
          providerProtocol: String(form.get("providerProtocol") || "custom_http"),
          invocationMode: String(form.get("invocationMode") || "async_polling"),
          mediaType: String(form.get("mediaType") || "video"),
          taskModes,
          capabilities: capabilitiesFromTaskModes(taskModes),
          status: String(form.get("status") || "disabled"),
          sortOrder: Number(form.get("sortOrder") || 100),
          parameterSchema: parameterSchemaFromForm(form),
          defaultParams: parseJsonTextarea(form, "defaultParams"),
          pricing,
          providerConfig,
          limits: limitsFromForm(form),
          uiConfig: parseJsonTextarea(form, "uiConfig"),
          dispatchPolicy: {
            submitQueueName: String(form.get("submitQueueName") || "").trim(),
            pollQueueName: String(form.get("pollQueueName") || "").trim() || null,
            providerRpmLimit: Number(form.get("providerRpmLimit") || 60),
            providerConcurrentLimit: Number(form.get("providerConcurrentLimit") || 5),
            submitConcurrencyLimit: Number(form.get("submitConcurrencyLimit") || 5),
            pollingIntervalMs: Number(form.get("pollingIntervalMs") || 15000),
            pollingConcurrencyLimit: 20,
          },
          remark: String(form.get("remark") || ""),
          reason: String(form.get("reason") || ""),
        };
      }

      function capabilitiesFromTaskModes(taskModes) {
        return {
          prompt: true,
          imageEdit: taskModes.includes("image.edit"),
          referenceImages: taskModes.some((taskMode) => taskMode.includes("image_to_image") || taskMode.includes("reference")),
          firstFrame: taskModes.includes("video.image_to_video") || taskModes.includes("video.first_last_frame_to_video"),
          lastFrame: taskModes.includes("video.first_last_frame_to_video"),
          referenceVideo: taskModes.includes("video.reference_image_to_video"),
          asyncPolling: taskModes.some((taskMode) => taskMode.startsWith("video.")),
        };
      }

      function parseJsonTextarea(form, name) {
        const raw = String(form.get(name) || "").trim();
        if (!raw) return {};
        const value = JSON.parse(raw);
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          throw new Error(`${name} 必须�?JSON 对象`);
        }
        return value;
      }

      function parseOptionalJsonField(form, name) {
        const raw = String(form.get(name) || "").trim();
        if (!raw) return {};
        const value = JSON.parse(raw);
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          throw new Error(`${name} 必须�?JSON 对象`);
        }
        return value;
      }

      function parameterSchemaFromForm(form) {
        const schema = parseJsonTextarea(form, "parameterSchema");
        const limits = parseJsonTextarea(form, "limits");
        const synced = applyPromptLimitToConfig(schema, limits, form);
        return addManualParameterToSchema(synced.schema, {
          key: String(form.get("manualParameterKey") || ""),
          label: String(form.get("manualParameterLabel") || ""),
          type: String(form.get("manualParameterType") || "string"),
          options: String(form.get("manualParameterOptions") || ""),
          required: Boolean(form.get("manualParameterRequired")),
        });
      }

      function limitsFromForm(form) {
        const schema = parseJsonTextarea(form, "parameterSchema");
        const limits = parseJsonTextarea(form, "limits");
        return applyPromptLimitToConfig(schema, limits, form).limits;
      }

      function parameterSchemaRows(schema) {
        const entries = Object.entries(schema || {});
        if (entries.length === 0) {
          return `<tr><td colspan="4">暂无现有参数</td></tr>`;
        }
        return entries.map(([key, value]) => {
          const parameter = value && typeof value === "object" ? value : {};
          const details = [
            parameter.required ? "必填" : "可�",
            parameter.maxLength ? `朢��?${Number(parameter.maxLength).toLocaleString("zh-CN")} ${parameter.limitUnit === "tokens" ? "Tokens" : "字数"}` : "",
            parameter.minimum ? `朢��?${parameter.minimum}` : "",
            parameter.maximum ? `朢��?${parameter.maximum}` : "",
            Array.isArray(parameter.options) ? parameter.options.join(", ") : "",
          ].filter(Boolean).join("?") || "-";
          return `<tr><td>${escapeHtml(parameter.label || key)}<div class="metric-note">${escapeHtml(key)}</div></td><td><span class="tag blue">${escapeHtml(parameterTypeLabel(parameter.type || "json"))}</span></td><td>${escapeHtml(details)}</td><td class="actions"><div class="actions-row"><button class="icon-btn" title="编辑参数" type="button" onclick="fillManualParameterEditor('${escapeAttribute(key)}')">�?/button><button class="icon-btn" title="删除参数" type="button" onclick="removeManualParameterFromSchema('${escapeAttribute(key)}')">�?/button></div></td></tr>`;
        }).join("");
      }

      function refreshParameterSchemaList(schema) {
        const list = document.querySelector("#parameter-schema-list tbody");
        if (list) list.innerHTML = parameterSchemaRows(schema);
      }

      function currentModelEditorSchema() {
        const form = document.getElementById("model-editor-form");
        return form ? parseJsonTextarea(new FormData(form), "parameterSchema") : {};
      }

      function fillManualParameterEditor(parameterKey) {
        const form = document.getElementById("model-editor-form");
        if (!form) return;
        const schema = currentModelEditorSchema();
        const parameter = schema[parameterKey] || {};
        form.elements.manualParameterKey.value = parameterKey;
        form.elements.manualParameterLabel.value = parameter.label || parameterKey;
        form.elements.manualParameterType.value = parameter.type || "string";
        form.elements.manualParameterOptions.value = Array.isArray(parameter.options) ? parameter.options.join(", ") : "";
        form.elements.manualParameterRequired.checked = Boolean(parameter.required);
      }

      function removeManualParameterFromSchema(parameterKey) {
        const form = document.getElementById("model-editor-form");
        if (!form) return;
        const schema = currentModelEditorSchema();
        delete schema[parameterKey];
        form.elements.parameterSchema.value = JSON.stringify(schema, null, 2);
        refreshParameterSchemaList(schema);
      }

      function addManualParameterToSchema(schema, input) {
        const key = String(input.key || "").trim();
        if (!key) return schema;
        if (!/^[A-Za-z][A-Za-z0-9_]*$/.test(key)) {
          throw new Error("参数键只能使用英文��数字和下划线，并且必须以字母开");
        }
        const type = String(input.type || "string").trim();
        const parameter = {
          label: String(input.label || key).trim(),
          type,
          required: Boolean(input.required),
        };
        const options = String(input.options || "")
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
        if (options.length > 0) {
          parameter.options = options;
          parameter.adminEditableOptions = true;
        }
        return {
          ...schema,
          [key]: parameter,
        };
      }

      function valueForTextarea(value, valueType) {
        if (value === undefined || value === null) return "";
        if (valueType === "string") return String(value);
        return JSON.stringify(value, null, 2);
      }

      function optionList(options, selected) {
        return options.map((option) => `<option value="${option}" ${option === selected ? "selected" : "}>${option}</option>`).join(");
      }

      function promptLengthUnitOptions(selected) {
        const labels = { characters: "字数", tokens: "Tokens" };
        return ["characters", "tokens"]
          .map((option) => `<option value="${option}" ${option === selected ? "selected" : ""}>${labels[option]}</option>`)
          .join("");
      }

      function parameterTypeLabel(type) {
        return {
          string: "文本",
          number: "数字",
          integer: "整数",
          boolean: "弢�",
          enum: "枚举",
          array: "数组",
          file: "文件",
          "file[]": "多个文件",
          json: "JSON",
        }[type] || type || "JSON";
      }

      function parameterTypeOptions(selected) {
        return ["string", "number", "integer", "boolean", "enum", "array", "file", "file[]", "json"]
          .map((option) => `<option value="${option}" ${option === selected ? "selected" : ""}>${parameterTypeLabel(option)}</option>`)
          .join("");
      }

      function modelStatusLabel(status) {
        return { disabled: "禁用", active: "可用", archived: "归档" }[status] || "禁用";
      }

      function modelStatusOptions(selected) {
        return ["disabled", "active", "archived"]
          .map((option) => `<option value="${option}" ${option === selected ? "selected" : ""}>${modelStatusLabel(option)}</option>`)
          .join("");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replaceAll('"', "&quot;"");
      }

      function closeDrawer() {
        document.getElementById("drawer").classList.add("hidden");
      }

      window.addEventListener("popstate", () => {
        state.page = routeFromPath();
        state.session ? renderShell() : renderLogin();
      });
      window.openDrawer = openDrawer;
      window.openCreditGrantDrawer = openCreditGrantDrawer;
      window.openCreditDeductDrawer = openCreditDeductDrawer;
      window.openCreditSetBalanceDrawer = openCreditSetBalanceDrawer;
      window.openUserDetailDrawer = openUserDetailDrawer;
      window.openUserProfileDrawer = openUserProfileDrawer;
      window.openUserStatusDrawer = openUserStatusDrawer;
      window.updateStoryboardPromptType = updateStoryboardPromptType;
      window.updatePromptManagementMode = updatePromptManagementMode;
      window.loadImagePromptStyles = loadImagePromptStyles;
      window.updateStoryboardPromptKeyword = updateStoryboardPromptKeyword;
      window.updateStoryboardPromptSelection = updateStoryboardPromptSelection;
      window.composeStoryboardPromptRemote = composeStoryboardPromptRemote;
      window.copyStoryboardPrompt = copyStoryboardPrompt;
      window.testGenerateStoryboardPrompt = testGenerateStoryboardPrompt;
      window.openStoryboardPromptPackageDrawer = openStoryboardPromptPackageDrawer;
      window.copyStoryboardPromptPackage = copyStoryboardPromptPackage;
      window.toggleStoryboardPromptPackageStatus = toggleStoryboardPromptPackageStatus;
      window.openImagePromptStyleDrawer = openImagePromptStyleDrawer;
      window.copyImagePromptStyle = copyImagePromptStyle;
      window.toggleImagePromptStyleStatus = toggleImagePromptStyleStatus;
      window.openStoryboardPromptTemplateDrawer = openStoryboardPromptTemplateDrawer;
      window.applyStoryboardPromptTemplate = applyStoryboardPromptTemplate;
      window.insertStoryboardPromptVariable = insertStoryboardPromptVariable;
      window.copyStoryboardPromptEditorContent = copyStoryboardPromptEditorContent;
      window.downloadStoryboardPromptExport = downloadStoryboardPromptExport;
      window.openRiskReviewDrawer = openRiskReviewDrawer;
      window.openDashboardModelHealthDrawer = openDashboardModelHealthDrawer;
      window.openDashboardEventDrawer = openDashboardEventDrawer;
      window.openAuditEventDrawer = openAuditEventDrawer;
      window.downloadRiskExport = downloadRiskExport;
      window.updateRiskStatusFilter = updateRiskStatusFilter;
      window.openTaskRetryDrawer = openTaskRetryDrawer;
      window.openPaymentRepairDrawer = openPaymentRepairDrawer;
      window.openRuntimeConfigDrawer = openRuntimeConfigDrawer;
      window.openRuntimeConfigHistoryDrawer = openRuntimeConfigHistoryDrawer;
      window.openRuntimeConfigRollbackDrawer = openRuntimeConfigRollbackDrawer;
      window.openSecretReferenceDrawer = openSecretReferenceDrawer;
      window.probeSecretReference = probeSecretReference;
      window.openAdminAccountDrawer = openAdminAccountDrawer;
      window.openAdminAccountEditDrawer = openAdminAccountEditDrawer;
      window.openAdminAccountPasswordResetDrawer = openAdminAccountPasswordResetDrawer;
      window.openModelEditorDrawer = openModelEditorDrawer;
      window.openModelDuplicateDrawer = openModelDuplicateDrawer;
      window.openModelStatusDrawer = openModelStatusDrawer;
      window.fillManualParameterEditor = fillManualParameterEditor;
      window.removeManualParameterFromSchema = removeManualParameterFromSchema;
      window.openPasswordChangeDrawer = openPasswordChangeDrawer;
      window.loadAdminSessions = loadAdminSessions;
      window.revokeOtherAdminSessions = revokeOtherAdminSessions;
      window.logout = logout;
      window.closeDrawer = closeDrawer;

      bootstrap();
    </script>
  </body>
