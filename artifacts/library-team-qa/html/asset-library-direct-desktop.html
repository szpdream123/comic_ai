<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asset Library</title>
    <style>.workbench-body {
  --workbench-rail-width: clamp(5.4rem, 7vw, 6.35rem);
  height: 100dvh;
  min-height: 100dvh;
  overflow-x: hidden;
  overflow-y: hidden;
  background:
    radial-gradient(circle at 18% 12%, oklch(45% 0.14 292 / 0.2), transparent 26rem),
    radial-gradient(circle at 86% 4%, oklch(64% 0.14 205 / 0.12), transparent 22rem),
    var(--color-canvas, #0a0a0a);
  letter-spacing: 0;
}

.workbench-body::after {
  opacity: 0.35;
}

.creator-app {
  height: 100dvh;
  min-height: 100dvh;
  overflow: hidden;
}

.workbench-loading,
.workbench-fatal {
  position: relative;
  z-index: 2;
  display: grid;
  min-height: 100dvh;
  place-items: center;
  padding: 2rem;
  color: var(--text-muted);
}

.workbench-fatal {
  align-content: center;
  gap: 1rem;
}

.workbench-fatal h1 {
  margin: 0;
  max-width: none;
  font-size: 1.4rem;
  letter-spacing: 0;
}

.workbench-fatal a {
  color: var(--glow-tint);
}

.production-workbench {
  position: relative;
  z-index: 2;
  display: block;
  min-height: 100dvh;
  padding: 0;
}

.workbench-rail,
.workbench-main,
.shot-sidebar,
.shot-stage,
.generation-console,
.script-modal,
.export-panel,
.asset-card,
.metric-card,
.episode-card {
  border: 1px solid oklch(100% 0 0 / 0.08);
  background: oklch(12% 0.012 270 / 0.86);
}

.workbench-rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100dvh;
  padding: 1rem 0 1rem;
  border-radius: 0;
  border: 0;
  background: transparent;
}

.workbench-rail.persistent {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  z-index: 7;
  width: var(--workbench-rail-width);
  pointer-events: auto;
}

.workbench-rail.persistent .rail-nav {
  pointer-events: auto;
}

.rail-brand {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  width: auto;
  margin-bottom: 0.95rem;
  padding: 0.35rem 0.5rem 0.35rem 0.3rem;
  border: 1px solid transparent;
  border-radius: 1rem;
  background: transparent;
  color: inherit;
  pointer-events: auto;
  text-align: left;
}

.rail-brand-mark {
  display: grid;
  width: 2.75rem;
  height: 2.75rem;
  place-items: center;
  border-radius: 1rem;
  background: linear-gradient(180deg, oklch(100% 0 0 / 0.14), oklch(100% 0 0 / 0.04));
  color: oklch(100% 0 0);
  font-weight: 700;
  letter-spacing: 0.08em;
}

.rail-brand-copy {
  display: grid;
  justify-items: start;
  gap: 0.08rem;
}

.rail-brand-copy strong,
.rail-brand-copy span {
  writing-mode: horizontal-tb;
  text-orientation: initial;
}

.rail-brand-copy strong {
  font-size: 0.72rem;
  color: oklch(100% 0 0 / 0.94);
}

.rail-brand-copy span {
  font-size: 0.58rem;
  color: var(--text-muted);
  text-transform: uppercase;
}

.rail-back,
.icon-button {
  display: grid;
  width: 2.35rem;
  height: 2.35rem;
  place-items: center;
  padding: 0;
  border-radius: 9999px;
  border: 1px solid transparent;
  background: oklch(100% 0 0 / 0.03);
  color: var(--text-primary);
}

.rail-nav {
  display: grid;
  gap: 0.2rem;
  width: 4.25rem;
  margin-block: auto;
  padding: 0.45rem 0.35rem;
  border: 1px solid oklch(100% 0 0 / 0.08);
  border-radius: 9999px;
  background:
    linear-gradient(180deg, oklch(24% 0.012 265 / 0.94), oklch(15% 0.01 265 / 0.96)),
    oklch(13% 0.01 265 / 0.98);
  box-shadow:
    inset 0 1px 0 oklch(100% 0 0 / 0.08),
    0 1.2rem 3rem oklch(0% 0 0 / 0.38);
}

.rail-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.22rem;
  width: 100%;
  min-height: 4.65rem;
  color: oklch(72% 0.01 270 / 0.82);
  font-size: 0.7rem;
  text-decoration: none;
  border: 1px solid transparent;
  background: transparent;
  border-radius: 9999px;
  padding: 0.48rem 0.16rem;
  letter-spacing: 0;
}

.rail-item.active,
.rail-item:hover {
  border-color: oklch(100% 0 0 / 0.08);
  color: oklch(88% 0.07 305);
  background: oklch(31% 0.015 272 / 0.92);
  box-shadow:
    inset 0 1px 0 oklch(100% 0 0 / 0.08),
    0 0.45rem 1rem oklch(0% 0 0 / 0.18);
}

.rail-glyph {
  display: grid;
  width: 1.48rem;
  height: 1.48rem;
  place-items: center;
  line-height: 1;
}

.rail-glyph svg {
  display: block;
  width: 1.48rem;
  height: 1.48rem;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 1.85;
}

.rail-label {
  font-size: 0.72rem;
  font-weight: 600;
}

.rail-bottom {
  display: none;
}

.workbench-main {
  position: relative;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: 0.85rem;
  margin-left: 0;
  padding: 5.8rem 0.65rem 0.85rem calc(var(--workbench-rail-width) + 0.45rem);
  min-width: 0;
  height: 100dvh;
  min-height: 100dvh;
  overflow: hidden;
}

.workbench-main.home-mode {
  margin-left: 0;
  padding: 0;
}

.workbench-main.workspace-mode {
  grid-template-rows: auto minmax(0, 1fr);
  gap: 0;
  padding: 0 0 0 var(--workbench-rail-width);
  border: 0;
  background: #090a0f;
}

.workbench-main.workspace-mode .global-statusbar {
  position: relative;
  top: auto;
  left: auto;
  right: auto;
  margin: 0.9rem 0.55rem 0 0.45rem;
}

.workbench-main .global-statusbar {
  position: absolute;
  top: 0.9rem;
  left: 0.45rem;
  right: 0.55rem;
}

.global-statusbar {
  position: relative;
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 4.1rem;
  padding: 0.15rem 0.25rem 0.2rem;
}

.statusbar-brand,
.statusbar-actions,
.statusbar-wondershare {
  display: flex;
  align-items: center;
}

.statusbar-brand {
  gap: 0.8rem;
  min-width: 0;
  color: oklch(100% 0 0);
}

.global-statusbar-hide-brand .statusbar-brand {
  display: none;
}

.statusbar-wondershare {
  gap: 0.45rem;
  font-size: 0.78rem;
  font-weight: 700;
  line-height: 1;
}

.statusbar-wondershare small {
  color: oklch(100% 0 0 / 0.78);
  font-size: 0.66rem;
  letter-spacing: 0.02em;
}

.wondershare-w {
  display: grid;
  width: 2.35rem;
  height: 2.35rem;
  place-items: center;
  border-radius: 0.75rem;
  background: oklch(100% 0 0 / 0.98);
  color: oklch(12% 0.01 250);
  font-size: 1.1rem;
  font-weight: 900;
}

.statusbar-divider {
  width: 1px;
  height: 1.8rem;
  background: oklch(100% 0 0 / 0.18);
}

.statusbar-n-mark {
  display: grid;
  width: 2.35rem;
  height: 2.35rem;
  place-items: center;
  border-radius: 0.78rem;
  background: linear-gradient(180deg, oklch(82% 0.15 325), oklch(68% 0.26 275));
  color: oklch(100% 0 0);
  font-size: 1.05rem;
  font-weight: 900;
}

.statusbar-brand strong {
  font-size: 1.65rem;
  font-weight: 900;
  letter-spacing: 0;
}

.statusbar-actions {
  flex: 1;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 0.75rem;
  position: relative;
}

.statusbar-seedance,
.statusbar-pill,
.statusbar-credit,
.statusbar-icon,
.statusbar-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 3.05rem;
  border-radius: 0.95rem;
  border: 1px solid oklch(100% 0 0 / 0.08);
  background: oklch(100% 0 0 / 0.08);
  color: oklch(100% 0 0);
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.04);
}

.statusbar-seedance {
  min-width: 14rem;
  padding: 0 1rem;
  background:
    linear-gradient(90deg, oklch(82% 0.13 95 / 0.92), oklch(74% 0.19 205 / 0.92));
  color: oklch(10% 0.01 250);
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0.02em;
  text-wrap: balance;
}

.statusbar-seedance b {
  font-size: 1rem;
  font-weight: 900;
}

.statusbar-pill,
.statusbar-credit {
  padding: 0 1rem;
  color: oklch(100% 0 0 / 0.96);
  font-size: 0.82rem;
  font-weight: 700;
}

.statusbar-credit {
  gap: 0.4rem;
  min-width: 6rem;
}

.statusbar-credit span {
  font-size: 1rem;
}

.statusbar-icon {
  width: 3.05rem;
  padding: 0;
  font-size: 1.15rem;
}

.statusbar-avatar {
  width: 3.05rem;
  padding: 0;
  border: 0;
  background: linear-gradient(180deg, oklch(76% 0.21 282), oklch(62% 0.28 270));
  color: oklch(10% 0.01 250);
  font-size: 1.1rem;
  font-weight: 900;
}

.statusbar-popover-wrap {
  position: relative;
}

.statusbar-popover-wrap::after {
  position: absolute;
  right: 0;
  bottom: -0.9rem;
  width: max(100%, 15rem);
  height: 0.9rem;
  content: "";
}

.statusbar-popover {
  position: absolute;
  top: calc(100% + 0.8rem);
  right: 0;
  z-index: 8;
  display: grid;
  gap: 0.95rem;
  min-width: 15rem;
  padding: 1rem 1.05rem;
  border: 1px solid oklch(100% 0 0 / 0.08);
  border-radius: 1rem;
  background: oklch(12% 0.018 270 / 0.98);
  color: oklch(100% 0 0);
  box-shadow: 0 1.4rem 3rem oklch(0% 0 0 / 0.35);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-0.35rem);
  pointer-events: none;
  transition:
    opacity 160ms ease,
    transform 160ms ease,
    visibility 0s linear 160ms;
}

.statusbar-popover-wrap:hover .statusbar-popover,
.statusbar-popover-wrap:focus-within .statusbar-popover {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  pointer-events: auto;
  transition:
    opacity 160ms ease,
    transform 160ms ease,
    visibility 0s;
}

.support-popover strong {
  font-size: 0.95rem;
  font-weight: 700;
}

.account-popover {
  min-width: 19rem;
  gap: 0.45rem;
  padding: 1rem;
}

.account-popover strong {
  font-size: 1rem;
  font-weight: 800;
}

.account-popover span,
.account-popover-card span {
  color: oklch(100% 0 0 / 0.78);
  font-size: 0.88rem;
}

.account-popover-card {
  display: grid;
  gap: 0.45rem;
  margin-bottom: 0.35rem;
  padding: 0.95rem 1rem;
  border-radius: 0.8rem;
  background:
    linear-gradient(135deg, oklch(100% 0 0 / 0.1), oklch(70% 0.16 305 / 0.16)),
    oklch(18% 0.02 270 / 0.94);
}

.popover-menu-item {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  width: 100%;
  min-height: 2.55rem;
  padding: 0 0.7rem;
  border: 0;
  border-radius: 0.55rem;
  background: transparent;
  color: oklch(100% 0 0 / 0.76);
  font: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  text-align: left;
}

.popover-menu-item:hover,
.popover-menu-item:focus-visible {
  outline: none;
  background: oklch(100% 0 0 / 0.08);
  color: oklch(100% 0 0);
}

.popover-menu-item.featured {
  min-height: 3rem;
  color: oklch(100% 0 0);
}

.popover-menu-item.danger {
  margin-top: 0.35rem;
  border-top: 1px solid oklch(100% 0 0 / 0.08);
  color: oklch(82% 0.12 25);
}

.workbench-topbar,
.section-heading,
.export-panel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.workbench-topbar {
  min-height: 4.5rem;
  padding: 0.25rem 0.35rem 0.8rem;
  border-bottom: 1px solid oklch(100% 0 0 / 0.08);
}

.project-title-row {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  min-width: 0;
}

.project-title-row h1,
.asset-section h2,
.export-panel h2 {
  margin: 0;
  max-width: none;
  font-size: 1.15rem;
  line-height: 1.2;
  letter-spacing: 0;
}

.phase-pill {
  border-radius: 9999px;
  padding: 0.35rem 0.7rem;
  background: oklch(100% 0 0 / 0.07);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.68rem;
}

.session-line,
.section-kicker,
.empty-copy,
.workbench-toast,
.modal-note,
.validation-copy,
.modal-inline-status {
  color: var(--text-muted);
  font-size: 0.82rem;
}

.session-line {
  margin: 0.35rem 0 0;
}

.topbar-actions,
.console-actions,
.export-summary {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.55rem;
}

.primary-action.compact,
.secondary-action.compact {
  padding: 0.72rem 1rem;
}

.home-hero {
  position: relative;
  height: 100dvh;
  overflow: hidden;
  border-left: 1px solid oklch(100% 0 0 / 0.04);
  background:
    linear-gradient(180deg, oklch(0% 0 0 / 0.16), oklch(0% 0 0 / 0.44)),
    linear-gradient(135deg, oklch(0% 0 0 / 0.52), oklch(0% 0 0 / 0.14) 42%, oklch(0% 0 0 / 0.66)),
    url("https://images.unsplash.com/photo-1518709414768-a88981a4515d?auto=format&fit=crop&w=1800&q=80")
      center center / cover no-repeat;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 58% 42%, transparent 0, transparent 14rem, oklch(0% 0 0 / 0.26) 35rem),
    linear-gradient(180deg, oklch(0% 0 0 / 0.15), oklch(0% 0 0 / 0.58));
}

.hero-content {
  position: relative;
  z-index: 1;
  display: grid;
  justify-items: center;
  align-content: center;
  min-height: 100%;
  padding: clamp(4.6rem, 8vh, 5.2rem) 2rem clamp(1.8rem, 4vh, 3.2rem);
  text-align: center;
}

.hero-brand-lockup {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: clamp(1rem, 2.5vh, 2rem);
}

.hero-brand-mark {
  display: grid;
  width: clamp(3.1rem, 5.5vh, 4rem);
  height: clamp(3.1rem, 5.5vh, 4rem);
  place-items: center;
  border-radius: 1.2rem;
  background: linear-gradient(180deg, oklch(78% 0.19 325), oklch(62% 0.27 285));
  color: oklch(100% 0 0);
  font-size: 2rem;
  font-weight: 800;
  box-shadow: 0 1rem 2rem oklch(0% 0 0 / 0.25);
}

.hero-brand-text {
  font-size: clamp(2rem, 3.8vw, 3.25rem);
  font-weight: 800;
  color: oklch(100% 0 0);
}

.hero-title {
  max-width: 12ch;
  margin: 0;
  font-size: clamp(3.1rem, min(8vw, 10vh), 6.4rem);
  font-weight: 900;
  font-style: italic;
  line-height: 0.95;
  letter-spacing: 0;
  color: oklch(100% 0 0);
  text-shadow: 0 0.2rem 2rem oklch(0% 0 0 / 0.34);
}

.hero-value-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: clamp(1rem, 3vw, 2.5rem);
  margin-top: clamp(1rem, 2.6vh, 2rem);
  color: oklch(100% 0 0 / 0.92);
  font-size: 1.05rem;
  font-weight: 700;
}

.hero-actions {
  margin-top: clamp(1.1rem, 3vh, 2.3rem);
}

.hero-cta {
  width: min(27rem, 100%);
  min-height: 3.8rem;
  border-radius: 1.1rem;
  background: linear-gradient(90deg, oklch(64% 0.28 290), oklch(75% 0.22 320));
  color: oklch(100% 0 0);
  font-size: 1.1rem;
  font-weight: 700;
  box-shadow: 0 1rem 3rem oklch(0% 0 0 / 0.3);
}

.hero-status-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.7rem;
  margin-top: clamp(0.85rem, 2.5vh, 2rem);
}

.hero-status-strip span {
  border: 1px solid oklch(100% 0 0 / 0.12);
  border-radius: 9999px;
  padding: 0.4rem 0.8rem;
  background: oklch(100% 0 0 / 0.08);
  color: oklch(100% 0 0 / 0.9);
  font-size: 0.82rem;
}

.project-gallery-shell {
  position: relative;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto auto;
  gap: clamp(0.65rem, 1.2vh, 1rem);
  height: 100%;
  min-height: 0;
  overflow: hidden;
  padding: clamp(0.7rem, 1.4vh, 1.1rem) 1.25rem 0.65rem 1rem;
  border-left: 1px solid oklch(100% 0 0 / 0.04);
  background:
    radial-gradient(circle at 55% 22%, oklch(54% 0.18 206 / 0.18), transparent 24rem),
    radial-gradient(circle at 73% 28%, oklch(50% 0.16 166 / 0.13), transparent 18rem),
    radial-gradient(circle at 42% 82%, oklch(54% 0.18 295 / 0.14), transparent 25rem),
    radial-gradient(circle at 91% 69%, oklch(56% 0.16 104 / 0.11), transparent 19rem),
    linear-gradient(180deg, oklch(7% 0.01 260 / 0.96), oklch(6% 0.012 260 / 0.99));
}

.gallery-topbar,
.gallery-brand,
.gallery-topbar-actions,
.gallery-filter-group,
.project-gallery-pagination {
  display: flex;
  align-items: center;
}

.gallery-topbar {
  justify-content: space-between;
  gap: 1rem;
  min-height: 4.3rem;
}

.gallery-brand {
  gap: 0.9rem;
}

.gallery-brand-mark {
  display: grid;
  width: 2.7rem;
  height: 2.7rem;
  place-items: center;
  border-radius: 0.9rem;
  background: linear-gradient(180deg, oklch(78% 0.19 325), oklch(62% 0.27 285));
  color: oklch(100% 0 0);
  font-size: 1.3rem;
  font-weight: 800;
  box-shadow: 0 0.8rem 1.8rem oklch(0% 0 0 / 0.24);
}

.gallery-brand-copy {
  display: grid;
  gap: 0.18rem;
}

.gallery-brand-copy strong {
  font-size: 1.45rem;
  color: oklch(100% 0 0);
}

.gallery-brand-copy span {
  color: var(--text-muted);
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.gallery-topbar-actions {
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 0.75rem;
}

.gallery-test-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 3.05rem;
  padding: 0 1.1rem;
  border-radius: 1rem;
  border: 1px solid oklch(86% 0.11 95 / 0.45);
  background:
    linear-gradient(90deg, oklch(84% 0.13 95 / 0.9), oklch(72% 0.19 200 / 0.92));
  color: oklch(10% 0.01 250);
  font-size: 0.82rem;
  font-weight: 900;
  letter-spacing: 0.03em;
  box-shadow: 0 1rem 2rem oklch(0% 0 0 / 0.18);
}

.project-gallery-header,
.project-gallery-filters,
.project-gallery-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.project-gallery-header h1,
.project-gallery-card h2,
.create-modal-head h2 {
  margin: 0;
  max-width: none;
  letter-spacing: 0;
}

.project-gallery-header h1 {
  font-size: clamp(1.55rem, 2.2vw, 2.25rem);
  font-weight: 900;
}

.gallery-filter,
.gallery-search input {
  min-height: 3rem;
  border-radius: 9999px;
  border: 1px solid oklch(100% 0 0 / 0.1);
  background: oklch(100% 0 0 / 0.06);
  color: var(--text-primary);
}

.gallery-filter {
  min-width: 10.5rem;
  justify-content: space-between;
  padding: 0 1rem 0 1.1rem;
}

.gallery-filter.active {
  border-color: oklch(72% 0.22 300 / 0.7);
  box-shadow: 0 0 0 1px oklch(72% 0.22 300 / 0.18);
}

.gallery-filter-caret {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.gallery-search input {
  width: min(25rem, 44vw);
  padding: 0 1rem;
}

.gallery-filter-group {
  position: relative;
  justify-content: center;
}

.project-status-menu {
  position: absolute;

    linear-gradient(135deg, transparent 42%, oklch(100% 0 0 / 0.9) 43% 54%, transparent 55%),
    radial-gradient(circle at 60% 30%, oklch(100% 0 0 / 0.95) 0 14%, transparent 15%),
    repeating-linear-gradient(90deg, oklch(100% 0 0 / 0.45) 0 0.25rem, transparent 0.25rem 0.55rem);
  clip-path: polygon(20% 0, 100% 0, 88% 100%, 0 100%);
}

.asset-card-head {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.asset-card h3 {
  margin: 0;
  font-size: 1rem;
}

.asset-card-head span {
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.74rem;
}

.asset-candidates {
  position: relative;
  display: grid;
  gap: 0.45rem;
  margin-top: 1.15rem;
  max-width: 24rem;
}

.asset-token {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 0.45rem;
  padding: 0.35rem;
  border-radius: 8px;
  background: oklch(6% 0.01 260 / 0.42);
}

.asset-token button {
  min-width: 0;
  padding: 0.45rem 0.65rem;
  border-radius: 9999px;
  font-size: 0.76rem;
}

.asset-token button:first-child {
  overflow: hidden;
  text-align: left;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-color: transparent;
  background: transparent;
  color: var(--text-primary);
}

.asset-token.confirmed {
  outline: 1px solid oklch(72% 0.15 155 / 0.26);
}

.storyboard-workbench {
  display: grid;
  grid-template-columns: minmax(0, 14.5rem) minmax(0, 1fr) minmax(0, min(33rem, 100%));
  min-height: calc(100dvh - 7.15rem);
  height: auto;
  gap: 0.6rem;
}

.shot-sidebar,
.shot-stage,
.generation-console {
  border-radius: 8px;
}

.shot-sidebar {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: 0.62rem;
  padding: 0.62rem;
  min-height: 0;
  height: 100%;
  overflow: hidden;
}

.shot-sidebar-hero {
  position: relative;
  z-index: 1;
  grid-column: 1;
  grid-row: 1;
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-areas:
    "icon title"
    "icon badge";
  gap: 0.08rem 0.62rem;
  align-items: center;
  min-height: 3.45rem;
  padding: 0.5rem 0.7rem;
  border: 0;
  border-radius: 0.8rem;
  background: linear-gradient(90deg, #9a4dff, #8d3ef5);
  color: #fff;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
}

.shot-sidebar-hero-icon {
  grid-area: icon;
  display: grid;
  place-items: center;
  width: 1.45rem;
  height: 1.45rem;
  border-radius: 0.4rem;
  background: rgba(255, 255, 255, 0.14);
  font-size: 0.95rem;
}

.shot-sidebar-hero strong {
  grid-area: title;
  align-self: end;
  font-size: 0.94rem;
  font-weight: 800;
  line-height: 1.05;
  white-space: nowrap;
}

.shot-sidebar-hero em {
  grid-area: badge;
  justify-self: start;
  margin-top: -0.08rem;
  padding: 0.08rem 0.42rem;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.9);
  color: #5a2bd6;
  font-size: 0.62rem;
  font-style: normal;
  font-weight: 800;
  white-space: nowrap;
}

.shot-sidebar-head,
.shot-stage-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  color: #fff;
  font-size: 1rem;
  font-weight: 800;
}

.shot-stack {
  display: grid;
  align-content: start;
  gap: 0.62rem;
  min-height: 0;
  overflow-x: visible;
  overflow-y: auto;
  padding-right: 0.18rem;
  padding-bottom: 0.12rem;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.shot-stack::-webkit-scrollbar {
  display: none;
}

.shot-sidebar-actions {
  display: grid;
  gap: 0.65rem;
  align-content: end;
  padding-top: 0.2rem;
}

.shot-thumb {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  grid-template-rows: auto auto minmax(0, 1fr);
  gap: 0.18rem 0.5rem;
  min-height: 9.2rem;
  padding: 0.64rem 0.58rem 0.58rem;
  border-radius: 0.9rem;
  border: 1px solid rgba(255, 255, 255, 0.07);
  background: #07070a;
  color: #fff;
}

.shot-thumb.active {
  border-color: rgba(160, 92, 255, 0.96);
  box-shadow: 0 0 0 2px rgba(160, 92, 255, 0.18);
}

.shot-thumb span {
  grid-column: 1;
  grid-row: 1;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1;
}

.shot-thumb strong {
  grid-column: 2;
  grid-row: 1;
  justify-self: end;
  border-radius: 0.45rem;
  padding: 0.14rem 0.5rem;
  background: rgba(92, 92, 102, 0.9);
  color: #eef0f4;
  font-size: 0.7rem;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
}

.shot-thumb em {
  grid-column: 1 / -1;
  grid-row: 2;
  align-self: start;
  display: -webkit-box;
  overflow: hidden;
  color: rgba(231, 233, 241, 0.84);
  font-size: 0.76rem;
  font-style: normal;
  font-weight: 600;
  line-height: 1.25;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.shot-thumb-preview {
  grid-column: 1 / -1;
  grid-row: 3;
  position: relative;
  overflow: hidden;
  min-height: 5.9rem;
  margin-top: 0.08rem;
  border-radius: 0.72rem;
  background: #0d0e12;
}

.timeline-button,
.generate-now {
  width: 100%;
}

.shot-stage {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  padding: 1.2rem;
  min-height: 0;
}

.stage-video-library {
  display: grid;
  align-content: start;
  gap: 1rem;
  min-height: 0;
  min-width: 0;
  padding-top: 0.2rem;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 0.2rem;
}

.stage-video-feature {
  display: grid;
  gap: 0.75rem;
  width: min(100%, 48rem);
  min-width: 0;
}

.stage-video-feature-player,
.stage-video-feature-placeholder {
  position: relative;
  display: grid;
  overflow: hidden;
  width: 100%;
  min-height: 0;
  aspect-ratio: 16 / 9;
  max-height: min(32rem, 46vh);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 1rem;
  background:
    radial-gradient(circle at 50% 35%, rgba(145, 112, 255, 0.12), transparent 18rem),
    #050609;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.04),
    0 1.2rem 3rem rgba(0, 0, 0, 0.26);
}

.stage-video-feature-player video {
  display: block;
  width: 100%;
  height: 100%;
  min-height: 0;
  object-fit: contain;
  background: #000;
}

.stage-video-feature-placeholder {
  display: grid;
  place-items: center;
  color: rgba(216, 216, 232, 0.72);
  font-weight: 800;
}

.stage-video-feature-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
  color: rgba(240, 240, 248, 0.9);
  font-size: 0.9rem;
}

.stage-video-feature-footer strong {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.stage-video-group {
  display: grid;
  gap: 0.7rem;
  min-width: 0;
}

.stage-video-group-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
  color: rgba(226, 226, 239, 0.9);
  font-size: 0.86rem;
  font-weight: 700;
}

.stage-video-upload-head {
  justify-content: flex-start;
}

.stage-video-group-title {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
}

.stage-video-caret {
  color: rgba(255, 255, 255, 0.72);
  font-size: 0.72rem;
}

.stage-upload-trigger {
  padding: 0;
  border: 0;
  background: transparent;
  color: rgba(234, 236, 247, 0.92);
  font: inherit;
  font-weight: 700;
}

.stage-video-grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(16rem, 19rem);
  gap: 0.8rem;
  align-content: start;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 0.25rem;
  scroll-snap-type: x proximity;
  scrollbar-gutter: stable both-edges;
  overscroll-behavior-x: contain;
}

.stage-video-card {
  display: grid;
  gap: 0.35rem;
  padding: 0.55rem;
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 0.85rem;
  background: rgba(8, 8, 12, 0.94);
  color: #fff;
  text-align: left;
  appearance: none;
  cursor: pointer;
}

.stage-video-card.active {
  box-shadow: 0 0 0 2px rgba(163, 95, 255, 0.24);
}

.stage-video-card-preview {
  position: relative;
  overflow: hidden;
  aspect-ratio: 16 / 9;
  border-radius: 0.65rem;
  background: #000;
}

.stage-video-card-preview video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.stage-video-card-preview span {
  position: absolute;
  left: 0.5rem;
  top: 0.5rem;
  display: inline-flex;
  align-items: center;
  min-height: 1.25rem;
  padding: 0 0.35rem;
  border-radius: 999px;
  background: rgba(4, 5, 9, 0.78);
  color: #fff;
  font-size: 0.68rem;
  font-weight: 800;
}

.stage-video-card strong {
  font-size: 0.84rem;
  font-weight: 800;
}

.stage-video-card small {
  color: rgba(201, 203, 219, 0.7);
  font-size: 0.72rem;
  font-weight: 700;
}

.stage-video-empty {
  display: grid;
  place-items: center;
  align-content: center;
  min-height: 6.4rem;
  gap: 0.85rem;
  color: rgba(186, 188, 204, 0.68);
  text-align: center;
}

.stage-video-empty.compact {
  min-height: 5rem;
}

.cinematic-video-empty {
  gap: 0.7rem;
  min-height: 24rem;
}

.cinematic-video-empty p {
  margin: 0;
  color: rgba(192, 194, 210, 0.76);
}

.stage-empty-actions {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  color: rgba(192, 194, 210, 0.7);
  font-size: 0.92rem;
  font-weight: 700;
}

.stage-inline-link-button {
  padding: 0;
  color: #f3d6ff;
  font: inherit;
  text-decoration: underline;
}

.uploaded-video-card {
  width: 100%;
  display: grid;
  gap: 0.7rem;
  scroll-snap-align: start;
  min-width: 0;
}

.uploaded-video-card.pinned {
  max-width: 19rem;
}

.uploaded-video-card-inner {
  position: relative;
  display: grid;
  width: 100%;
  min-height: 0;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 0.95rem;
  background: rgba(7, 8, 12, 0.95);
}

.uploaded-video-card-inner.media {
  padding: 0;
}

.uploaded-video-card-inner.media video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
}

.stage-video-toolbar {
  position: absolute;
  left: 50%;
  bottom: 0.9rem;
  z-index: 5;
  display: inline-flex;
  align-items: center;
  gap: 0.2rem;
  padding: 0.3rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 0.9rem;
  background: rgba(45, 47, 61, 0.96);
  box-shadow:
    0 14px 30px rgba(0, 0, 0, 0.34),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  opacity: 1;
  transform: translate(-50%, 0);
  pointer-events: auto;
  transition:
    opacity 180ms ease,
    transform 180ms ease;
}

.uploaded-video-card-inner.media:hover .stage-video-toolbar,
.uploaded-video-card-inner.media:focus-within .stage-video-toolbar,
.uploaded-video-card:hover .stage-video-toolbar,
.uploaded-video-card:focus-within .stage-video-toolbar {
  opacity: 1;
  transform: translate(-50%, 0);
  pointer-events: auto;
}

.stage-video-tool {
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  gap: 0.32rem;
  min-height: 2.15rem;
  padding: 0 0.68rem;
  border: 0;
  border-radius: 0.68rem;
  background: transparent;
  color: rgba(244, 245, 252, 0.9);
  font-size: 0.78rem;
  font-weight: 800;
  pointer-events: auto;
  transition:
    background 160ms ease,
    color 160ms ease,
    transform 160ms ease;
}

.stage-video-tool:hover,
.stage-video-tool:focus-visible {
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
}

.stage-video-tool:active {
  transform: translateY(1px);
}

.stage-video-tool.danger:hover,
.stage-video-tool.danger:focus-visible {
  background: rgba(255, 112, 112, 0.16);
  color: #ffd7d7;
}

.stage-video-tool-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 0.95rem;
  font-size: 0.92rem;
  line-height: 1;
}

.stage-video-tool-label {
  white-space: nowrap;
}

.uploaded-video-card.active .uploaded-video-card-inner {
  box-shadow: 0 0 0 2px rgba(163, 95, 255, 0.38);
}

.uploaded-video-primary-action {
  min-height: 2.15rem;
  border: 0;
  border-radius: 0.7rem;
  background: rgba(255, 255, 255, 0.94);
  color: #111318;
  font: inherit;
  font-weight: 800;
}

.uploaded-video-card-actions {
  display: grid;
  grid-template-columns: 1fr;
}

.uploaded-video-select {
  min-height: 2.15rem;
  border: 0;
  border-radius: 0.7rem;
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.9);
  font: inherit;
  font-weight: 800;
  cursor: pointer;
}

.uploaded-video-card.active .uploaded-video-select {
  background: rgba(255, 255, 255, 0.94);
  color: #111318;
}

.uploaded-video-duration,
.uploaded-video-badge {
  position: absolute;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 1.4rem;
  padding: 0 0.45rem;
  border-radius: 999px;
  font-size: 0.74rem;
  font-weight: 800;
}

.uploaded-video-duration {
  left: 0.6rem;
  top: 0.6rem;
  background: rgba(6, 7, 12, 0.8);
  color: #fff;
}

.uploaded-video-badge {
  right: 0.6rem;
  top: 0.6rem;
  background: rgba(255, 255, 255, 0.92);
  color: #171921;
}

.uploaded-video-card-inner.progress {
  place-items: center;
  align-content: center;
  gap: 0.55rem;
  min-height: 10.4rem;
  background: #000;
  color: #f1f1fb;
  text-align: center;
}

@media (max-width: 980px) {
  .stage-video-toolbar {
    left: 0.75rem;
    right: 0.75rem;
    bottom: 0.75rem;
    justify-content: space-between;
    transform: translateY(0.9rem);
  }

  .uploaded-video-card:hover .stage-video-toolbar,
  .uploaded-video-card:focus-within .stage-video-toolbar {
    transform: translateY(0);
  }

  .stage-video-tool {
    flex: 1 1 auto;
    justify-content: center;
    min-width: 0;
    padding-inline: 0.4rem;
  }

  .stage-video-tool-label {
    display: none;
  }
}

.uploading-media-shell {
  display: grid;
  place-items: center;
  align-content: center;
  gap: 0.62rem;
  width: 100%;
  min-height: 6.8rem;
  color: rgba(245, 247, 255, 0.94);
  font-weight: 800;
}

.uploading-media-shell strong {
  font-size: 0.86rem;
}

.uploaded-video-spinner {
  width: 1.7rem;
  height: 1.7rem;
  border: 2px solid rgba(255, 255, 255, 0.14);
  border-top-color: rgba(170, 118, 255, 0.95);
  border-radius: 999px;
  animation: uploaded-video-spin 900ms linear infinite;
}

.uploaded-video-cancel {
  min-width: 4rem;
  min-height: 1.9rem;
  padding: 0 0.8rem;
  border: 0;
  border-radius: 0.65rem;
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  font: inherit;
  font-weight: 700;
}

@keyframes uploaded-video-spin {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}

.stage-empty,
.stage-result {
  display: grid;
  place-items: center;
  align-content: center;
  min-height: 28rem;
  gap: 0.85rem;
  color: var(--text-muted);
  text-align: center;
}

.empty-folder {
  width: 5.4rem;
  height: 3.9rem;
  border-radius: 8px;
  background:
    radial-gradient(circle at 74% 18%, oklch(83% 0.1 292 / 0.9), transparent 0.7rem),
    linear-gradient(180deg, oklch(36% 0.05 270), oklch(22% 0.035 270));
  box-shadow: 0 -1.1rem 0 -0.35rem oklch(31% 0.045 270);
}

.stage-result .result-frame {
  display: grid;
  width: min(28rem, 86%);
  aspect-ratio: 9 / 16;
  max-height: 24rem;
  place-items: center;
  border-radius: 8px;
  background:
    linear-gradient(135deg, oklch(15% 0.08 292), oklch(20% 0.05 205)),
    oklch(5% 0.01 260);
  box-shadow: inset 0 0 0 1px oklch(100% 0 0 / 0.12);
}

.stage-result.video .result-frame {
  background:
    linear-gradient(135deg, oklch(13% 0.08 292), oklch(18% 0.08 160)),
    oklch(5% 0.01 260);
}

.result-frame span {
  display: grid;
  width: 4rem;
  height: 4rem;
  place-items: center;
  border-radius: 9999px;
  background: oklch(100% 0 0 / 0.12);
  color: oklch(92% 0.07 292);
  font-size: 1.8rem;
}

.generation-console {
  display: grid;
  grid-template-rows: auto auto auto auto minmax(8rem, auto) auto auto auto;
  gap: 0.9rem;
  padding: 1rem;
}

.calibration-panel {
  display: grid;
  gap: 0.85rem;
  padding: 0.9rem;
  border: 1px solid oklch(100% 0 0 / 0.08);
  border-radius: 8px;
  background: oklch(100% 0 0 / 0.03);
}

.calibration-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.55rem;
}

.console-tabs {
  display: flex;
  gap: 1rem;
  border-bottom: 1px solid oklch(100% 0 0 / 0.08);
}

.console-tab {
  padding: 0.45rem 0 0.65rem;
  border: 0;
  border-radius: 0;
  background: transparent;
  color: var(--text-muted);
}

.console-tab.active {
  color: oklch(88% 0.06 292);
  box-shadow: inset 0 -2px 0 oklch(88% 0.06 292);
}

.control-field {
  display: grid;
  gap: 0.45rem;
}

.control-field span {
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
}

.control-field input,
.control-field select,
.control-field textarea,
.modal-search {
  width: 100%;
  border: 1px solid oklch(100% 0 0 / 0.08);
  border-radius: 8px;
  background: oklch(7% 0.012 260 / 0.78);
  color: var(--text-primary);
  font: inherit;
  outline: none;
}

.control-field input,
.control-field select,
.modal-search {
  min-height: 3rem;
  padding: 0 0.85rem;
}

.control-field textarea {
  min-height: 8rem;
  resize: vertical;
  padding: 0.85rem;
}

.model-list {
  display: grid;
  max-height: 14rem;
  overflow: auto;
  border: 1px solid oklch(100% 0 0 / 0.08);
  border-radius: 8px;
  padding: 0.45rem;
}

.model-option {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 0.75rem;
  padding: 0.7rem;
  border-radius: 8px;
}

.model-option.selected {
  background: oklch(100% 0 0 / 0.06);
}

.model-option span {
  display: grid;
  min-width: 0;
}

.model-option em,
.model-meta span {
  overflow: hidden;
  color: var(--text-muted);
  font-size: 0.76rem;
  font-style: normal;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.model-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.sync-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 3.5rem;
  border-radius: 8px;
  padding: 0 0.85rem;
  background: oklch(100% 0 0 / 0.05);
  color: var(--text-muted);
  font-size: 0.84rem;
}

.generate-now {
  min-height: 3.2rem;
  background: oklch(64% 0.2 292);
  color: white;
}

.export-panel {
  display: grid;
  gap: 0.9rem;
  border-radius: 8px;
  padding: 1rem;
}

.export-panel-head {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;

.export-summary span {

.export-history {

  padding: 0;

}

.export-history-item {

  justify-content: space-between;

  padding: 0.65rem 0.75rem;

.export-history-item div {

.export-history-item span,

.export-history-empty {

.download-placeholder {

}

.export-delivery-grid dt,
.export-delivery-grid dd {

.export-delivery-grid dt,

.export-download-link {

.generation-diagnostics-grid {

}

.generation-diagnostics-card {

  gap: 0.55rem;
  padding: 0.8rem;
  border-radius: 8px;
  background: oklch(100% 0 0 / 0.04);
}

.generation-diagnostics-card header {

  flex-wrap: wrap;
  justify-content: space-between;
  gap: 0.5rem;
}

.generation-diagnostics-list {

  gap: 0.45rem;
  margin: 0;
  padding: 0;
  list-style: none;
}

.generation-diagnostics-list li {

  gap: 0.15rem;
  padding: 0.5rem 0.65rem;

.export-warning ul {

}

.workbench-toast {

.modal-backdrop {

.script-modal {

}

}

.original-script-actions {

  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: 0.75rem;
  align-items: center;
}

.original-script-actions p {
  display: flex;
  gap: 0.75rem;
  margin: 0;
  color: var(--text-muted);
}

.modal-tabs {

  gap: 0.5rem;
  align-items: center;

  padding: 0.55rem;
  background: rgba(17, 18, 23, 0.4);
}

.modal-tab,
.modal-close {

}

.modal-tab {

}

.modal-tab.active {

}

.modal-close {
  width: 2.5rem;
  padding: 0;
  justify-self: end;
  color: rgba(255, 255, 255, 0.92);

}

.upload-modal-close {

  height: 3.4rem;
}

.modal-panel {

  padding: 1.2rem 0 0;
}

.upload-panel-stack,
.upload-library-panel,
.storyboard-upload-shell {

  align-content: start;
  gap: 1rem;
}

.library-placeholder,
.upload-dropzone,
.storyboard-guide-card,
.storyboard-format-block {

  border-radius: 1.35rem;
  background: rgba(43, 45, 55, 0.92);
  color: var(--text-muted);
}

.upload-library-panel {
  gap: 1.2rem;
}

.library-placeholder {

  padding: 1.8rem;
  text-align: center;
}

.upload-tip-line {

  align-items: center;
  gap: 0.75rem;
  margin: 0;
  color: rgba(235, 237, 244, 0.86);
  font-size: 0.98rem;
  font-weight: 700;
}

.upload-tip-icon {
  color: rgba(255, 255, 255, 0.68);
  font-size: 1.15rem;
}

.upload-tip-link {
  padding: 0;
  border: 0;
  background: transparent;
  color: #8f63ff;

  font-weight: 800;
}

.upload-dropzone {
  display: grid;
  align-content: center;
  justify-items: center;

}

}

.upload-dropzone strong {

}

.upload-dropzone span:last-child {
  color: rgba(255, 255, 255, 0.52);
  font-size: 0.92rem;
}

.upload-dropzone-icon {
  display: grid;
  width: 4.4rem;
  height: 4.4rem;
  place-items: center;
  color: rgba(255, 255, 255, 0.66);
}

.upload-dropzone-icon svg {
  width: 2.9rem;
  height: 2.9rem;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.storyboard-upload-shell {
  grid-template-columns: minmax(20rem, 34rem) minmax(0, 1fr);
  gap: 1rem;
}

.storyboard-guide-card {
  gap: 1.15rem;
  padding: 1.5rem 1.35rem;
}

.storyboard-guide-copy {

  gap: 0.75rem;
}

.storyboard-guide-copy h3 {
  margin: 0;
  color: #fff;
  font-size: 1.5rem;
  font-weight: 900;
}

.storyboard-guide-copy p,
.storyboard-format-block p {
  margin: 0;
  color: rgba(236, 238, 245, 0.66);
  font-size: 0.95rem;
  line-height: 1.55;
}

.storyboard-format-block {
  gap: 0.85rem;
}

.storyboard-format-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
}

.storyboard-format-head strong {
  color: #fff;
  font-size: 1rem;
}

.template-button {
  border-color: rgba(151, 91, 255, 0.76);
  color: #fff;
}

.storyboard-sample {
  position: relative;
  min-height: 7.6rem;
  overflow: hidden;
  border-radius: 0.8rem;
  border: 1px solid rgba(255, 255, 255, 0.06);
}

.storyboard-sample span {
  position: absolute;
  left: 0.75rem;
  top: 0.55rem;
  z-index: 1;
  border-radius: 0.45rem;
  padding: 0.18rem 0.45rem;
  background: rgba(33, 34, 41, 0.88);
  color: rgba(255, 255, 255, 0.9);
  font-size: 0.72rem;
  font-weight: 700;
}

.storyboard-sample.script {
  background:
    linear-gradient(180deg, rgba(82, 119, 179, 0.78) 0 0.55rem, transparent 0.55rem),

}

.storyboard-sample.script::before,
.storyboard-sample.sheet::before {
  position: absolute;
  inset: 0.85rem 1rem 0.85rem 1rem;
  content: "";
  opacity: 0.95;
}

.storyboard-sample.script::before {
  background:
    linear-gradient(180deg, transparent 0 0.25rem, rgba(87, 85, 96, 0.16) 0.25rem 0.33rem, transparent 0.33rem 0.8rem),
    linear-gradient(180deg, transparent 0 1.1rem, rgba(220, 48, 48, 0.7) 1.1rem 1.24rem, transparent 1.24rem 1.75rem),
    linear-gradient(180deg, transparent 0 2rem, rgba(87, 85, 96, 0.16) 2rem 2.08rem, transparent 2.08rem 2.55rem),

}

.storyboard-sample.sheet {
  background:
    linear-gradient(180deg, rgba(124, 188, 82, 0.8) 0 0.55rem, transparent 0.55rem),
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(242, 243, 247, 0.96));
}

.storyboard-sample.sheet::before {
  background:
    repeating-linear-gradient(90deg, rgba(60, 61, 68, 0.16) 0 1px, transparent 1px 3.4rem),
    repeating-linear-gradient(180deg, rgba(60, 61, 68, 0.16) 0 1px, transparent 1px 1.65rem);
}

.upload-modal-actions {
  grid-template-columns: minmax(0, 1fr) auto;
  padding-top: 1.25rem;
}

.upload-confirm-button {
  min-width: 11rem;
  min-height: 3.85rem;
  border-radius: 0.95rem;
  padding-inline: 1.4rem;
  background: linear-gradient(90deg, #8637ff, #a34dff);
  box-shadow: 0 0.9rem 2rem rgba(125, 56, 255, 0.22);
}

.modal-actions {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  align-items: center;
  gap: 0.75rem;
  padding-top: 1rem;
}

.project-interior {

.interior-asset-card.ochre {
  background:
    radial-gradient(circle at 76% 30%, rgba(177, 156, 14, 0.58), transparent 8rem),
    linear-gradient(120deg, #362a25, #151720 72%);
}

.interior-asset-card.cyan {
  background:
    radial-gradient(circle at 84% 50%, rgba(0, 158, 185, 0.52), transparent 8rem),
    linear-gradient(120deg, #172f40, #151720 72%);
}

.asset-card-summary {
  position: relative;
  z-index: 2;
  display: grid;
  align-content: start;
  justify-items: start;
  gap: 0.15rem;
  margin-top: 2rem;
}

.asset-card-label {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  color: rgba(255, 255, 255, 0.82);
  font-size: 1rem;
  font-weight: 800;
}

.asset-card-label b {
  font-size: 1rem;
  color: rgba(255, 255, 255, 0.7);
}

.asset-card-count {
  color: #fff;
  font-size: 2.2rem;
  line-height: 1;
  font-weight: 900;
  letter-spacing: -0.04em;
  text-shadow: 0 0.35rem 1.4rem rgba(0, 0, 0, 0.18);
}

.asset-card-preview-stack {
  position: absolute;
  right: 2.2rem;
  bottom: -0.8rem;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  pointer-events: none;
}

.asset-card-preview-stack img {
  width: 5.6rem;
  height: 7.8rem;
  margin-left: -1.6rem;
  border: 0.28rem solid rgba(255, 255, 255, 0.94);
  border-radius: 0.9rem;
  object-fit: cover;
  box-shadow: 0 1rem 2.4rem rgba(0, 0, 0, 0.35);
  transform: rotate(-5deg);
}

.asset-card-preview-stack img:nth-child(2) {
  transform: translateY(-0.5rem) rotate(4deg);
}

.asset-card-preview-stack img:nth-child(3) {
  transform: translateY(0.4rem) rotate(10deg);
}

.comic-art {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.comic-art::before,
.comic-art::after {
  position: absolute;
  content: "";
}

.comic-art.character::before {
  right: 2.8rem;
  bottom: -2.2rem;
  width: 9rem;
  height: 12rem;
  border-radius: 52% 48% 0 0;
  background:
    linear-gradient(112deg, transparent 0 39%, #f8f8f8 40% 61%, transparent 62%),
    radial-gradient(circle at 50% 22%, #050507 0 2.8rem, transparent 2.9rem),
    linear-gradient(150deg, #ffffff 0 43%, #060608 44% 100%);
  filter: contrast(1.25);
  transform: rotate(-8deg);
}

.comic-art.character::after {
  right: 0.7rem;
  top: 0.2rem;
  width: 10.5rem;
  height: 10.5rem;
  opacity: 0.38;
  background: radial-gradient(circle, #050507 0 0.16rem, transparent 0.18rem) 0 0 / 0.86rem 0.86rem;
}

.comic-art.scene::before {
  right: 2.5rem;
  bottom: -0.9rem;
  width: 13rem;
  height: 8.5rem;
  background:
    linear-gradient(160deg, transparent 0 32%, #fff 33% 37%, #050507 38% 52%, #fff 53% 59%, transparent 60%),
    linear-gradient(90deg, transparent 0 12%, #fff 13% 25%, #050507 26% 35%, #fff 36% 52%, transparent 53%),
    linear-gradient(0deg, #050507 0 26%, #fff 27% 44%, transparent 45%);
  clip-path: polygon(5% 100%, 18% 42%, 38% 62%, 44% 18%, 60% 52%, 82% 28%, 100% 100%);
}

.comic-art.scene::after {
  right: -0.4rem;
  top: 0.5rem;
  width: 9.8rem;
  height: 9.8rem;
  opacity: 0.3;
  background: radial-gradient(circle, #050507 0 0.14rem, transparent 0.16rem) 0 0 / 0.72rem 0.72rem;
}

.comic-art.prop::before {
  right: 2.5rem;
  bottom: -0.6rem;
  width: 11rem;
  height: 10rem;
  background:
    linear-gradient(75deg, transparent 0 43%, #fff 44% 48%, #050507 49% 52%, #fff 53% 57%, transparent 58%),
    radial-gradient(ellipse at 54% 72%, #fff 0 3rem, #050507 3.1rem 3.35rem, transparent 3.45rem);
  transform: rotate(16deg);
}

.comic-art.prop::after {
  right: 0;
  top: -1rem;
  width: 10rem;
  height: 8rem;
  background: repeating-linear-gradient(74deg, rgba(5, 5, 7, 0.72) 0 0.24rem, transparent 0.25rem 0.72rem);
}

.comic-art.other::before {
  right: 3rem;
  top: -0.35rem;
  width: 9rem;
  height: 12.8rem;
  border: 0.35rem solid #050507;
  background:
    linear-gradient(90deg, #079bb2 0 0.44rem, transparent 0.45rem calc(100% - 0.45rem), #079bb2 calc(100% - 0.44rem)),
    linear-gradient(104deg, transparent 0 45%, #fff 46% 58%, transparent 59%),
    #f7f7f7;
  transform: rotate(10deg);
}

.comic-art.other::after {
  right: 5.15rem;
  top: 1.6rem;
  width: 3rem;
  height: 3rem;
  background: #050507;
  clip-path: polygon(24% 12%, 84% 50%, 24% 88%);
  transform: rotate(10deg);
}

.episode-creation-section {
  padding-top: 2.25rem;
}

.episode-section-header {
  align-items: flex-end;
}

.episode-section-title {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0;
  border: 0;
  background: transparent;
}

.episode-section-name {
  margin-left: auto;
  color: var(--interior-muted);
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.01em;
}

.episode-empty-canvas {
  position: relative;
  min-height: 18rem;
  margin-top: 0.95rem;
  overflow: hidden;
  border: 1px solid var(--interior-line);
  border-radius: 1.4rem;
  background:
    radial-gradient(circle at 50% 44%, rgba(255, 255, 255, 0.05), transparent 11rem),
    linear-gradient(180deg, #1a1d27, #181b24 65%, #161922);
}

.episode-overview-canvas {
  min-height: 18rem;
  margin-top: 0.95rem;
  padding: 1.35rem 1.4rem;
  border: 1px solid var(--interior-line);
  border-radius: 1.4rem;
  background: linear-gradient(180deg, #1d2029, #1a1d26);
}

.episode-overview-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(16.25rem, 16.25rem));
  gap: 1rem;
  align-content: start;
  justify-content: start;
}

.episode-overview-list .episode-library-card {
  min-height: 12.45rem;
  padding: 0.55rem;
  border-radius: 1rem;
}

.episode-overview-list .episode-card-preview {
  position: relative;
  height: 7.35rem;
  border-radius: 0.85rem;
  font-size: 1.15rem;
}

.episode-overview-list .episode-card-body {
  gap: 0.55rem;
  padding: 0.55rem 0.15rem 0.1rem;
  align-items: flex-end;
}

.episode-overview-list .episode-card-copy {
  gap: 0.18rem;
  align-content: end;
  padding-top: 0;
}

.episode-overview-list .episode-card-copy h3 {
  font-size: 0.98rem;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.episode-overview-list .episode-card-copy p,
.episode-overview-list .episode-card-copy strong {
  font-size: 0.78rem;
  line-height: 1.2;
}

.episode-overview-list .episode-card-actions {
  align-self: flex-end;
}

.episode-canvas-glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 12% 28%, rgba(255, 255, 255, 0.04), transparent 12rem),
    linear-gradient(90deg, rgba(255, 255, 255, 0.03), transparent 46%);
}

.episode-canvas-copy {
  position: absolute;
  inset: 0;
  display: grid;
  place-content: center;
  gap: 0.25rem;
  opacity: 0;
  text-align: center;
  transition: opacity 180ms ease;
}

.episode-canvas-copy.always-visible {
  opacity: 1;
}

.episode-empty-canvas:hover .episode-canvas-copy {
  opacity: 1;
}

.episode-canvas-copy strong {
  font-size: 1.02rem;
}

.episode-canvas-copy span {
  color: var(--interior-muted);
  font-size: 0.86rem;
}

.episode-inline-link {
  padding: 0;
  border: 0;
  background: transparent;
  color: #f6f1ff;
  font: inherit;
  font-weight: 800;
  text-decoration: underline;
  text-underline-offset: 0.18rem;
}

.interior-toast {
  padding: 0.65rem 1.85rem 1rem;
  opacity: 0.72;
}

.episode-hub-shell {
  min-height: calc(100vh - 78px);
  border: 1px solid var(--interior-line);
  border-top: 0;
  border-left: 0;
  border-radius: 0 0.45rem 0.45rem 0;
  background: #08090e;
  padding: 1.8rem 1.6rem 2rem;
}

.episode-hub-shell.empty .episode-hub-cards {
  display: grid;
  gap: 1rem;
  width: min(100%, 56rem);
  margin: 8.5rem auto 0;
}

.episode-hub-shell.populated .episode-hub-grid {
  --episode-hub-card-height: 15rem;
  --episode-hub-launch-gap: 0.55rem;
  --library-media-card-width: 15rem;
  display: grid;
  grid-template-columns: repeat(2, minmax(var(--library-media-card-width), var(--library-media-card-width)));
  gap: 1rem;
  align-items: start;
  width: fit-content;
  max-width: 100%;
}

.episode-hub-shell.populated .episode-hub-launches {
  display: grid;
  gap: var(--episode-hub-launch-gap);
}

.episode-hub-shell.populated .episode-hub-list {
  display: contents;
}

.episode-hub-header,
.episode-hub-tabs,
.episode-launch-card,
.episode-launch-copy,
.single-episode-modal-head,
.single-episode-actions {
  display: flex;
}

.episode-hub-header {
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.55rem;
}

.episode-hub-tabs {
  align-items: center;
  gap: 1.35rem;
}

.episode-hub-tabs strong,
.episode-history-tab {
  color: #fff;
  font-size: 1.55rem;
  font-weight: 900;
}

.episode-history-tab {
  padding: 0;
  border: 0;
  background: transparent;
  color: rgba(255, 255, 255, 0.7);
}

.episode-hub-launches {
  display: grid;
  gap: 1.15rem;
}

.episode-hub-list {
  display: grid;
  grid-template-columns: minmax(17.25rem, 17.25rem);
  gap: 1rem;
  align-content: start;
  min-height: 100%;
}

.episode-launch-card {
  position: relative;
  align-items: stretch;
  min-height: 14.75rem;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 2rem;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
}

.episode-launch-card.single {
  min-height: 10.25rem;
}

.episode-hub-shell.populated .episode-launch-card {
  min-height: calc((var(--episode-hub-card-height) - var(--episode-hub-launch-gap)) / 2);
  border-radius: 1.15rem;
}

.episode-hub-shell.populated .episode-launch-card.single {
  min-height: calc((var(--episode-hub-card-height) - var(--episode-hub-launch-gap)) / 2);
}

.episode-library-card {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 0.8rem;
  min-height: 6.25rem;
  padding: 0.95rem 1rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 1.4rem;
  cursor: pointer;
  transition:
    transform 180ms ease,
    border-color 180ms ease,
    box-shadow 180ms ease;
  background:
    radial-gradient(circle at 72% 18%, rgba(130, 100, 255, 0.18), transparent 10rem),
    linear-gradient(135deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02));
}

.episode-hub-shell.populated .episode-library-card {
  min-height: var(--episode-hub-card-height);
  padding: 0.82rem 0.9rem 0.9rem;
  border-radius: 1.15rem;
}

.episode-library-card:hover {
  border-color: rgba(255, 255, 255, 0.16);
  box-shadow: 0 1.2rem 2.5rem rgba(0, 0, 0, 0.24);
  transform: translateY(-2px);
}

.episode-workbench-screen {
  display: grid;
  gap: 1rem;
}

.episode-workbench-utility-bar {
  grid-column: 2 / -1;
  grid-row: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 3.45rem;
  padding: 0.32rem 0.4rem 0.5rem;
}

.episode-workbench-utility-search {
  flex: 1 1 auto;
  min-height: 2.85rem;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 0.92rem;
  background: linear-gradient(180deg, rgba(18, 19, 27, 0.98), rgba(20, 21, 29, 0.98));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
}

.episode-workbench-utility-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.55rem;
  flex-wrap: wrap;
}

.episode-workbench-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 2.75rem;
  padding: 0 1rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 0.82rem;
  background: rgba(24, 25, 34, 0.96);
  color: rgba(246, 246, 252, 0.92);
  font-size: 0.88rem;
  font-weight: 800;
  white-space: nowrap;
}

.episode-workbench-pill.promo {
  border-color: rgba(86, 226, 241, 0.24);
  background: linear-gradient(90deg, #d9c755, #17d4f2);
  color: #111319;
}

.episode-workbench-pill.icon {
  min-width: 2.75rem;
  padding-inline: 0.75rem;
}

.episode-workbench-pill.avatar {
  min-width: 2.85rem;
  border-radius: 0.95rem;
  background: linear-gradient(180deg, #6d7cff, #6170ff);
  color: #fff;
}

.episode-media-chrome {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 2.8rem;
}

.episode-workbench-back-button {
  position: fixed;
  top: 0.15rem;
  left: 0.15rem;
  z-index: 40;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 4.9rem;
  height: 2.35rem;
  padding: 0 1rem;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 1.15rem;
  background:
    linear-gradient(180deg, rgba(24, 26, 34, 0.96), rgba(11, 13, 19, 0.98));
  color: rgba(244, 244, 251, 0.94);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.05),
    0 0.85rem 2rem rgba(0, 0, 0, 0.28),
    0 0 0 1px rgba(255, 255, 255, 0.02);
  font-size: 0.98rem;
  font-weight: 800;
  letter-spacing: 0;
  line-height: 1;
  white-space: nowrap;
  backdrop-filter: blur(12px);
  transition:
    border-color 160ms ease,
    box-shadow 160ms ease,
    background 160ms ease,
    transform 160ms ease;
}

.episode-workbench-back-button:hover,
.episode-workbench-back-button:focus-visible {
  border-color: rgba(255, 255, 255, 0.2);
  background:
    linear-gradient(180deg, rgba(36, 39, 49, 0.98), rgba(18, 20, 28, 0.98));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.07),
    0 1rem 2.4rem rgba(0, 0, 0, 0.34),
    0 0 0 1px rgba(255, 255, 255, 0.04);
  transform: translateX(-1px);
}

.cinematic-layout {
  grid-template-columns: minmax(7rem, 7rem) minmax(0, 1fr) minmax(25rem, 27rem);
  grid-template-rows: auto auto minmax(0, 1fr);
  gap: 0.6rem;
  min-height: 52rem;
  align-items: stretch;
}

.episode-media-header {
  grid-column: 2 / -1;
  grid-row: 2;
  border-radius: 1rem;
  padding: 0.2rem 1.1rem 0.1rem;
  background: linear-gradient(180deg, rgba(26, 27, 36, 0.98), rgba(24, 25, 34, 0.95));
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
}

.episode-media-tabs {
  display: flex;
  justify-content: center;
  flex: 1 1 auto;
  gap: clamp(2rem, 6vw, 4.25rem);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  padding-top: 0.05rem;
}

.episode-media-tab {
  position: relative;
  padding: 0 0 0.7rem;
  border: 0;
  background: transparent;
  color: rgba(205, 205, 220, 0.82);
  font-size: 0.96rem;
  font-weight: 700;
}

.episode-media-tab.active {
  color: #f5d8ff;
}

.episode-media-tab.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -1px;
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(244, 211, 255, 0.9), rgba(255, 255, 255, 0.75));
}

.cinematic-sidebar,
.cinematic-stage,
.director-console {
  background: linear-gradient(180deg, rgba(28, 29, 39, 0.98), rgba(25, 26, 35, 0.96));
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
}

.cinematic-sidebar {
  grid-column: 1;
  grid-row: 2 / 4;
  position: relative;
  z-index: 3;
  overflow: visible;
  padding: 0.8rem 0.95rem 0.9rem;
  border-radius: 1rem;
}

.cinematic-thumb {
  position: relative;
  min-height: 5.15rem;
  height: 5.15rem;
  display: block;
  overflow: hidden;
  padding: 0.14rem;
  border-radius: 0.5rem;
  background: #000;
}

.shot-thumb-shell {
  position: relative;
  width: 100%;
  min-width: 0;
  z-index: 0;
}

.shot-thumb-shell:hover,
.shot-thumb-shell:focus-within {
  z-index: 60;
}

.shot-thumb-shell > .shot-thumb {
  width: 100%;
}

.shot-thumb-menu-button {
  position: absolute;
  right: 0;
  bottom: 0;
  z-index: 6;
  width: auto;
  height: auto;
  min-width: 0;
  min-height: 0;
  padding: 0;
  border: 0;
  border-radius: 0;
  background: transparent;
  color: rgba(245, 245, 250, 0.92);
  overflow: visible;
  opacity: 0;
  transform: translateY(0.18rem) scale(0.96);
  transition:
    opacity 160ms ease,
    transform 160ms ease,
    color 160ms ease;
}

.shot-thumb-shell:hover .shot-thumb-menu-button,
.shot-thumb-shell:focus-within .shot-thumb-menu-button {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.shot-thumb-menu-button:hover,
.shot-thumb-menu-button:focus-visible {
  background: transparent;
  color: #fff;
}

.shot-thumb-menu-button span {
  position: static;
  display: block;
  font-size: 1.2rem;
  font-weight: 800;
  line-height: 1;
  transform: translate(0.08rem, 0.08rem);
  pointer-events: none;
}

.cinematic-thumb.has-image-preview,
.cinematic-thumb.has-video-preview {
  min-height: 5.35rem;
  height: 5.35rem;
  padding: 0.14rem;
}

.shot-thumb.has-image-preview > span,
.shot-thumb.has-video-preview > span {
  left: 0.62rem;
  top: 0.42rem;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
}

.shot-thumb.has-image-preview > strong,
.shot-thumb.has-video-preview > strong {
  right: 0.5rem;
  top: 0.42rem;
  background: rgba(92, 92, 102, 0.92);
}

.shot-sidebar-head,
.shot-add-card,
.timeline-button,
.secondary-action.compact {
  font-size: 0.88rem;
}

.shot-thumb span {
  font-size: 0.95rem;
  z-index: 2;
}

.shot-thumb strong {
  font-size: 0.7rem;
  line-height: 1;
  white-space: nowrap;
  z-index: 2;
}

.cinematic-thumb > span {
  position: absolute;
  left: 0.45rem;
  top: 0.42rem;
}

.cinematic-thumb > strong {
  position: absolute;
  right: 0.45rem;
  top: 0.34rem;
}

.shot-thumb em {
  display: none;
}

.shot-thumb-preview {
  position: absolute;
  inset: 0.14rem;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
  min-height: 0;
  height: auto;
  border-radius: 0.36rem;
  background: #000;
}

.shot-thumb-placeholder {
  display: grid;
  place-items: center;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 50% 42%, rgba(147, 139, 209, 0.32) 0 0.55rem, transparent 0.58rem),
    radial-gradient(circle at 50% 48%, rgba(127, 111, 211, 0.18), transparent 36%),
    linear-gradient(180deg, rgba(16, 17, 22, 0.96), rgba(7, 8, 12, 1));
}

.shot-thumb-placeholder span {
  width: 1.75rem;
  height: 1.75rem;
  border-radius: 0.25rem;
  background:
    radial-gradient(circle at 67% 35%, rgba(203, 197, 255, 0.8) 0 0.22rem, transparent 0.24rem),
    linear-gradient(135deg, transparent 0 45%, rgba(179, 168, 245, 0.65) 46% 70%, transparent 71%),
    linear-gradient(180deg, rgba(77, 75, 105, 0.95), rgba(40, 41, 57, 0.98));
}

.shot-thumb-preview video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.shot-thumb-preview i {
  position: absolute;
  right: 0.28rem;
  top: 0.28rem;
  display: grid;
  width: 1rem;
  height: 1rem;
  place-items: center;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.92);
  color: #111318;
  font-size: 0.5rem;
  font-style: normal;
}

.cinematic-thumb .shot-thumb-preview {
  width: auto;
  min-height: 0;
  height: auto;
  border-radius: 0.36rem;
  background:
    radial-gradient(circle at 70% 24%, rgba(149, 122, 255, 0.2), transparent 1.2rem),
    #000;
}

.cinematic-thumb.active {
  border-color: rgba(160, 92, 255, 0.92);

  gap: 1rem;
  width: min(100%, 28rem);
}

.episode-replica-preview-hero {
  height: 15rem;
  border-radius: 1.2rem;
  overflow: hidden;
  background: #2a2a2d;
}

.episode-replica-preview-copy {
  display: grid;
  gap: 0.45rem;
  padding: 1rem;
  border-radius: 1rem;
  background: #242427;
}

.episode-replica-preview-copy strong {
  font-size: 1.1rem;
}

.episode-replica-preview-copy p {
  margin: 0;
  color: rgba(255, 255, 255, 0.72);
  line-height: 1.6;
}

.episode-replica-generated-stage {
  display: grid;
  gap: 1rem;
  min-height: 31rem;
  visibility: hidden;
  pointer-events: none;
}

.episode-replica-generated-stage.visible {
  visibility: visible;
  pointer-events: none;
}

.episode-replica-result-panel {
  display: grid;
  gap: 0.7rem;
  width: min(100%, 34rem);
  margin-left: auto;
  padding: 1rem 1.1rem;
  pointer-events: auto;
  border-radius: 1.2rem;
  background: #2a2a2d;
}

.episode-replica-result-panel .copy {
  color: #fff;
  font-size: 0.98rem;
  font-weight: 900;
  line-height: 1.45;
}

.episode-replica-result-panel .assets {
  gap: 0.45rem;
  flex-wrap: wrap;
}

.episode-replica-mini-thumb {
  display: inline-block;
  width: 2.8rem;
  height: 2.8rem;
  border-radius: 0.55rem;
  overflow: hidden;
}

.episode-replica-result-panel .voice {
  display: inline-grid;
  width: 2.3rem;
  height: 2.3rem;
  place-items: center;
  border-radius: 999px;
  background: #555;
}

.episode-replica-result-panel time {
  justify-self: end;
  color: rgba(255, 255, 255, 0.62);
  font-size: 0.88rem;
  font-weight: 900;
}

.episode-replica-generated-preview {
  width: 100%;
  min-height: 24rem;
  border-radius: 1rem;
  background: #181818;
  overflow: hidden;
}

.episode-replica-stage-canvas {
  position: relative;
  display: grid;
  grid-template-columns: 11rem 1fr;
  align-content: start;
  gap: 0.9rem 1rem;
  min-height: 24rem;
  padding: 0.4rem 0;
}

.episode-replica-stage-canvas.video {
  grid-template-columns: 1fr;
}

.episode-replica-canvas-tile {
  border-radius: 1rem;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)), #333;
}

.episode-replica-canvas-tile.large {
  grid-column: 1;
  width: 11rem;
  height: 11rem;
}

.episode-replica-canvas-tile.small {
  grid-column: 1;
  width: 7rem;
  height: 2.4rem;
  border-radius: 999px;
}

.episode-replica-canvas-note {
  grid-column: 2;
  grid-row: 1 / span 2;
  align-self: center;
  justify-self: center;
  color: #ff4f4f;
  font-size: 0.95rem;
  font-weight: 500;
}

.episode-replica-prompt {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 0.6rem;
  padding: 0 1rem 1rem;
  background: #191919;
}

.episode-replica-ref-strip {
  align-items: flex-end;
  gap: 0.5rem;
  min-height: 7.6rem;
  overflow-x: auto;
  overflow-y: hidden;
  padding-top: 0.25rem;
}

.episode-replica-upload-card,
.episode-replica-ref-card {
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 0.4rem;
  width: 6.7rem;
  min-width: 6.7rem;
  height: 7.8rem;
  padding: 0.5rem;
  border-radius: 1rem;
  text-align: center;
}

.episode-replica-ref-card.voice {
  width: 6rem;
  min-width: 6rem;
}

.episode-replica-ref-card.attachment {
  position: relative;
  justify-items: center;
}

.episode-replica-ref-remove {
  position: absolute;
  top: 0.35rem;
  right: 0.35rem;
  z-index: 2;
  width: 1.35rem;
  height: 1.35rem;
  border: 0;
  border-radius: 999px;
  background: rgba(18, 18, 20, 0.82);
  color: rgba(255, 255, 255, 0.88);
  font: inherit;
  font-weight: 900;
}

.episode-replica-ref-art {
  display: grid;
  place-items: center;
  width: 100%;
  height: 4.2rem;
  border-radius: 0.9rem;
  overflow: hidden;
  background: #2a2a2d;
}

.episode-replica-ref-art.audio {
  background: linear-gradient(180deg, #34363a, #2a2c31);
  color: #fff;
  font-size: 1.2rem;
}

.episode-replica-upload-card span {
  font-size: 1.15rem;
}

.episode-replica-mini,
.episode-replica-control {
  min-height: 2rem;
  padding: 0 0.8rem;
  border-radius: 999px;
  background: #2f3136;
  font-size: 0.82rem;
}

.episode-replica-mini-wrap,
.episode-replica-control-wrap {
  position: relative;
  display: inline-flex;
}

.episode-replica-float-menu {
  position: absolute;
  left: 0;
  bottom: calc(100% + 0.35rem);
  z-index: 15;
  display: grid;
  gap: 0.25rem;
  min-width: 6.2rem;
  padding: 0.5rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 0.8rem;
  background: #242424;
}

.episode-replica-float-menu.compact {
  min-width: 5rem;
}

.episode-replica-float-menu button {
  min-height: 2rem;
  border: 0;
  border-radius: 0.45rem;
  background: transparent;
  color: rgba(255, 255, 255, 0.88);
  text-align: left;
  font: inherit;
  font-weight: 800;
}

.episode-replica-textarea {
  position: relative;
  display: block;
}

.episode-replica-textarea textarea {
  width: 100%;
  min-height: 15.5rem;
  padding: 1.2rem 1rem 3rem;
  border: 0;
  border-radius: 1rem;
  background: #242424;
  color: #f5f5f5;
  font: inherit;
  font-size: 0.92rem;
  font-weight: 800;
  resize: none;
}

.episode-replica-textarea textarea::placeholder {
  color: rgba(173, 183, 198, 0.64);
}

.episode-replica-textarea .magic {
  position: absolute;
  top: 0.65rem;
  right: 0.8rem;
  display: inline-grid;
  width: 2rem;
  height: 2rem;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 999px;
}

.episode-replica-textarea em {
  position: absolute;
  right: 0.8rem;
  bottom: 0.8rem;
  color: rgba(255, 255, 255, 0.66);
  font-style: normal;
  font-weight: 900;
}

.episode-replica-generate {
  min-width: 8.8rem;
  min-height: 2.75rem;
  justify-content: space-between;
  padding: 0 0.85rem;
  background: #2f3136;
}

.episode-export-preview {
  margin-top: 0.85rem;
  padding: 0.95rem 1rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 1rem;
  background: rgba(255, 255, 255, 0.03);
}

.episode-export-preview-head {
  display: flex;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 0.45rem;
  color: #fff;
  font-weight: 700;
}

.episode-export-preview-warning,
.episode-export-preview-success {
  margin: 0;
  color: rgba(255, 255, 255, 0.72);
  line-height: 1.5;
}

.episode-export-preview-link {
  display: inline-flex;
  margin-top: 0.72rem;
  color: #9ed0ff;
  text-decoration: none;
}

.episode-batch-modal,
.episode-voice-picker-modal {
  width: min(92vw, 1180px);
  max-height: 86vh;
  overflow: auto;
  padding: 1.5rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 1.5rem;
  background: #1a1b20;
}

.episode-batch-modal-copy {
  margin: 0.4rem 0 1rem;
  color: rgba(255, 255, 255, 0.72);
}

.episode-batch-modal-list,
.episode-voice-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1rem;
}

.episode-batch-modal-item,
.episode-voice-card {
  display: grid;
  gap: 0.6rem;
  padding: 0.75rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 1.1rem;
  background: rgba(255, 255, 255, 0.03);
  color: #fff;
}

.episode-voice-card-actions {
  display: flex;
  gap: 0.6rem;
}

.episode-voice-card-actions button {
  flex: 1 1 0;
  padding: 0.55rem 0.75rem;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.04);
  color: #fff;
}

.episode-voice-card-actions button.active {
  border-color: rgba(126, 186, 255, 0.7);
  background: rgba(126, 186, 255, 0.12);
}

.episode-batch-modal-thumb img,
.episode-replica-preview-hero img,
.episode-voice-avatar {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 0.9rem;
}

.episode-voice-tabs {
  display: flex;
  gap: 0.75rem;
  margin: 0.8rem 0 1rem;
}

.episode-voice-tabs button {
  padding: 0.7rem 1.1rem;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.04);
  color: #fff;
}

.episode-voice-tabs button.active,
.episode-voice-card.active {
  border-color: rgba(126, 186, 255, 0.7);
  background: rgba(126, 186, 255, 0.12);
}

.episode-voice-avatar {
  display: block;
  background:
    radial-gradient(circle at 50% 34%, #222131 0 21%, transparent 22%),
    radial-gradient(circle at 50% 74%, #222131 0 32%, transparent 33%),
    linear-gradient(45deg, #d8d8d8 25%, #ececec 25%, #ececec 50%, #d8d8d8 50%, #d8d8d8 75%, #ececec 75%);
  background-size: auto, auto, 24px 24px;
}

.episode-replica-validation {
  margin: 0;
  color: #ffb5be;
  font-size: 0.8rem;
}

.episode-replica-audio-empty {
  display: grid;
  place-items: center;
  gap: 0.45rem;
  min-height: 7.5rem;
  border: 1px dashed rgba(255, 255, 255, 0.12);
  border-radius: 1rem;
  background: rgba(255, 255, 255, 0.02);
  color: rgba(255, 255, 255, 0.56);
  text-align: center;
}

.episode-replica-audio-empty-icon {
  display: grid;
  width: 2.5rem;
  height: 2.5rem;
  place-items: center;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.72);
  font-size: 1rem;
}

.episode-replica-audio-item {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 0.75rem;
  width: 100%;
  padding: 0.8rem 0.85rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 1rem;
  background: rgba(255, 255, 255, 0.03);
  color: #fff;
}

.episode-replica-audio-item.playing {
  border-color: rgba(126, 186, 255, 0.65);
  background: rgba(126, 186, 255, 0.12);
}

.episode-replica-audio-play {
  min-width: 5rem;
  padding: 0.55rem 0.8rem;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.4);
  color: #fff;
  font-size: 0.8rem;
  font-weight: 700;
}

.episode-replica-audio-copy {
  display: grid;
  min-width: 0;
  gap: 0.18rem;
}

.episode-replica-audio-copy strong,
.episode-replica-audio-copy p,
.episode-replica-audio-meta {
  margin: 0;
}

.episode-replica-audio-copy strong {
  font-size: 0.86rem;
}

.episode-replica-audio-copy p {
  overflow: hidden;
  color: rgba(255, 255, 255, 0.62);
  font-size: 0.76rem;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.episode-replica-audio-meta {
  border-radius: 999px;
  padding: 0.32rem 0.58rem;
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.82);
  font-size: 0.74rem;
  font-weight: 700;
}

.episode-replica-quick-asset {
  display: grid;
  gap: 0.35rem;
  width: 100%;
  padding: 0.32rem;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 1.2rem;
  background: #232325;
  color: #fff;
  text-align: center;
}

.episode-replica-quick-asset .thumb {
  display: block;
  width: 100%;
  aspect-ratio: 0.82 / 1;
  border-radius: 0.8rem;
  background: #444;
  overflow: hidden;
}

.episode-replica-quick-asset strong {
  display: block;
  overflow: hidden;
  padding: 0 0.1rem 0.1rem;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.78rem;
}

.episode-replica-placeholder,
.episode-replica-quick-art {
  position: relative;
  display: grid;
  place-items: center;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: inherit;
  background: radial-gradient(circle at 24% 20%, rgba(255, 255, 255, 0.18), transparent 26%), linear-gradient(140deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
}

.episode-replica-placeholder i,
.episode-replica-quick-art i {
  position: absolute;
  inset: 0;
  opacity: 0.9;
}

.episode-replica-placeholder b,
.episode-replica-quick-art b {
  position: relative;
  z-index: 1;
  padding: 0.25rem 0.55rem;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.82);
  color: #191919;
  font-size: 0.74rem;
  font-weight: 900;
}

.episode-replica-placeholder-character i,
.episode-replica-quick-art-character i {
  background: radial-gradient(circle at 20% 22%, #241616 0, #241616 18%, transparent 19%), radial-gradient(circle at 68% 24%, #a73c38 0, #a73c38 18%, transparent 19%), linear-gradient(180deg, #13171d 0%, #4b2a2a 55%, #d0c8c4 100%);
}

.episode-replica-placeholder-scene i,
.episode-replica-quick-art-scene i {
  background: radial-gradient(circle at 70% 18%, rgba(180, 220, 255, 0.25), transparent 22%), linear-gradient(180deg, #21323a 0%, #18302e 40%, #0a1113 100%);
}

.episode-replica-placeholder-prop i,
.episode-replica-quick-art-prop i {
  background: radial-gradient(circle at 22% 35%, rgba(255, 214, 140, 0.28), transparent 20%), linear-gradient(135deg, #2b2b2d 0%, #58514b 48%, #d8c199 100%);
}

.episode-asset-create-modal {
  position: relative;
  z-index: 2;
  display: grid;
  gap: 1.6rem;
  width: min(64rem, calc(100vw - 4rem));
  margin: auto;
  padding: 3rem 2rem 2rem;
  border-radius: 0.9rem;
  background: #1e1e22;
  box-shadow: 0 1.8rem 4rem rgba(0, 0, 0, 0.45);
}

.episode-asset-create-close {
  position: absolute;
  top: 0.9rem;
  right: 1rem;
  border: 0;
  background: transparent;
  color: rgba(255, 255, 255, 0.6);
  font-size: 1.6rem;
}

.episode-asset-create-group {
  display: grid;
  gap: 0.75rem;
}

.episode-asset-create-group > span {
  color: rgba(255, 255, 255, 0.86);
  font-size: 0.95rem;
  font-weight: 900;
}

.episode-asset-create-group > span em {
  color: #ff5a5a;
  font-style: normal;
}

.episode-asset-create-tabs {
  display: inline-flex;
  width: fit-content;
  padding: 0.2rem;
  border-radius: 999px;
  background: #303236;
}

.episode-asset-create-tabs button {
  min-height: 3.15rem;
  padding: 0 1.2rem;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: rgba(255, 255, 255, 0.72);
  font: inherit;
  font-size: 1rem;
  font-weight: 900;
}

.episode-asset-create-tabs button.active {
  background: #44474f;
  color: #fff;
}

.episode-asset-create-input-wrap {
  position: relative;
}

.episode-asset-create-input-wrap input {
  width: 100%;
  min-height: 3.2rem;
  padding: 0 6rem 0 1rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 0.35rem;
  background: #171717;
  color: #fff;
  font: inherit;
  font-size: 1rem;
  font-weight: 800;
}

.episode-asset-create-input-wrap em {
  position: absolute;
  top: 50%;
  right: 1rem;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.58);
  font-style: normal;
  font-weight: 900;
}

.episode-asset-create-save {
  width: 5.8rem;
  min-height: 3.3rem;
  border: 0;
  border-radius: 0.35rem;
  background: #87898f;
  color: #fff;
  font: inherit;
  font-size: 1rem;
  font-weight: 900;
}

@media (max-width: 1400px) {
  .episode-replica-layout {
    grid-template-columns: minmax(0, 1.45fr) minmax(19rem, 1fr) 6.2rem;
  }

  .episode-replica-asset-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 980px) {
  .episode-replica-shell {
    height: auto;
    overflow: auto;
  }

  .episode-replica-layout {
    grid-template-columns: 1fr;
    height: auto;
  }

  .episode-replica-center,
  .episode-replica-right {
    border: 0;
    padding-left: 0;
  }

  .episode-replica-right {
    grid-template-rows: auto auto;
  }
}

.episode-replica-left {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
  padding: 0 1rem 1rem 0;
}

.episode-replica-asset-toolbar.unified {
  display: flex;
  flex: 1 1 auto;
  flex-direction: column;
  min-height: 0;
  height: 100%;
  gap: 0;
}

.episode-replica-asset-toolbar-head {
  position: relative;
  z-index: 2;
  flex: 0 0 auto;
  padding: 0.1rem 0 1rem;
  background: #101010;
}

.episode-replica-asset-toolbar-main {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.9rem;
}

.episode-replica-asset-tabs {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.28rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  background: rgba(29, 29, 31, 0.96);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
}

.episode-replica-asset-tabs button {
  min-width: 4.9rem;
  min-height: 2.35rem;
  padding: 0 1rem;
  border-radius: 999px;
  background: transparent;
  color: rgba(255, 255, 255, 0.62);
  font-size: 0.92rem;
  font-weight: 900;
}

.episode-replica-asset-tabs button.active {
  background: linear-gradient(180deg, #6a6b71, #44454a);
  color: #fff;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.18),
    0 0.35rem 0.9rem rgba(0, 0, 0, 0.22);
}

.episode-replica-pill.active {
  background: linear-gradient(180deg, #a7dfff, #83cfff);
  color: #0b141d;
}

.episode-replica-asset-actions button {
  min-height: 2.45rem;
  padding: 0 1rem;
  border-radius: 999px;
  background: #2a2b2f;
  color: rgba(255, 255, 255, 0.88);
  font-size: 0.86rem;
}

.episode-replica-asset-sections {
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  overscroll-behavior: contain;
  display: grid;
  align-content: start;
  gap: 0.85rem;
  padding-bottom: 1rem;
}

.episode-replica-asset-section {
  min-height: auto;
}

.episode-replica-asset-grid {
  overflow: visible;
  padding-top: 0.15rem;
}

.episode-replica-asset-card {
  gap: 0.45rem;
  min-height: 18.6rem;
  padding: 1.15rem 1rem 1rem;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 1.5rem;
}

.episode-replica-asset-card.active {
  border-color: rgba(152, 214, 255, 0.48);
  box-shadow:
    0 0 0 1px rgba(152, 214, 255, 0.24),
    0 0.9rem 2rem rgba(0, 0, 0, 0.18);
}

.episode-replica-asset-card.checked {
  background: linear-gradient(180deg, #131315, #101012);
}

.episode-replica-asset-card-head {
  position: relative;
  min-height: 1.85rem;
}

.episode-replica-asset-select {
  display: grid;
  width: 100%;
  padding: 0;
  border: 0;
  background: transparent;
  text-align: left;
}

.episode-replica-asset-card .pick {
  top: 0.15rem;
  left: 0;
  width: 1.28rem;
  height: 1.28rem;
  border: 1px solid rgba(255, 255, 255, 0.24);
  background: rgba(255, 255, 255, 0.03);
}

.episode-replica-asset-card .pick.checked,
.episode-replica-asset-card.checked .pick {
  border-color: #91d6ff;
  background:
    radial-gradient(circle at center, #91d6ff 0 42%, transparent 45%),

/* Episode workbench ratio tune: mirror reference screenshot */
.episode-replica-layout {
  grid-template-columns: minmax(44rem, 1.32fr) minmax(28rem, 0.92fr) minmax(14rem, 0.5fr);

  min-width: 0;

.episode-replica-left {

.episode-replica-center {

.episode-replica-right {

.episode-replica-right-head span {

.episode-replica-right-search {

.episode-replica-right-list {

.episode-replica-right-empty {

.episode-replica-quick-asset {

.episode-replica-asset-card {

.episode-replica-asset-card .label:nth-of-type(2) {

}

.episode-replica-stage-head {

.episode-replica-stage-tabs {

}

.episode-replica-stage-title {

.episode-replica-stage-body {

.episode-replica-result-panel {

.episode-replica-result-panel .copy {

.episode-replica-result-panel .task-card {

.episode-replica-task-meta {

.episode-replica-task-line {

.episode-replica-task-line.muted {

.episode-replica-mini-thumb.enriched {

.episode-replica-task-id {

.episode-replica-task-status {

}

.episode-replica-task-status.running,
.episode-replica-task-status.pending,

}

.episode-replica-task-status.succeeded {

}

.episode-replica-task-status.failed {

}

.episode-replica-selection-pill {

  padding: 0 0.58rem;

.episode-replica-result-panel time {

.episode-replica-fixed-results {

}

.episode-replica-fixed-actions {

}

.episode-replica-fixed-actions button {

  padding: 0 0.68rem;

  background: #2b2d31;

}

.episode-replica-generated-preview {

.episode-replica-canvas-tile.filled {

}

.episode-replica-canvas-tile img,
.episode-replica-canvas-tile video {

  height: 100%;

}

.episode-replica-canvas-status.waiting {

}

.episode-replica-stage-actions {
  gap: 0.45rem;
  flex-wrap: wrap;
}

.episode-replica-stage-actions button {
  min-height: 2.15rem;
  padding: 0 0.85rem;
  border-radius: 999px;
  background: #2b2d31;
  font-size: 0.82rem;
}

.episode-replica-prompt {
  gap: 0.5rem;
  padding: 0 1rem 1rem;
}

.episode-replica-ref-strip {
  gap: 0.45rem;

}

.episode-replica-upload-card,
.episode-replica-ref-card {
  width: 5.7rem;

.episode-replica-ref-art {
  height: 3.75rem;

.episode-replica-ref-art img {

  height: 100%;

.episode-replica-ref-card.quick-reference {

}

.episode-replica-ref-card.quick-reference strong {
  display: block;
  margin-top: 0.38rem;

.episode-replica-ref-card.quick-reference small {
  display: -webkit-box;

  margin-top: 0.22rem;
  color: rgba(255, 255, 255, 0.64);

.episode-replica-mini,
.episode-replica-control {

.episode-replica-textarea textarea {
  min-height: 13rem;

.episode-replica-generate {

  min-height: 2.55rem;
  padding: 0 0.8rem;
  background: #2e3137;
  flex-shrink: 0;
}

.episode-replica-generate > strong:not(.episode-replica-generate-label) {

.episode-replica-preview-card {

}

.episode-replica-preview-hero {

@media (max-width: 1680px) {
  .episode-replica-layout {
    grid-template-columns: minmax(36rem, 1.26fr) minmax(24rem, 0.95fr) minmax(12rem, 0.46fr);

  .episode-replica-prompt-footer {

  .episode-replica-topbar {

  .episode-replica-topbar-left {

  }

  .episode-replica-main-switch {

  .episode-replica-stage-head,
  .episode-replica-stage-body,

  .episode-replica-result-panel,

  .episode-replica-stage-actions {

  }

  .episode-replica-stage-actions button,

.library-team-page {
  --library-team-accent: #48d0b4;
  --library-team-accent-strong: #f2c86b;
  --library-team-panel: color-mix(in srgb, var(--color-canvas-card, #191919) 92%, #ffffff 8%);
  --library-team-panel-soft: color-mix(in srgb, var(--color-canvas-soft, #1a1c20) 90%, #48d0b4 10%);
  min-height: 100%;
  padding: var(--space-xl, 24px);
  background:
    linear-gradient(180deg, rgba(72, 208, 180, 0.06), rgba(0, 0, 0, 0) 180px),
    var(--color-canvas, #0a0a0a);
  color: var(--color-ink, #ffffff);
  font-family: var(--font-sans, Inter, "PingFang SC", "Microsoft YaHei", sans-serif);
}

.library-team-page *,
.library-team-page *::before,
.library-team-page *::after {

}

.library-team-page button,
.library-team-page input,
.library-team-page select {

}

.library-team-page button:focus-visible,
.library-team-page input:focus-visible,
.library-team-page select:focus-visible,
.library-team-page a:focus-visible {
  outline: 2px solid var(--focus, #a0c3ec);
  outline-offset: 3px;

.library-team-shell {

  gap: var(--space-lg, 16px);
  max-width: 1380px;
  margin: 0 auto;
}

.library-team-page-head {

.library-team-page h1,
.library-team-page h2,

.library-team-page h2 {
