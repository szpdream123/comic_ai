<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Canvas Workflow Preview</title>
    <style>
      :root {
        --bg: #0f1111;
        --panel: #191b1b;
        --panel-2: #222524;
        --line: #343838;
        --line-strong: #5f6868;
        --text: #f2f4f1;
        --muted: #9aa29d;
        --quiet: #6f7772;
        --cyan: #55d6ff;
        --blue: #6aa8ff;
        --amber: #f2b84b;
        --green: #64d28a;
        --red: #ff6868;
        --coral: #ff756b;
        --shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "MiSans", "HarmonyOS Sans SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }

      button,
      textarea,
      select {
        font: inherit;
      }

      .app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.13) 1px, transparent 0) 0 0 / 24px 24px,
          linear-gradient(90deg, rgba(255, 255, 255, 0.025), transparent 40%, rgba(255, 255, 255, 0.018)),
          #101211;
      }

      .topbar {
        position: absolute;
        top: 18px;
        right: 22px;
        z-index: 30;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .icon-btn,
      .tool-btn {
        width: 48px;
        height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(32, 35, 34, 0.9);
        color: var(--text);
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
      }

      .icon-btn:hover,
      .tool-btn:hover {
        border-color: var(--line-strong);
        background: #292d2b;
      }

      .credits {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(32, 35, 34, 0.94);
        padding: 0 14px;
        color: var(--muted);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
      }

      .credits strong {
        color: var(--text);
      }

      .workspace-label {
        position: absolute;
        top: 112px;
        left: 82px;
        z-index: 4;
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 16px;
      }

      .node {
        position: absolute;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(22, 24, 23, 0.96);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .node.selected {
        border-color: rgba(255, 255, 255, 0.76);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18), var(--shadow);
      }

      .node.running {
        border-color: rgba(85, 214, 255, 0.72);
      }

      .node.running::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 42%;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--cyan), var(--blue));
        animation: scan 1.7s ease-in-out infinite;
      }

      @keyframes scan {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(260%);
        }
      }

      .node-header {
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        color: var(--muted);
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }

      .node-title {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .node-title strong {
        color: var(--text);
        font-size: 15px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--quiet);
      }

      .status-dot.green {
        background: var(--green);
      }

      .status-dot.cyan {
        background: var(--cyan);
        box-shadow: 0 0 18px rgba(85, 214, 255, 0.72);
      }

      .node-body {
        padding: 18px;
      }

      .script-node {
        left: 84px;
        top: 154px;
        width: 430px;
        height: 286px;
      }

      .script-copy {
        height: 196px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 18px;
        line-height: 1.8;
        font-size: 16px;
        color: #f5f7f4;
      }

      .script-copy b {
        display: inline-block;
        margin: 10px 0 4px;
      }

      .send-node {
        left: 622px;
        top: 132px;
        width: 490px;
        height: 328px;
      }

      .send-form {
        display: grid;
        gap: 12px;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field span {
        color: var(--muted);
        font-size: 12px;
      }

      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: #111312;
        color: var(--text);
        outline: none;
      }

      select {
        height: 38px;
        padding: 0 10px;
      }

      textarea {
        height: 112px;
        padding: 12px;
        resize: none;
        line-height: 1.55;
      }

      .run-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .context-pill {
        height: 34px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border-radius: 8px;
        background: rgba(85, 214, 255, 0.1);
        color: #c8f3ff;
        border: 1px solid rgba(85, 214, 255, 0.22);
        font-size: 13px;
      }

      .run-btn {
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #f7f7f2;
        color: #111;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .image-node {
        left: 1048px;
        top: 520px;
        width: 430px;
        height: 360px;
      }

      .image-preview {
        height: 220px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(85, 214, 255, 0.12), transparent 42%),
          linear-gradient(315deg, rgba(242, 184, 75, 0.16), transparent 36%),
          #262a28;
        display: grid;
        place-items: center;
      }

      .mountain {
        width: 96px;
        height: 72px;
        position: relative;
      }

      .mountain::before,
      .mountain::after {
        content: "";
        position: absolute;
        bottom: 0;
        border-left: 44px solid transparent;
        border-right: 44px solid transparent;
        border-bottom: 70px solid rgba(255, 255, 255, 0.22);
      }

      .mountain::after {
        right: -22px;
        border-left-width: 30px;
        border-right-width: 30px;
        border-bottom-width: 46px;
        border-bottom-color: rgba(255, 255, 255, 0.14);
      }

      .image-actions {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .ghost-action {
        height: 34px;
        border: 0;
        background: transparent;
        color: var(--text);
        display: inline-flex;
        gap: 10px;
        align-items: center;
        justify-content: flex-start;
        cursor: pointer;
      }

      .edge-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .node {
        z-index: 3;
      }

      .port {
        position: absolute;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid var(--line-strong);
        background: #121514;
        display: grid;
        place-items: center;
        color: var(--text);
        font-size: 14px;
      }

      .port.out {
        right: -13px;
        top: 142px;
      }

      .port.in {
        left: -13px;
        top: 156px;
      }

      .port.cyan {
        border-color: rgba(85, 214, 255, 0.75);
        box-shadow: 0 0 18px rgba(85, 214, 255, 0.38);
      }

      .dock {
        position: absolute;
        left: 50%;
        bottom: 26px;
        transform: translateX(-50%);
        z-index: 20;
        height: 64px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(35, 37, 36, 0.96);
        box-shadow: var(--shadow);
      }

      .tool-btn.primary {
        background: #f4f3ee;
        color: #121312;
      }

      .add-menu {
        position: absolute;
        left: calc(50% - 238px);
        bottom: 102px;
        z-index: 22;
        width: 306px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(35, 37, 36, 0.98);
        box-shadow: var(--shadow);
      }

      .menu-title {
        color: var(--muted);
        margin: 0 0 12px;
        font-size: 15px;
      }

      .menu-item {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
      }

      .menu-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #494d4b;
        display: grid;
        place-items: center;
        color: var(--text);
      }

      .badge {
        height: 20px;
        display: inline-flex;
        align-items: center;
        padding: 0 6px;
        border-radius: 5px;
        background: rgba(85, 214, 255, 0.24);
        color: #9ee9ff;
        font-size: 11px;
        font-weight: 700;
      }

      .zoom {
        position: absolute;
        left: 18px;
        bottom: 24px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
        font-weight: 700;
      }

      .mini-btn {
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(32, 35, 34, 0.96);
        color: var(--text);
        display: grid;
        place-items: center;
      }

      .inspector {
        position: absolute;
        right: 24px;
        bottom: 24px;
        width: 380px;
        height: 252px;
        z-index: 19;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(30, 32, 31, 0.96);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .inspector header {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .inspector-body {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .metric-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .metric {
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 16px;
      }

      .signature {
        position: absolute;
        right: 24px;
        top: 80px;
        z-index: 31;
        color: rgba(255, 255, 255, 0.42);
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 0;
      }

      .signature:hover {
        color: rgba(255, 255, 255, 0.78);
      }

      svg {
        display: block;
      }

      .edge {
        fill: none;
        stroke: rgba(160, 170, 170, 0.72);
        stroke-width: 3;
      }

      .edge.active {
        stroke: var(--cyan);
        filter: drop-shadow(0 0 9px rgba(85, 214, 255, 0.8));
        stroke-dasharray: 10 12;
        animation: dash 1.4s linear infinite;
      }

      @keyframes dash {
        to {
          stroke-dashoffset: -44;
        }
      }

      @media (max-width: 1100px) {
        .inspector {
          display: none;
        }

        .image-node {
          left: 700px;
        }

        .send-node {
          left: 560px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="AI 画布工作流设计预览">
      <div class="topbar">
        <button class="icon-btn" aria-label="分享">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 12h8" />
            <circle cx="6" cy="12" r="2" />
            <circle cx="18" cy="7" r="2" />
            <circle cx="18" cy="17" r="2" />
            <path d="M7.7 11 16.4 7.8M7.7 13 16.4 16.2" />
          </svg>
        </button>
        <button class="icon-btn" aria-label="资产库">
          <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 9h14l-1 10H6L5 9Z" />
            <path d="M8 9V6h8v3" />
            <path d="M9 13h6" />
          </svg>
        </button>
        <div class="credits">
          <span>会员特惠</span>
          <strong>94</strong>
        </div>
      </div>

      <a class="signature" href="https://deerflow.tech" target="_blank" rel="noreferrer">Created By Deerflow</a>

      <div class="workspace-label">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 4h10v16H7z" />
          <path d="M10 8h4M10 12h4M10 16h3" />
        </svg>
        <span>剧本画布</span>
      </div>

      <svg class="edge-layer" viewBox="0 0 1600 1000" preserveAspectRatio="none" aria-hidden="true">
        <path class="edge" d="M514 296 C 558 296, 562 294, 622 294" />
        <path class="edge active" d="M1112 298 C 1180 350, 1038 500, 1048 680" />
      </svg>

      <section class="node script-node" aria-label="剧本节点">
        <header class="node-header">
          <div class="node-title">
            <span class="status-dot green"></span>
            <strong>剧本</strong>
          </div>
          <span>linked</span>
        </header>
        <div class="node-body">
          <div class="script-copy">
            《我在盛唐写天下》
            <br />
            <b>类型：</b>古风 / 穿越 / 爽文漫剧
            <br />
            <b>时长建议：</b>60-90秒
            <br />
            <b>基调：</b>热血 x 盛唐史诗感 x 爽点节奏
            <br />
            <b>【序幕】</b>
            <br />
            【现代 · 深夜办公室】
          </div>
        </div>
        <div class="port out">+</div>
      </section>

      <section class="node send-node selected running" aria-label="发送流节点">
        <header class="node-header">
          <div class="node-title">
            <span class="status-dot cyan"></span>
            <strong>发送流</strong>
          </div>
          <span>running</span>
        </header>
        <div class="node-body">
          <div class="send-form">
            <div class="field-row">
              <label class="field">
                <span>类型</span>
                <select>
                  <option>图生图</option>
                  <option>文生图</option>
                  <option>图生视频</option>
                </select>
              </label>
              <label class="field">
                <span>模型</span>
                <select>
                  <option>CVLM 5.5</option>
                  <option>Seedream 4.5</option>
                  <option>Seedance 2.0</option>
                </select>
              </label>
            </div>
            <label class="field">
              <span>提示词</span>
              <textarea>根据上游剧本生成第一个镜头：深夜办公室、键盘声、主角伏案、屏幕冷光、盛唐诗卷从画面边缘浮现。</textarea>
            </label>
            <div class="run-row">
              <div class="context-pill">
                <span>上游</span>
                <strong>剧本 x 1</strong>
              </div>
              <button class="run-btn" aria-label="运行节点">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
                  <path d="M12 19V5" />
                  <path d="m5 12 7-7 7 7" />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="port in">+</div>
        <div class="port out cyan">+</div>
      </section>

      <section class="node image-node selected" aria-label="图片节点">
        <header class="node-header">
          <div class="node-title">
            <span class="status-dot"></span>
            <strong>图片节点 2</strong>
          </div>
          <span>empty</span>
        </header>
        <div class="node-body">
          <div class="image-preview">
            <div class="mountain" aria-hidden="true"></div>
          </div>
          <div class="image-actions">
            <button class="ghost-action">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 17V5" />
                <path d="m6 11 6-6 6 6" />
                <path d="M5 19h14" />
              </svg>
              图生图
            </button>
            <button class="ghost-action">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="4" y="5" width="16" height="14" rx="2" />
                <path d="M8 13h8M8 9h8M8 17h5" />
              </svg>
              图片高清
            </button>
          </div>
        </div>
        <div class="port in cyan">+</div>
        <div class="port out">+</div>
      </section>

      <aside class="add-menu" aria-label="添加节点菜单">
        <p class="menu-title">添加节点</p>
        <div class="menu-item"><span class="menu-icon">T</span><span>文本</span></div>
        <div class="menu-item"><span class="menu-icon">I</span><span>图片</span></div>
        <div class="menu-item"><span class="menu-icon">V</span><span>视频</span></div>
        <div class="menu-item"><span class="menu-icon">D</span><span>导演台</span><span class="badge">NEW</span></div>
        <div class="menu-item"><span class="menu-icon">S</span><span>脚本</span><span class="badge">Beta</span></div>
        <p class="menu-title">添加资源</p>
        <div class="menu-item"><span class="menu-icon">U</span><span>上传</span></div>
        <div class="menu-item"><span class="menu-icon">H</span><span>从生成历史选择</span></div>
      </aside>

      <nav class="dock" aria-label="画布工具栏">
        <button class="tool-btn primary" aria-label="新增节点">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
        <button class="tool-btn" aria-label="连线模式">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="6" cy="12" r="2" />
            <circle cx="18" cy="6" r="2" />
            <circle cx="18" cy="18" r="2" />
            <path d="M8 11 16 7M8 13l8 4" />
          </svg>
        </button>
        <button class="tool-btn" aria-label="历史记录">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="8" />
            <path d="M12 8v5l3 2" />
          </svg>
        </button>
        <button class="tool-btn" aria-label="快捷键">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="7" width="16" height="10" rx="2" />
            <path d="M7 11h.01M10 11h.01M13 11h.01M16 11h.01M8 15h8" />
          </svg>
        </button>
        <button class="tool-btn" aria-label="帮助">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="8" />
            <path d="M9.8 9.4a2.4 2.4 0 1 1 3.8 2c-.9.6-1.5 1.1-1.5 2.1" />
            <path d="M12 17h.01" />
          </svg>
        </button>
      </nav>

      <div class="zoom" aria-label="缩放工具">
        <button class="mini-btn" aria-label="适配视图">□</button>
        <button class="mini-btn" aria-label="吸附">⛓</button>
        <span>100%</span>
      </div>

      <aside class="inspector" aria-label="节点检查器">
        <header>
          <strong>发送流</strong>
          <span style="color: var(--muted)">node_send_01</span>
        </header>
        <div class="inspector-body">
          <div class="metric-row">
            <div class="metric"><span>输入</span><strong>1</strong></div>
            <div class="metric"><span>模型</span><strong>CVLM</strong></div>
            <div class="metric"><span>状态</span><strong>42%</strong></div>
          </div>
          <label class="field">
            <span>组合提示词预览</span>
            <textarea>剧本上下文 + 用户提示词 + 参考图约束将被组合后发送。</textarea>
          </label>
        </div>
      </aside>
    </main>
  </body>
</html>
