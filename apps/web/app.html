<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comic AI Studio</title>
    <link rel="stylesheet" href="./login.css" />
    <style>
      .creator-shell {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        padding: 1.5rem;
      }

      .creator-frame {
        width: min(90rem, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(20rem, 24rem) minmax(0, 1fr);
        gap: 1rem;
      }

      .creator-sidebar,
      .creator-card {
        background: var(--surface-glass);
        backdrop-filter: blur(60px) saturate(180%);
        -webkit-backdrop-filter: blur(60px) saturate(180%);
        border: 1px solid var(--line-subtle);
        border-radius: var(--radius-xl);
      }

      .creator-sidebar {
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .creator-main {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .creator-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .creator-card {
        padding: 1.25rem;
      }

      .creator-hero {
        display: flex;
        flex-direction: column;
        gap: 0.9rem;
      }

      .creator-hero h1 {
        max-width: 12ch;
      }

      .action-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .summary-stack {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.7rem 0.9rem;
        border-radius: var(--radius-sm);
        background: oklch(10% 0.01 250 / 0.25);
      }

      .summary-label {
        color: var(--text-muted);
        font-size: 0.82rem;
      }

      .summary-value {
        font-size: 0.88rem;
      }

      .shots-list {
        display: grid;
        gap: 0.75rem;
      }

      .shot-card {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: center;
        padding: 0.9rem 1rem;
        border-radius: var(--radius-md);
        background: oklch(10% 0.01 250 / 0.25);
      }

      .shot-title {
        font-weight: 600;
      }

      .shot-meta {
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      .shot-tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .shot-tag {
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        border: 1px solid var(--line-subtle);
        color: var(--text-muted);
        font-size: 0.72rem;
      }

      .creator-status {
        min-height: 1.5rem;
      }

      .empty-state {
        color: var(--text-muted);
        padding: 1rem 0;
      }

      .creator-input {
        width: 100%;
        padding: 0.85rem 1rem;
        border-radius: var(--radius-md);
        border: 1px solid var(--line-sharp);
        background: oklch(8% 0.01 250 / 0.65);
        color: var(--text-primary);
        font: inherit;
      }

      textarea.creator-input {
        min-height: 10rem;
        resize: vertical;
      }

      @media (max-width: 960px) {
        .creator-frame {
          grid-template-columns: 1fr;
        }

        .creator-grid {
          grid-template-columns: 1fr;
        }

        .shot-card {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <main id="creator-app" class="creator-shell">
      <section class="creator-frame">
        <aside class="creator-sidebar">
          <div class="intro-topline">
            <p class="eyebrow">Comic AI Studio</p>
            <span class="status-pill">Creator Dev</span>
          </div>

          <div class="creator-hero">
            <h1>把创作主链路先跑起来</h1>
            <p class="subtitle">
              这个工作台直连本地 mock creator API。它不是生产版，但已经能把项目、解析、资源确认、校准、生成和导出预览串成一条完整链路。
            </p>
          </div>

          <section class="creator-card">
            <div class="panel-head compact-head">
              <p class="panel-kicker">当前会话</p>
              <h2>创作入口</h2>
              <p id="session-summary" class="panel-copy">正在读取当前会话...</p>
            </div>
            <button id="logout-button" class="secondary-action" type="button">退出登录</button>
          </section>

          <section class="creator-card">
            <div class="panel-head compact-head">
              <p class="panel-kicker">项目输入</p>
              <h2>创建项目</h2>
            </div>
            <label class="field">
              <span>项目名称</span>
              <input id="project-name-input" class="creator-input" value="机械黎明测试片段" />
            </label>
            <label class="field">
              <span>脚本输入</span>
              <textarea id="script-input" class="creator-input">Episode 1: Dawn over the mechanical city. The lead mechanist opens the tower window, sees the industrial skyline, and prepares to launch the first test frame.</textarea>
            </label>
            <div class="action-row">
              <button id="create-project-button" class="primary-action" type="button">创建项目</button>
              <button id="parse-script-button" class="secondary-action" type="button">脚本解析</button>
            </div>
          </section>
        </aside>

        <section class="creator-main">
          <div class="creator-grid">
            <section class="creator-card">
              <div class="panel-head compact-head">
                <p class="panel-kicker">项目状态</p>
                <h2>项目</h2>
              </div>
              <div id="project-summary" class="summary-stack"></div>
            </section>

            <section class="creator-card">
              <div class="panel-head compact-head">
                <p class="panel-kicker">资源确认</p>
                <h2>资产确认</h2>
              </div>
              <div id="asset-review-summary" class="summary-stack"></div>
              <button id="confirm-assets-button" class="secondary-action" type="button">确认全部资源</button>
            </section>

            <section class="creator-card">
              <div class="panel-head compact-head">
                <p class="panel-kicker">校准门控</p>
                <h2>校准</h2>
              </div>
              <div id="calibration-summary" class="summary-stack"></div>
              <button id="run-calibration-button" class="secondary-action" type="button">运行校准</button>
            </section>

            <section class="creator-card">
              <div class="panel-head compact-head">
                <p class="panel-kicker">生成</p>
                <h2>图像与视频</h2>
              </div>
              <div class="action-row">
                <button id="generate-images-button" class="secondary-action" type="button">生成图片</button>
                <button id="generate-videos-button" class="secondary-action" type="button">生成视频</button>
              </div>
              <div id="generation-summary" class="summary-stack"></div>
            </section>
          </div>

          <section class="creator-card">
            <div class="panel-head compact-head">
              <p class="panel-kicker">镜头清单</p>
              <h2>Shot 状态</h2>
            </div>
            <div id="shots-list" class="shots-list"></div>
          </section>

          <section class="creator-card">
            <div class="panel-head compact-head">
              <p class="panel-kicker">交付</p>
              <h2>导出预览</h2>
            </div>
            <button id="preview-export-button" class="secondary-action" type="button">导出预览</button>
            <div id="export-summary" class="summary-stack"></div>
          </section>

          <section class="creator-card">
            <div class="panel-head compact-head">
              <p class="panel-kicker">运行日志</p>
              <h2>状态回显</h2>
            </div>
            <p id="workspace-status" class="status-message creator-status">等待操作。</p>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
