<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台管理</title>
    <style>
      :root {
        --navy: #12243d;
        --navy-2: #1b3559;
        --bg: #eef4f9;
        --panel: #ffffff;
        --line: #d9e3ee;
        --text: #1f2d3d;
        --muted: #6b7c90;
        --primary: #246bfe;
        --primary-soft: #e8f0ff;
        --danger: #d92d20;
        --warning: #b7791f;
        --success: #15803d;
        --radius: 8px;
        font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .hidden { display: none !important; }

      .login-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.72), rgba(238,244,249,.9)),
          var(--bg);
      }
      .login-card {
        width: min(420px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 32px;
        box-shadow: 0 20px 50px rgba(18, 36, 61, .12);
      }
      .login-card h1 { margin: 0 0 8px; font-size: 26px; }
      .login-card p { margin: 0 0 28px; color: var(--muted); }
      .field { display: grid; gap: 8px; margin-bottom: 16px; }
      .field label { font-size: 13px; color: #30445f; font-weight: 600; }
      .field input, .field select, .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        background: #fff;
        outline: none;
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-soft);
      }
      .btn {
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 9px 12px;
        background: #f7f9fc;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 36px;
      }
      .btn.primary { background: var(--primary); color: #fff; }
      .btn.danger { color: var(--danger); background: #fff5f5; border-color: #ffd0d0; }
      .btn.ghost { background: transparent; border-color: var(--line); }
      .btn.full { width: 100%; }
      .btn[disabled] { opacity: .58; cursor: not-allowed; }
      .error-text { color: var(--danger); font-size: 13px; min-height: 18px; }
      .toast-message {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 12;
        max-width: min(360px, calc(100vw - 36px));
        padding: 12px 14px;
        border: 1px solid #bde8c8;
        border-radius: 8px;
        background: #f0fff4;
        color: var(--success);
        box-shadow: 0 18px 40px rgba(18, 36, 61, .14);
      }

      .admin-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 236px minmax(0, 1fr);
      }
      .sidebar {
        background: var(--navy);
        color: #dce8f7;
        padding: 18px 14px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .brand {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 10px;
        font-weight: 700;
        color: #fff;
      }
      .brand-mark {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        background: var(--primary);
        display: grid;
        place-items: center;
      }
      .nav { margin-top: 18px; display: grid; gap: 4px; }
      .nav button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #dce8f7;
        text-align: left;
        padding: 11px 12px;
      }
      .nav button.active, .nav button:hover {
        background: var(--navy-2);
        color: #fff;
      }
      .main { min-width: 0; display: grid; grid-template-rows: 60px minmax(0, 1fr); }
      .topbar {
        background: rgba(255,255,255,.88);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        position: sticky;
        top: 0;
        z-index: 3;
      }
      .topbar h2 { margin: 0; font-size: 18px; }
      .account-menu { display: flex; align-items: center; gap: 10px; color: var(--muted); }
      .content { padding: 20px; min-width: 0; }
      .page-grid { min-width: 0; }
      .state-panel {
        min-height: 260px;
        display: grid;
        place-items: center;
        gap: 8px;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        color: var(--muted);
      }
      .state-panel strong { color: var(--text); font-size: 16px; }
      .state-panel[data-state="forbidden"] { border-color: #ffd0d0; background: #fffafa; }

      .grid { display: grid; gap: 14px; }
      .cards { grid-template-columns: repeat(4, minmax(150px, 1fr)); }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px;
      }
      .metric-label { color: var(--muted); font-size: 13px; }
      .metric-value { font-size: 26px; margin-top: 8px; font-weight: 700; }
      .metric-note { margin-top: 8px; color: var(--muted); font-size: 12px; }
      .trend-bars {
        height: 156px;
        display: grid;
        grid-template-columns: repeat(5, minmax(54px, 1fr));
        gap: 10px;
        align-items: end;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbff;
        padding: 12px;
      }
      .trend-bar {
        min-width: 0;
        height: 100%;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 5px;
        align-items: end;
        color: var(--muted);
        font-size: 12px;
      }
      .trend-bar span,
      .trend-bar em {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .trend-bar em {
        color: var(--text);
        font-style: normal;
        font-weight: 700;
      }
      .trend-bar i { justify-self: start; font-style: normal; }
      .trend-bar b {
        display: block;
        width: 100%;
        min-height: 18px;
        border-radius: 6px 6px 3px 3px;
        background: linear-gradient(180deg, #246bfe, #8fb5ff);
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .toolbar .filters { display: flex; gap: 8px; flex-wrap: wrap; }
      .toolbar input, .toolbar select {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        min-height: 36px;
      }
      .table-wrap {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: auto;
        max-width: 100%;
      }
      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
        font-size: 13px;
        table-layout: fixed;
      }
      .table-wrap.compact table { min-width: 760px; font-size: 12px; }
      .table-wrap.dense table { min-width: 900px; font-size: 12px; }
      .table-wrap.models table { min-width: 1040px; }
      .table-wrap.users table { min-width: 900px; }
      .table-wrap.settings table { min-width: 820px; }
      th, td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .table-wrap.compact th,
      .table-wrap.compact td,
      .table-wrap.dense th,
      .table-wrap.dense td { padding: 9px 10px; }
      td .metric-note { overflow-wrap: anywhere; white-space: normal; }
      th { background: #f6f9fd; color: #415672; font-weight: 700; }
      td.actions, th.actions {
        position: sticky;
        right: 0;
        background: #fff;
        box-shadow: -8px 0 12px rgba(18, 36, 61, .05);
        width: 164px;
        min-width: 164px;
        max-width: 164px;
        overflow: visible;
      }
      .table-wrap.compact td.actions,
      .table-wrap.compact th.actions { width: 84px; min-width: 84px; max-width: 84px; }
      .table-wrap.dense td.actions,
      .table-wrap.dense th.actions { width: 132px; min-width: 132px; max-width: 132px; }
      .table-wrap.users td.actions,
      .table-wrap.users th.actions { width: 96px; min-width: 96px; max-width: 96px; }
      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border-radius: 999px;
        padding: 2px 8px;
        background: #eef3f8;
        color: #3c526e;
        font-size: 12px;
      }
      .tag.green { background: #e9f8ef; color: var(--success); }
      .tag.blue { background: var(--primary-soft); color: var(--primary); }
      .tag.warn { background: #fff5df; color: var(--warning); }
      .actions-row { display: flex; gap: 6px; flex-wrap: nowrap; }
      .table-wrap.dense .actions-row { gap: 4px; }
      .icon-btn {
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #fff;
      }
      .table-wrap.users .icon-btn {
        width: 22px;
        height: 28px;
        font-size: 12px;
      }
      .table-wrap.users .user-edit-btn {
        min-width: 58px;
        padding-inline: 12px;
      }
      .user-action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }
      .user-action-grid .btn { min-height: 38px; }
      .user-action-grid .btn.full-row { grid-column: 1 / -1; }
      .btn:disabled,
      .icon-btn:disabled {
        cursor: not-allowed;
        opacity: .45;
        filter: grayscale(.18);
      }
      .workbench {
        display: grid;
        grid-template-columns: 176px minmax(0, 1fr) minmax(220px, 248px);
        gap: 14px;
        align-items: start;
      }
      .workbench > * { min-width: 0; }
      .workbench-aside { position: sticky; top: 76px; }
      .anchor-list { display: grid; gap: 6px; }
      .anchor-list a {
        color: #405875;
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 6px;
      }
      .anchor-list a.active, .anchor-list a:hover { background: var(--primary-soft); color: var(--primary); }
      .section { display: grid; gap: 14px; }
      .prompt-workbench {
        display: grid;
        grid-template-columns: 168px minmax(0, 1fr) minmax(360px, .66fr);
        gap: 14px;
        align-items: start;
      }
      .prompt-workbench-no-stage-nav {
        grid-template-columns: minmax(0, 1fr) minmax(360px, .66fr);
      }
      .prompt-workbench-no-stage-nav > aside:first-of-type {
        display: none;
      }
      .prompt-kind-list { display: grid; gap: 8px; }
      .prompt-kind-card {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        padding: 12px;
        text-align: left;
      }
      .prompt-kind-card strong { display: block; margin-bottom: 8px; color: var(--text); }
      .prompt-kind-card.active {
        border-color: var(--primary);
        background: var(--primary-soft);
        box-shadow: inset 0 0 0 1px rgba(36,107,254,.12);
      }
      .prompt-kind-card.active strong { color: var(--primary); }
      .prompt-preview {
        position: sticky;
        top: 76px;
        display: grid;
        gap: 14px;
      }
      .prompt-preview-box {
        border: 1px solid #1b2c4a;
        border-radius: 6px;
        background: #0f172a;
        color: #dbeafe;
        padding: 14px;
        min-height: 420px;
        max-height: calc(100vh - 260px);
        overflow: auto;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }
      .prompt-preview-box strong { color: #ffffff; }
      .prompt-result-box {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        min-height: 180px;
        padding: 14px;
        color: var(--text);
        resize: vertical;
        width: 100%;
      }
      .prompt-toolbar-title h3 { margin: 0; }
      .prompt-toolbar-title .metric-note { margin-top: 6px; }
      .prompt-code-cell { font-family: Consolas, monospace; color: #1b3559; }
      .prompt-title-cell { min-width: 160px; }
      .prompt-cover-col { width: 72px; text-align: center; }
      .prompt-cover-thumb {
        width: 46px;
        height: 46px;
        border-radius: 10px;
        object-fit: cover;
        flex: 0 0 auto;
        background: linear-gradient(135deg, #1f7a6d, #e6a94b);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,.45), 0 6px 18px rgba(20,31,51,.14);
      }
      .prompt-cover-empty {
        display: inline-grid;
        place-items: center;
        color: #fff;
        font-size: 12px;
        font-weight: 800;
      }
      .prompt-cover-upload { display: grid; grid-template-columns: 72px minmax(0, 1fr); gap: 12px; align-items: center; }
      .prompt-cover-upload .prompt-cover-thumb { width: 64px; height: 64px; border-radius: 14px; }
      .prompt-cover-upload input[type="file"] { margin-top: 8px; }
      .character-flow {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .character-flow-step {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f8fbff;
        padding: 10px;
        min-height: 82px;
      }
      .character-flow-step strong { display: block; color: #17365f; margin-bottom: 6px; }
      .character-flow-step span { color: var(--muted); font-size: 12px; line-height: 1.55; }
      .character-template-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }
      .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .inline-check { display: inline-flex; align-items: center; gap: 8px; margin: 0 0 12px; color: #30445f; font-size: 13px; font-weight: 600; }
      .inline-check input { width: 16px; height: 16px; accent-color: var(--primary); }
      #parameter-schema-list table {
        min-width: 0;
        table-layout: fixed;
        font-size: 12px;
      }
      #parameter-schema-list th,
      #parameter-schema-list td {
        padding: 9px 10px;
      }
      #parameter-schema-list th:nth-child(1) { width: 30%; }
      #parameter-schema-list th:nth-child(2) { width: 18%; }
      #parameter-schema-list th:nth-child(3) { width: 24%; }
      #parameter-schema-list th:nth-child(4) { width: 88px; }
      #parameter-schema-list td.parameter-visible-cell,
      #parameter-schema-list th.parameter-visible-cell {
        overflow: visible;
        text-overflow: clip;
      }
      #parameter-schema-list td.actions,
      #parameter-schema-list th.actions {
        width: 84px;
        min-width: 84px;
        max-width: 84px;
      }
      .parameter-visible-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 0;
        color: #30445f;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }
      .parameter-visible-toggle input {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
      }
      .json-box {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0f172a;
        color: #dbeafe;
        padding: 12px;
        min-height: 110px;
        overflow: auto;
        font-family: Consolas, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .check-list { display: grid; gap: 8px; }
      .check-list div { display: flex; justify-content: space-between; gap: 12px; }
      .check-list span:last-child { min-width: 0; text-align: right; overflow-wrap: anywhere; }
      .drawer {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, .32);
        display: grid;
        justify-items: end;
        z-index: 10;
      }
      .drawer-panel {
        width: min(460px, 100%);
        background: #fff;
        min-height: 100vh;
        max-height: 100vh;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 20px;
        box-shadow: -20px 0 50px rgba(15, 23, 42, .18);
      }
      .drawer-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; }
      .drawer-head h3 { margin: 0; }
      .drawer-title-group { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .drawer-title-group h3 { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .drawer-back-btn { min-height: 30px; padding: 5px 10px; }
      .deerflow-signature {
        position: fixed;
        right: 14px;
        bottom: 10px;
        z-index: 2;
        color: rgba(64, 88, 117, .52);
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 0;
        background: rgba(255,255,255,.72);
        border: 1px solid rgba(217, 227, 238, .8);
        border-radius: 6px;
        padding: 4px 7px;
        backdrop-filter: blur(8px);
      }
      .deerflow-signature:hover,
      .deerflow-signature:focus {
        color: var(--primary);
        border-color: var(--primary-soft);
      }

      @media (max-width: 1100px) {
        .admin-shell { grid-template-columns: 72px minmax(0, 1fr); }
        .brand span, .nav span { display: none; }
        .cards { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
        .workbench { grid-template-columns: minmax(0, 1fr); }
        .workbench-aside { position: static; }
        .anchor-list {
          grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        }
        .form-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 920px) {
        .content > .grid {
          grid-template-columns: minmax(0, 1fr) !important;
        }
        .trend-bars {
          grid-template-columns: repeat(5, minmax(42px, 1fr));
          gap: 6px;
          padding: 10px;
        }
        .topbar {
          min-height: 72px;
          height: auto;
          align-items: flex-start;
          flex-direction: column;
          justify-content: center;
          gap: 8px;
          padding: 10px 14px;
        }
        .account-menu {
          width: 100%;
          flex-wrap: wrap;
          justify-content: flex-start;
        }
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }
        .toolbar .filters,
        .toolbar .filters input,
        .toolbar .filters select,
        .toolbar > .btn {
          width: 100%;
        }
        .actions-row {
          justify-content: flex-end;
        }
        table { min-width: 820px; }
        .table-wrap.models table,
        .table-wrap.users table,
        .table-wrap.settings table { min-width: 820px; }
        td.actions, th.actions { width: 132px; min-width: 132px; max-width: 132px; }
        .table-wrap.dense td.actions,
        .table-wrap.dense th.actions { width: 120px; min-width: 120px; max-width: 120px; }
      }

      @media (max-width: 560px) {
        .admin-shell { grid-template-columns: 56px minmax(0, 1fr); }
        .sidebar { padding: 12px 8px; }
        .brand { padding: 0; justify-content: center; }
        .nav button { padding: 10px 8px; text-align: center; }
        .content { padding: 12px; }
        .cards { grid-template-columns: 1fr; }
        .login-card { padding: 24px; }
        .drawer-panel {
          width: 100%;
          padding: 16px;
        }
        .deerflow-signature { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="admin-app"></div>
    <a class="deerflow-signature" href="https://deerflow.tech" target="_blank" rel="noreferrer">Created By Deerflow</a>
    <script>
      const pages = {
        dashboard: "运营总览",
        models: "模型配置",
        "model-workbench": "模型参数详情",
        users: "用户与积分",
        prompts: "提示词管理",
        risks: "风控与审计",
        settings: "系统设置",
        account: "管理员账户",
      };

      const state = {
        session: null,
        page: "dashboard",
        models: [],
        selectedModelId: null,
        modelLoadError: "",
        users: [],
        userFilters: { keyword: "", status: "all", accountType: "all" },
        userLoadError: "",
        promptManagementMode: "script",
        scriptPromptPackageType: "genre",
        scriptPromptKeyword: "",
        imagePromptCategory: "all",
        imagePromptKeyword: "",
        scriptPromptPackages: [],
        scriptPromptLoadError: "",
        imagePromptStyles: [],
        imagePromptLoadError: "",
        characterPromptStage: "extract",
        characterPromptKeyword: "",
        characterPromptTemplates: [],
        characterPromptLoadError: "",
        characterPromptComposeResult: "",
        characterPromptComposeError: "",
        scenePromptStage: "split",
        scenePromptKeyword: "",
        scenePromptTemplates: [],
        scenePromptLoadError: "",
        propPromptStage: "extract",
        propPromptKeyword: "",
        propPromptTemplates: [],
        propPromptLoadError: "",
        shotPromptStage: "outline",
        shotPromptKeyword: "",
        shotPromptTemplates: [],
        shotPromptLoadError: "",
        settings: { configs: [], secretReferences: [] },
        adminAccounts: [],
        settingsLoadError: "",
        risks: { risks: [], taskExceptions: [], paymentIssues: [] },
        auditEvents: [],
        riskLoadError: "",
        riskStatusFilter: "all",
        dashboard: {
          metrics: {
            generationCountToday: 0,
            generationSuccessRate: 0,
            creditsConsumedToday: 0,
            paidOrdersToday: 0,
            riskPendingCount: 0,
            failedTaskCount: 0,
          },
          modelHealth: [],
          recentEvents: [],
        },
        dashboardLoadError: "",
        dashboardRefreshNote: "",
        adminSessions: [],
        adminSessionLoadError: "",
        loadingPages: {},
        forbiddenPages: {},
      };

      const runtimeConfigHints = [
        {

      function routeFromPath() {
        const path = location.pathname;
        if (path.includes("/models/new") || /^\/admin\/models\/[^/]+/.test(path)) return "model-workbench";
        if (path.includes("/models")) return "models";
        if (path.includes("/users")) return "users";
        if (path.includes("/prompts")) return "prompts";
        if (path.includes("/risks") || path.includes("/audit-events")) return "risks";
        if (path.includes("/settings") || path.includes("/admin-accounts")) return "settings";
        if (path.includes("/account")) return "account";
        return "dashboard";
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          credentials: "include",
          headers: { "content-type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw Object.assign(new Error(payload.error?.message || "请求失败"), { payload, status: response.status });
        return payload;
      }

      function hasPermission(permission) {
        const permissions = state.session?.permissions || [];
        return permissions.includes(permission);
      }

      function permissionAttrs(permission) {
        if (hasPermission(permission)) {
          return `data-required-permission="${permission}"`;
        }
        return `data-required-permission="${permission}" disabled aria-disabled="true" title="无权限执行该操作"`;
      }

      function userStatusAllowsAction(user, action) {
        const status = user?.status || "active";
        if (action === "view") return true;
        if (status === "active") {
          return ["credit", "profile", "reveal", "disable", "archive", "teamLimit"].includes(action);
        }
        if (status === "disabled") {
          return action === "enable";
        }
        return false;
      }

      function userStatusBlockedTitle(user) {
        return user?.status === "archived"
          ? "账户已归档，仅允许查看历史记录"
          : "账户禁用期间仅允许查看或启用";
      }

      function userActionAttrs(user, action, permission) {
        const requiredPermission = permission ? `data-required-permission="${permission}"` : "";
        if (!userStatusAllowsAction(user, action)) {
          return `${requiredPermission} disabled aria-disabled="true" title="${userStatusBlockedTitle(user)}"`;
        }
        return permission ? permissionAttrs(permission) : "";
      }

      function guardUserAction(user, action) {
        if (userStatusAllowsAction(user, action)) return true;
        showToast(userStatusBlockedTitle(user));
        return false;
      }

      function setPageLoading(page, loading) {
        state.loadingPages[page] = Boolean(loading);

      function setPageForbidden(page, error) {
        const code = error?.payload?.error?.code;
        if (code === "admin_forbidden" || error?.status === 403) {
          state.forbiddenPages[page] = error.payload?.error?.message || "无权限访问该页面";
          return true;
        }
        delete state.forbiddenPages[page];
        return false;
      }

      function clearPageForbidden(page) {
        delete state.forbiddenPages[page];
      }

      function renderPageState(page) {
        if (state.loadingPages[page]) {
          return `<section class="state-panel" data-state="loading"><strong>正在加载后台数据</strong><span>${pages[page] || "后台页面"}</span></section>`;
        }
        if (state.forbiddenPages[page]) {
          return `<section class="state-panel" data-state="forbidden"><strong>无权限访问该页面</strong><span>${state.forbiddenPages[page]}</span></section>`;
        }
        return "";
      }

      function setSubmitting(form, submitting, submittingText = "正在提交") {
        form.setAttribute("data-submitting", submitting ? "true" : "false");
        form.querySelectorAll("button").forEach((button) => {
          if (submitting) {
            button.disabled = true;
            button.dataset.originalText = button.dataset.originalText || button.textContent;
            button.textContent = submittingText;
          } else if (button.dataset.originalText) {
            button.disabled = false;
            button.textContent = button.dataset.originalText;
          } else {
            button.disabled = false;
          }
        });
      }

      function showToast(message = "操作成功") {
        const toast = document.getElementById("toast");
        if (!toast) return;
        toast.textContent = message || "操作成功";
        toast.classList.remove("hidden");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.add("hidden"), 2400);
      }

      async function runAdminMutation(form, errorElement, action, successMessage = "操作成功") {
        if (form.dataset.submitting === "true") return;
        errorElement.textContent = "";
        setSubmitting(form, true);
        try {
          const result = await action();
          showToast(successMessage || "操作成功");
          return result;
        } catch (err) {
          errorElement.textContent = err.payload?.error?.message || err.message || "操作失败";
          throw err;
        } finally {
          setSubmitting(form, false);
        }
      }

      async function loadSettings() {
        setPageLoading("settings", true);
        try {
          const [settingsResult, accountsResult] = await Promise.all([
            api("/api/admin/settings"),
            api("/api/admin/admin-accounts"),
          ]);
          state.settings = settingsWithRuntimeConfigHints(settingsResult.data || { configs: [], secretReferences: [] });
          state.adminAccounts = accountsResult.data || [];
          state.settingsLoadError = "";
          clearPageForbidden("settings");
        } catch (error) {
          setPageForbidden("settings", error);
          state.settingsLoadError = error.payload?.error?.message || "系统设置加载失败";
          state.settings = { configs: [], secretReferences: [] };
          state.adminAccounts = [];
        } finally {
          setPageLoading("settings", false);
        }
      }

      function settingsWithRuntimeConfigHints(settings) {
        const configs = Array.isArray(settings.configs) ? [...settings.configs] : [];
        for (const hint of runtimeConfigHints) {
          if (!configs.some((config) => config.key === hint.key)) configs.push(hint);
        }
        configs.sort((left, right) => {
          const scopeOrder = String(left.scope || "").localeCompare(String(right.scope || ""));
          return scopeOrder || String(left.key || "").localeCompare(String(right.key || ""));
        });
        return {
          ...settings,
          configs,
          secretReferences: Array.isArray(settings.secretReferences) ? settings.secretReferences : [],
        };
      }

      function renderPage() {
        const pageState = renderPageState(state.page);
        if (pageState) return pageState;
        if (state.page === "dashboard") return dashboardPage();
        if (state.page === "models") return modelsPage();
        if (state.page === "model-workbench") return modelWorkbenchPage();
        if (state.page === "users") return usersPage();
        if (state.page === "prompts") return promptsPage();
        if (state.page === "risks") return risksPage();
        if (state.page === "settings") return settingsPage();

      function metric(label, value, note) {
        return `<section class="card"><div class="metric-label">${label}</div><div class="metric-value">${value}</div><div class="metric-note">${note}</div></section>`;
      }

      function dashboardTrendHtml(metrics) {
        const series = [
          { label: "生成", value: Number(metrics.generationCountToday || 0), tone: "blue" },
          { label: "积分", value: Number(metrics.creditsConsumedToday || 0), tone: "green" },
          { label: "订单", value: Number(metrics.paidOrdersToday || 0), tone: "blue" },
          { label: "风险", value: Number(metrics.riskPendingCount || 0), tone: "warn" },
          { label: "失败", value: Number(metrics.failedTaskCount || 0), tone: "warn" },
        ];
        const max = Math.max(...series.map((item) => item.value), 1);
        return `<div class="trend-bars">${series.map((item) => {
          const height = Math.max(18, Math.round((item.value / max) * 100));
          return `<div class="trend-bar"><span>${item.label}</span><em>${item.value.toLocaleString()}</em><i class="tag ${item.tone}">${height}%</i><b style="height:${height}%"></b></div>`;
        }).join("")}</div>`;
      }

      function healthRows() {
        const rows = state.dashboard.modelHealth.length
          ? state.dashboard.modelHealth.map((item) => {
              const needsAttention = item.status !== "active" || Number(item.failedCount || 0) > 0;
              return `<tr><td>${item.displayName}<div class="metric-note">${item.modelCode}</div></td><td>${item.queueName}</td><td><span class="tag ${needsAttention ? "warn" : "green"}">${needsAttention ? "关注" : "正常"}</span></td><td>${Number(item.queueDepth || 0).toLocaleString()}</td><td class="actions"><button class="icon-btn" title="详情" onclick="openDashboardModelHealthDrawer('${escapeAttribute(item.modelCode)}')">详</button></td></tr>`;
            }).join("")
          : `<tr><td colspan="5">${state.dashboardLoadError || "暂无模型健康数据"}</td></tr>`;
        return `<div class="table-wrap compact"><table><thead><tr><th>模型</th><th>队列</th><th>状态</th><th>积压</th><th class="actions">操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      }

      function openDashboardModelHealthDrawer(modelCode) {
        const item = state.dashboard.modelHealth.find((entry) => String(entry.modelCode) === String(modelCode));
        if (!item) return;
        const queueDepth = Number(item.queueDepth || 0);
        const failedCount = Number(item.failedCount || 0);
        const needsAttention = item.status !== "active" || failedCount > 0;
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel" style="width:min(680px,100%);">

      function dashboardEventDestination(event) {
        const eventType = String(event.type || event.eventType || "");

          return { page: "models", label: "模型配置" };
        }
        if (targetType.includes("user") || eventType.includes(".user.") || eventType.includes(".credit.")) {
          return { page: "users", label: "用户与积分" };
        }
        if (targetType.includes("risk") || targetType.includes("payment") || eventType.includes(".risk.") || eventType.includes(".payment.") || eventType.includes(".task.")) {
          return { page: "risks", label: "风控与审计" };

        if (targetType.includes("runtime_config") || targetType.includes("admin_account") || targetType.includes("secret") || eventType.includes(".settings.") || eventType.includes(".secret_") || eventType.includes(".account.")) {
          return { page: "settings", label: "系统设置" };

        return { page: "risks", label: "审计日志" };

      function percent(value) {
        return `${(Number(value || 0) * 100).toFixed(1)}%`;
      }

      const VIDEO_MODEL_CATEGORIES = [
        { value: "first_frame", label: "首帧视频", taskModes: ["video.image_to_video"] },
        { value: "first_last_frame", label: "首尾帧", taskModes: ["video.first_last_frame_to_video"] },
        { value: "reference", label: "全能参考", taskModes: ["video.reference_image_to_video"] },
        { value: "video_edit", label: "AI改视频", taskModes: ["video.video_to_video", "video.image_video_to_video"] },
      ];

      function videoCategoryByValue(value) {
        return VIDEO_MODEL_CATEGORIES.find((item) => item.value === value) || VIDEO_MODEL_CATEGORIES[0];
      }

      function inferVideoCategory(modelOrTaskModes = {}) {
        const taskModes = Array.isArray(modelOrTaskModes)
          ? modelOrTaskModes
          : Array.isArray(modelOrTaskModes?.taskModes)
            ? modelOrTaskModes.taskModes
            : [];
        const configured = !Array.isArray(modelOrTaskModes) && modelOrTaskModes?.uiConfig?.videoCategory;
        if (configured && VIDEO_MODEL_CATEGORIES.some((item) => item.value === configured)) return configured;
        if (taskModes.includes("video.first_last_frame_to_video")) return "first_last_frame";
        if (taskModes.includes("video.reference_image_to_video")) return "reference";
        if (taskModes.includes("video.video_to_video") || taskModes.includes("video.image_video_to_video")) return "video_edit";
        return "first_frame";
      }

      function videoCategoryLabel(modelOrTaskModes = {}) {
        return videoCategoryByValue(inferVideoCategory(modelOrTaskModes)).label;
      }

      function videoCategoryOptions(selectedValue) {
        return VIDEO_MODEL_CATEGORIES
          .map((item) => `<option value="${item.value}" ${item.value === selectedValue ? "selected" : ""}>${item.label}</option>`)
          .join("");
      }

      function modelMediaLabel(model) {
        if (model.mediaType !== "video") return escapeHtml(model.mediaType || "");
        return `<span class="tag blue">${videoCategoryLabel(model)}</span>`;
      }

      function applyVideoCategoryToModelEditor(categoryValue) {
        const form = document.getElementById("model-editor-form");
        if (!form) return;
        const category = videoCategoryByValue(categoryValue);
        form.elements.taskModes.value = category.taskModes.join(", ");
        try {
          const uiConfig = parseJsonTextarea(new FormData(form), "uiConfig");
          uiConfig.videoCategory = category.value;
          uiConfig.videoCategoryLabel = category.label;
          form.elements.uiConfig.value = JSON.stringify(uiConfig, null, 2);
        } catch (err) {
          document.getElementById("model-editor-error").textContent = err.message || "视频分类写入展示配置失败";
        }
      }

      function modelsPage() {
        const rows = state.models.length
          ? state.models.map((model) => modelRow(model)).join("")
          : `<tr><td colspan="9">${state.modelLoadError || "暂无模型配置"}</td></tr>`;
        const videoCategoryOptionsHtml = VIDEO_MODEL_CATEGORIES.map((item) => `<option>${item.label}</option>`).join("");
        return `<div class="toolbar"><div class="filters"><input placeholder="搜索模型名称 / 编码 / 供应商" /><select><option>全部状态</option><option>启用</option><option>禁用</option></select><select><option>全部类型</option><option>图片</option><option>视频</option>${videoCategoryOptionsHtml}</select></div><button class="btn primary" onclick="openModelEditorDrawer()" ${permissionAttrs("model.write")}>新增模型</button></div>
          <div class="table-wrap models dense"><table><thead><tr><th>模型编码</th><th>展示名</th><th>供应商</th><th>媒体 / 视频分类</th><th>任务模式</th><th>价格摘要</th><th>调度</th><th>状态</th><th class="actions">操作</th></tr></thead><tbody>
          ${rows}

      }

      function modelRow(model) {
        const price = priceSummary(model.pricing);
        const dispatch = model.dispatchPolicy
          ? `RPM ${model.dispatchPolicy.providerRpmLimit} / 并发 ${model.dispatchPolicy.providerConcurrentLimit}`
          : "待配置";
        const statusLabel = model.status === "active" ? "启用" : model.status === "disabled" ? "禁用" : "归档";
        const nextStatus = model.status === "active" ? "disabled" : "active";
        const nextStatusTitle = model.status === "active" ? "禁用" : "启用";
        return `<tr><td>${model.modelCode}</td><td>${model.displayName}</td><td>${model.providerName}</td><td>${modelMediaLabel(model)}</td><td>${model.taskModes.join(" / ")}</td><td>${price}</td><td>${dispatch}</td><td><span class="tag ${model.status === "active" ? "green" : "warn"}">${statusLabel}</span></td><td class="actions"><div class="actions-row"><button class="icon-btn" title="查看" onclick="selectModel('${model.id}')">查</button><button class="icon-btn" onclick="openModelEditorDrawer('${model.id}')" ${permissionAttrs("model.write")}>编</button><button class="icon-btn" onclick="openModelDuplicateDrawer('${model.id}')" ${permissionAttrs("model.write")}>复</button><button class="icon-btn" onclick="openModelStatusDrawer('${model.id}','${nextStatus}')" ${permissionAttrs("model.publish")}>${model.status === "active" ? "停" : "启"}</button></div></td></tr>`;
      }

      function priceSummary(pricing = {}) {
        if (!pricing || Object.keys(pricing).length === 0) return "待配置";
        const base = pricing.baseCredits ?? "-";
        const unit = pricing.unit || "次";
        return `${base} 起 / ${unit}`;
      }

      function modelLaunchCheckUi(model) {
        const checks = [
          {
            key: "apiKeyEnv",
            label: "密钥引用",
            ok: hasModelProviderSecret(model),
            message: "供应商配置必须填写 apiKeyEnv。",
          },
          {
            key: "endpoint",
            label: "Endpoint",
            ok: isValidProviderEndpoint(model?.providerConfig?.endpoint || model?.providerConfig?.createTaskEndpoint),
            message: "供应商 endpoint 必须是 http/https URL，或以 / 开头的接口路径。",
          },
          {
            key: "queryTaskEndpoint",
            label: "轮询 Endpoint",
            ok: model?.invocationMode === "async_polling"
              ? isValidProviderEndpoint(model?.providerConfig?.queryTaskEndpoint)
              : true,
            message: "异步轮询模型必须配置合法 queryTaskEndpoint，用于查询任务结果。",
          },
          {
            key: "parameterSchema",
            label: "参数校验",
            ok: Object.keys(model?.parameterSchema || {}).length > 0,
            message: "模型参数 schema 不能为空。",
          },
          {
            key: "pricing",
            label: "计费规则",
            ok: Number(model?.pricing?.baseCredits || 0) > 0,
            message: "模型定价必须配置大于 0 的 baseCredits。",
          },
          {
            key: "dispatchPolicy",
            label: "调度策略",
            ok: Boolean(model?.dispatchPolicy?.submitQueueName),
            message: "调度策略必须配置提交队列。",
          },
        ];
        return {
          ok: checks.every((check) => check.ok),
          checks,
          failedItems: checks.filter((check) => !check.ok),
        };
      }

      function isValidProviderEndpoint(endpoint) {
        const value = String(endpoint || "").trim();
        if (!value) return false;
        if (value.startsWith("/")) return !value.startsWith("//") && !/\s/.test(value);
        try {
          const parsed = new URL(value);
          return ["http:", "https:"].includes(parsed.protocol) && Boolean(parsed.hostname);
        } catch {
          return false;
        }
      }

      function hasModelProviderSecret(model) {
        return Boolean(model?.providerConfig?.apiKey || model?.providerConfig?.apiKeyEnv);
      }

      function modelProviderSecretLabel(model) {
        return model?.providerConfig?.apiKeyEnv || (model?.providerConfig?.apiKey ? "已配置 API 密钥" : "待配置");
      }

      function launchCheckHtml(checks) {
        return `<div class="check-list">${checks
          .map((check) => `<div><span>${check.label}</span><span class="tag ${check.ok ? "green" : "warn"}">${check.ok ? "通过" : check.message}</span></div>`)
          .join("")}</div>`;
      }

      function renderLaunchCheckFailure(failedItems) {
        return `上线检查未通过：${failedItems.map((item) => `${item.label || item.key} - ${item.message || "未通过"}`).join("；")}`;
      }

      function selectModel(id) {
        state.selectedModelId = id;
        navigate("model-workbench");
      }

        if (!model) {
          return `<section class="card"><h3>模型参数详情</h3><p class="metric-note">${state.modelLoadError || "暂无模型配置，请先新增模型。"}</p></section>`;
        }
        const parameterTags = Object.entries(model.parameterSchema || {})
          .slice(0, 8)
          .map(([key, value]) => `<span class="tag blue">${key}: ${value.type || value.enum ? "enum" : "json"}</span>`)
          .join("");
        const parameterJson = escapeHtml(JSON.stringify(model.parameterSchema || {}, null, 2));
        const providerJson = escapeHtml(JSON.stringify(model.providerConfig || {}, null, 2));
        return `<div class="workbench">
          <section class="card anchor-list"><a class="active">基础信息</a><a>任务模式</a><a>参数编辑器</a><a>参考素材</a><a>模型定价</a><a>请求映射</a><a>调度限流</a></section>
          <section class="section">
            <div class="card"><div class="toolbar"><h3>基础信息</h3><button class="btn primary" onclick="openModelEditorDrawer('${model.id}')" ${permissionAttrs("model.write")}>保存配置</button></div><div class="form-grid">${field("模型编码", model.modelCode)}${field("展示名称", model.displayName)}${field("供应商", model.providerName)}${field("真实模型名", model.providerModel)}${field("协议", model.providerProtocol)}${field("调用方式", model.invocationMode)}</div></div>
            <div class="card"><h3>参数编辑器</h3><div class="toolbar"><div class="filters">${parameterTags || '<span class="tag warn">暂无参数</span>'}</div><button class="btn primary" onclick="openModelEditorDrawer('${model.id}')" ${permissionAttrs("model.write")}>新增参数</button></div><div class="json-box">${parameterJson}</div></div>
            <div class="card"><h3>模型定价</h3><div class="form-grid">${field("基础积分", model.pricing?.baseCredits ?? "")}${field("计费单位", model.pricing?.unit ?? "")}${field("清晰度倍率", JSON.stringify(model.pricing?.qualityMultipliers || model.pricing?.resolutionMultipliers || {}))}${field("失败退款", JSON.stringify(model.pricing?.failureRefund || {}))}</div></div>
            <div class="card"><h3>请求映射</h3><div class="json-box">${providerJson}</div></div>
          </section>
          <aside class="card workbench-aside"><h3>上线检查</h3><div class="check-list"><div><span>密钥引用</span><span class="tag ${hasModelProviderSecret(model) ? "green" : "warn"}">${modelProviderSecretLabel(model)}</span></div><div><span>参数校验</span><span class="tag ${Object.keys(model.parameterSchema || {}).length ? "green" : "warn"}">${Object.keys(model.parameterSchema || {}).length ? "通过" : "缺失"}</span></div><div><span>计费规则</span><span class="tag ${model.pricing?.baseCredits ? "green" : "warn"}">${model.pricing?.baseCredits ? "完整" : "待配置"}</span></div><div><span>调度策略</span><span class="tag ${model.dispatchPolicy ? "green" : "warn"}">${model.dispatchPolicy?.submitQueueName || "待配置"}</span></div></div><button class="btn primary full" style="margin-top:16px" onclick="openModelStatusDrawer('${model.id}','active')" ${permissionAttrs("model.publish")}>发布模型</button><button class="btn ghost full" style="margin-top:10px" onclick="openModelRevisionsDrawer('${model.id}')">修订历史</button></aside>
        </div>`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function field(label, value) {
        return `<label class="field"><span>${label}</span><input value="${value}" /></label>`;
      }

      function filteredUsers() {
        const filters = state.userFilters || {};
        const keyword = String(filters.keyword || "").trim().toLowerCase();
        const status = filters.status || "all";
        const accountType = filters.accountType || "all";
        return state.users.filter((user) => {
          const haystack = [
            user.userId,
            user.displayName,
            user.phone,
            user.email,
            user.organizationName,
            user.teamGroupName,
            user.teamRole,
            user.membershipRole,
            frontendAccountTypeLabel(user),
          ].filter(Boolean).join(" ").toLowerCase();
          if (keyword && !haystack.includes(keyword)) return false;
          if (status !== "all" && user.status !== status) return false;
          if (accountType !== "all" && frontendAccountTypeKey(user) !== accountType) return false;
          return true;
        });
      }

      const updateUserFilter = (key, value) => {
        state.userFilters = { ...(state.userFilters || {}), [key]: value };
        refreshUserTable();
      };

      function refreshUserTable() {
        const visibleUsers = filteredUsers();
        const body = document.getElementById("user-table-body");
        const count = document.getElementById("user-visible-count");
        if (body) body.innerHTML = userRowsHtml(visibleUsers);
        if (count) {
          count.textContent = `显示 ${visibleUsers.length.toLocaleString()} / ${state.users.length.toLocaleString()}`;
        }
      }

      function bindUserFilterControls() {
        if (state.page !== "users") return;
        document.getElementById("user-search-input")?.addEventListener("input", (event) => {
          updateUserFilter("keyword", event.currentTarget.value);
        });
        document.getElementById("user-status-filter")?.addEventListener("change", (event) => {
          updateUserFilter("status", event.currentTarget.value);
        });
        document.getElementById("user-account-type-filter")?.addEventListener("change", (event) => {
          updateUserFilter("accountType", event.currentTarget.value);
        });
      }

      function teamOrganizationIds() {
        return new Set(state.users
          .filter((user) => (
            user.teamGroupName ||
            user.teamRole ||
            user.accountType === "team_permission_account" ||
            user.accountType === "subaccount" ||
            Number(user.subaccountCount || 0) > 0
          ))
          .map((user) => user.organizationId)
          .filter(Boolean));
      }

      function frontendAccountTypeKey(user) {
        if (!user) return "normal_user";
        if (
          user.teamGroupName ||
          user.teamRole ||
          user.accountType === "team_permission_account" ||
          user.accountType === "subaccount" ||
          Number(user.subaccountCount || 0) > 0
        ) {
          return "team_user";
        }
        if (user.organizationId && teamOrganizationIds().has(user.organizationId)) return "team_user";
        return "normal_user";
      }

      function isTeamUserAccount(user) {
        return Boolean(user?.organizationId) &&
          frontendAccountTypeKey(user) === "team_user" &&
          (
            user.accountType === "owner_account" ||
            user.accountType === "team_permission_account" ||
            user.teamRole === "admin" ||
            user.teamRole === "group_admin" ||
            Number(user.subaccountCount || 0) > 0
          );
      }

      function frontendAccountTypeLabel(userOrType) {
        const accountType = typeof userOrType === "string" ? userOrType : frontendAccountTypeKey(userOrType);
        return {
          normal_user: "普通用户",
          team_user: "团队用户",
        }[accountType] || "普通用户";
      }

      function frontendRoleLabel(role) {

          owner_admin: "团队主账号",
          creator: "普通成员",
          admin: "团队管理员",
          group_admin: "小组负责人",
          animator_plus: "创作成员",
          animator: "创作成员",
          sub_account: "子账户",

        const cover = item?.cover_image_url || item?.coverImageUrl || "";

          return `<img class="prompt-cover-thumb" src="${escapeAttribute(cover)}" alt="${label}封面" loading="lazy" referrerpolicy="no-referrer" />`;
        }
        return `<span class="prompt-cover-thumb prompt-cover-empty" aria-label="${label}封面">${escapeHtml((item?.name || fallbackText || "封").slice(0, 1))}</span>`;
      }

        return `/admin/assets/prompt-covers/${code}.webp`;

      function readPromptCoverFile(input, formId) {
        const file = input.files?.[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) {
          showToast("请选择图片文件");
          input.value = "";
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          const form = document.getElementById(formId);
          const valueInput = form?.querySelector('input[name="cover_image_url"]');
          if (valueInput) valueInput.value = String(reader.result || "");
          const preview = form?.querySelector(".prompt-cover-upload .prompt-cover-thumb");
          if (preview?.tagName === "IMG") preview.src = String(reader.result || "");
          showToast("封面已读取，保存后生效");
        };
        reader.readAsDataURL(file);
      }

        return `<div class="grid" style="grid-template-columns:minmax(0,1fr);">
          <section class="card">
            <div class="toolbar"><h3>支付风险</h3><div class="filters"><select id="riskStatusFilter" onchange="updateRiskStatusFilter(this.value)">${optionList(["all", "open", "reviewed", "ignored_with_reason"], state.riskStatusFilter)}</select></div><button class="btn ghost" onclick="downloadRiskExport('risks')" ${permissionAttrs("risk.export")}>导出CSV</button><button class="btn ghost" onclick="loadRiskAudit().then(renderShell)">刷新</button></div>
            <div class="table-wrap compact"><table><thead><tr><th>风险类型</th><th>等级</th><th>决策</th><th>状态</th><th class="actions">操作</th></tr></thead><tbody>${riskRows}</tbody></table></div>
          </section>
          <section class="card">
            <h3>任务异常</h3>
            <div class="table-wrap compact"><table><thead><tr><th>任务</th><th>队列</th><th>供应商</th><th>状态</th><th class="actions">操作</th></tr></thead><tbody>${taskRows}</tbody></table></div>
          </section>
          <section class="card">
            <h3>支付积分修复</h3>
            <div class="table-wrap compact"><table><thead><tr><th>订单号</th><th>积分</th><th>金额</th><th>支付时间</th><th>状态</th><th class="actions">操作</th></tr></thead><tbody>${paymentIssueRows}</tbody></table></div>
          </section>
          <section class="card">
            <div class="toolbar"><h3>审计日志</h3><button class="btn ghost" onclick="downloadRiskExport('audit-events')" ${permissionAttrs("risk.export")}>导出CSV</button></div>
            <div class="table-wrap compact"><table><thead><tr><th>动作</th><th>对象</th><th>原因</th><th>时间</th><th class="actions">操作</th></tr></thead><tbody>${auditRows}</tbody></table></div>
          </section>
        </div>`;
      }

      function riskTable(name, severity, status) {
        return `<div class="table-wrap"><table><thead><tr><th>事件</th><th>等级</th><th>状态</th><th class="actions">操作</th></tr></thead><tbody><tr><td>${name}</td><td>${severity}</td><td><span class="tag warn">${status}</span></td><td class="actions"><button class="icon-btn" onclick="openDrawer('风险复核','填写处理结论并写入 audit_events。')">审</button></td></tr></tbody></table></div>`;
      }

      async function updateRiskStatusFilter(value) {
        state.riskStatusFilter = value || "all";
        await loadRiskAudit();
        renderShell();
      }

      function paymentRiskRow(risk) {
        const severityLabel = risk.severity === "critical" ? "高" : risk.severity === "warning" ? "中" : "低";
        const statusLabel = risk.status === "open" ? "待处理" : risk.status === "reviewed" ? "已复核" : "已忽略";
        return `<tr><td>${risk.riskType}<div class="metric-note">${compactJson(risk.metadata)}</div></td><td><span class="tag ${risk.severity === "critical" ? "warn" : "blue"}">${severityLabel}</span></td><td>${risk.decision}</td><td><span class="tag ${risk.status === "open" ? "warn" : "green"}">${statusLabel}</span></td><td class="actions"><button class="icon-btn" onclick="openRiskReviewDrawer('${risk.id}')" ${permissionAttrs("risk.review")}>审</button></td></tr>`;
      }

      function taskExceptionRow(task) {
        return `<tr><td>${task.taskType}<div class="metric-note">${task.failureCode || task.id}</div></td><td>${task.queueName}</td><td>${task.providerName || "-"}</td><td><span class="tag warn">${task.status}</span></td><td class="actions"><button class="icon-btn" onclick="openTaskRetryDrawer('${task.id}')" ${permissionAttrs("ops.task.retry")}>重</button></td></tr>`;
      }

      function paymentIssueRow(issue) {
        const amount = `${(Number(issue.amountMinor || 0) / 100).toFixed(2)} ${issue.currency || "CNY"}`;
        const statusLabel = issue.status === "resolved" ? "已修复" : "待修复";
        return `<tr><td>${issue.orderNo}<div class="metric-note">${issue.orderId}</div></td><td>${Number(issue.credits || 0).toLocaleString()}</td><td>${amount}</td><td>${issue.paidAt ? new Date(issue.paidAt).toLocaleString("zh-CN") : "-"}</td><td><span class="tag ${issue.status === "resolved" ? "green" : "warn"}">${statusLabel}</span></td><td class="actions"><button class="icon-btn" onclick="openPaymentRepairDrawer('${issue.orderId}')" ${permissionAttrs("risk.review")}>修</button></td></tr>`;
      }

      function auditEventRow(event) {
        return `<tr><td>${event.eventType}</td><td>${event.targetType}<div class="metric-note">${event.targetId}</div></td><td>${event.reason || "-"}</td><td>${new Date(event.createdAt).toLocaleString("zh-CN")}</td><td class="actions"><button class="icon-btn" title="详情" onclick="openAuditEventDrawer('${event.id}')">详</button></td></tr>`;
      }

      function downloadRiskExport(scope) {
        const url = new URL(
          scope === "audit-events" ? "/api/admin/exports/audit-events.csv" : "/api/admin/exports/risks.csv",
          window.location.origin,
        );
        if (scope === "risks" && state.riskStatusFilter && state.riskStatusFilter !== "all") {
          url.searchParams.set("riskStatus", state.riskStatusFilter);
        }
        window.location.assign(url.toString());
      }

      function openAuditEventDrawer(eventId) {
        const event = state.auditEvents.find((item) => item.id === eventId);
        if (!event) return;
        const metadata = event.metadata || {};
        const ipAddress = event.ipAddress || metadata.ipAddress || "-";
        const userAgent = event.userAgent || metadata.userAgent || "-";
        const adminDisplayName = event.adminDisplayName || metadata.adminDisplayName || metadata.loginName || "-";
        const result = event.result || metadata.result || "success";
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel" style="width:min(720px,100%);">
          <div class="drawer-head"><h3>审计详情</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div>
          <section class="card">
            <h4>审计主体</h4>
            <div class="check-list">
              <div><span>管理员</span><span>${adminDisplayName}</span></div>
              <div><span>动作</span><span>${event.eventType}</span></div>
              <div><span>结果</span><span class="tag ${result === "success" ? "green" : "warn"}">${result}</span></div>
            </div>
          </section>
          <section class="card">
            <h4>目标对象</h4>
            <div class="check-list">
              <div><span>类型</span><span>${event.targetType}</span></div>
              <div><span>ID</span><span>${event.targetId}</span></div>
              <div><span>原因</span><span>${event.reason || "-"}</span></div>
              <div><span>时间</span><span>${new Date(event.createdAt).toLocaleString("zh-CN")}</span></div>
            </div>
          </section>
          <section class="card">
            <h4>请求上下文</h4>
            <div class="check-list">
              <div><span>ipAddress</span><span>${ipAddress}</span></div>
              <div><span>userAgent</span><span style="word-break:break-all;">${userAgent}</span></div>
            </div>
          </section>
          <section class="card"><h4>Metadata</h4><div class="json-box">${escapeHtml(JSON.stringify(metadata, null, 2))}</div></section>
        </aside>`;
      }

      function settingsPage() {
        const configRows = state.settings.configs.length
          ? state.settings.configs.map(configRow).join("")
          : `<tr><td colspan="5">${state.settingsLoadError || "暂无运行配置"}</td></tr>`;
        const secretRows = state.settings.secretReferences.length
          ? state.settings.secretReferences.map(secretReferenceRow).join("")
          : `<tr><td colspan="5">暂无密钥引用</td></tr>`;
        const accountRows = state.adminAccounts.length
          ? state.adminAccounts.map(adminAccountRow).join("")
          : `<tr><td colspan="5">暂无后台权限账户</td></tr>`;
        return `<div class="grid" style="grid-template-columns:minmax(0,1fr);">
          <section class="card">
            <div class="toolbar"><h3>运行配置</h3><button class="btn primary" onclick="openRuntimeConfigDrawer()" ${permissionAttrs("settings.write")}>新增配置</button></div>
            <div class="table-wrap settings compact"><table><thead><tr><th>配置键</th><th>作用域</th><th>类型</th><th>当前值</th><th class="actions">操作</th></tr></thead><tbody>${configRows}</tbody></table></div>
          </section>
          <section class="card">
            <div class="toolbar"><h3>密钥引用</h3><button class="btn primary" onclick="openSecretReferenceDrawer()" ${permissionAttrs("settings.write")}>新增密钥引用</button></div>
            <div class="table-wrap settings compact"><table><thead><tr><th>引用名</th><th>环境变量</th><th>供应商</th><th>状态</th><th class="actions">操作</th></tr></thead><tbody>${secretRows}</tbody></table></div>
          </section>
          <section class="card">
            <div class="toolbar"><h3>后台权限账户</h3><button class="btn primary" onclick="openAdminAccountDrawer()" ${permissionAttrs("admin_account.write")}>新增账户</button></div>
            <div class="table-wrap settings compact"><table><thead><tr><th>账号</th><th>显示名</th><th>角色</th><th>状态</th><th class="actions">操作</th></tr></thead><tbody>${accountRows}</tbody></table></div>
          </section>
        </div>`;
      }

      function configRow(config) {
        const value = compactJson(config.value);
        return `<tr><td>${config.key}<div class="metric-note">${config.description || "无说明"}</div></td><td>${config.scope}</td><td><span class="tag blue">${config.valueType}</span></td><td title="${escapeHtml(value)}">${escapeHtml(value)}</td><td class="actions"><div class="actions-row"><button class="icon-btn" onclick="openRuntimeConfigDrawer('${config.key}')" ${permissionAttrs("settings.write")}>改</button><button class="icon-btn" title="历史" onclick="openRuntimeConfigHistoryDrawer('${config.key}')">史</button></div></td></tr>`;
      }

      function secretReferenceRow(secret) {
        const statusClass = secret.status === "configured" ? "green" : secret.status === "missing" ? "warn" : "blue";
        const statusLabel = secret.status === "configured" ? "已配置" : secret.status === "missing" ? "缺失" : "未知";
        const checkedText = secret.lastCheckedAt ? new Date(secret.lastCheckedAt).toLocaleString("zh-CN") : "未探测";
        return `<tr><td>${secret.secretRef}<div class="metric-note">${secret.purpose}</div></td><td>${secret.envName}<div class="metric-note">${checkedText}</div></td><td>${secret.providerName || "-"}</td><td><span class="tag ${statusClass}">${statusLabel}</span></td><td class="actions"><div class="actions-row"><button class="icon-btn" title="探测密钥" onclick="probeSecretReference('${secret.id}')" ${permissionAttrs("settings.write")}>测</button></div></td></tr>`;
      }

      function adminAccountRow(account) {
        const statusLabel = account.status === "active" ? "启用" : account.status === "disabled" ? "禁用" : "归档";
        const nextStatus = account.status === "active" ? "disabled" : "active";
        return `<tr><td>${account.loginName}</td><td>${account.displayName}</td><td>${account.roles.join(" / ")}</td><td><span class="tag ${account.status === "active" ? "green" : "warn"}">${statusLabel}</span></td><td class="actions"><div class="actions-row"><button class="icon-btn" onclick="openAdminAccountEditDrawer('${account.id}')" ${permissionAttrs("admin_account.write")}>改</button><button class="icon-btn" onclick="openAdminAccountPasswordResetDrawer('${account.id}')" ${permissionAttrs("admin_account.write")}>密</button><button class="icon-btn" onclick="openAdminAccountEditDrawer('${account.id}','${nextStatus}')" ${permissionAttrs("admin_account.write")}>${nextStatus === "disabled" ? "停" : "启"}</button></div></td></tr>`;
      }

      function compactJson(value) {
        if (typeof value === "string") return value;
        return JSON.stringify(value);
      }

      function accountPage() {
        const sessions = state.adminSessions.length
          ? state.adminSessions.map((session) => `
            <tr>
              <td>${session.current ? `<span class="tag blue">当前会话</span>` : `<span class="tag">其他会话</span>`}</td>
              <td>${escapeHtml(session.ipAddress || "-")}</td>
              <td style="max-width:260px;white-space:normal;">${escapeHtml(session.userAgent || "-")}</td>
              <td>${session.revokedAt ? `<span class="tag warn">已失效</span>` : `<span class="tag green">有效</span>`}</td>
              <td>${session.expiresAt ? new Date(session.expiresAt).toLocaleString("zh-CN") : "-"}</td>
            </tr>
          `).join("")
          : `<tr><td colspan="5">${state.adminSessionLoadError || "暂无会话数据"}</td></tr>`;
        return `
          <div class="grid" style="max-width:980px;">
            <section class="card">
              <h3>管理员账户</h3>
              <div class="form-grid">
                ${field("登录名", state.session?.account?.loginName || "")}
                ${field("显示名", state.session?.account?.displayName || "")}
              </div>
              <div class="toolbar" style="margin-top:16px;">
                <button class="btn ghost" onclick="openAdminProfileDrawer()">修改资料</button>
                <button class="btn primary" onclick="openPasswordChangeDrawer()">修改密码</button>
                <button class="btn ghost" onclick="revokeOtherAdminSessions()">退出其他会话</button>
                <button class="btn ghost" onclick="logout()">退出登录</button>
              </div>
            </section>
            <section class="card">
              <div class="toolbar">
                <div>
                  <h3 style="margin:0;">登录会话</h3>
                  <div class="metric-note">查看当前管理员的登录设备，可一键失效其他有效会话。</div>
                </div>
                <button class="btn ghost" onclick="loadAdminSessions().then(renderShell)">刷新</button>
              </div>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>会话</th><th>IP</th><th>User-Agent</th><th>状态</th><th>过期时间</th></tr></thead>
                  <tbody>${sessions}</tbody>
                </table>
              </div>
            </section>
          </div>`;
      }

      async function revokeOtherAdminSessions() {
        try {
          const result = await api("/api/admin/auth/sessions/revoke-other", {
            method: "POST",
            headers: { "idempotency-key": `admin-ui-revoke-sessions-${Date.now()}` },
            body: "{}",
          });
          await loadAdminSessions();
          renderShell();
          openDrawer("其他会话已退出", `已失效 ${Number(result.data?.revokedCount || 0)} 个其他登录会话。`);
        } catch (err) {
          openDrawer("退出其他会话失败", err.payload?.error?.message || "请稍后重试");
        }
      }

      function openAdminProfileDrawer() {
        const drawer = document.getElementById("drawer");
        const currentDisplayName = state.session?.account?.displayName || "";
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          <div class="drawer-head"><h3>当前管理员资料</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div>
          <p style="color:var(--muted);line-height:1.7">这里修改的是当前登录管理员自己的展示名称，不会影响前台用户或其他后台账户。</p>
          <form id="admin-profile-form">
            <label class="field"><span>登录名</span><input value="${escapeAttribute(state.session?.account?.loginName || "")}" disabled /></label>
            <label class="field"><span>显示名称</span><input name="displayName" value="${escapeAttribute(currentDisplayName)}" required /></label>
            <div class="error-text" id="admin-profile-error"></div>
            <button class="btn primary full" type="submit">保存资料</button>
          </form>
        </aside>`;
        document.getElementById("admin-profile-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const error = document.getElementById("admin-profile-error");
          await runAdminMutation(event.currentTarget, error, async () => {
            await api("/api/admin/auth/profile", {
              method: "PATCH",
              headers: { "idempotency-key": `admin-ui-profile-${Date.now()}` },
              body: JSON.stringify({
                displayName: String(form.get("displayName") || ""),
              }),
            });
            await loadSession();
            closeDrawer();
            renderShell();
          }, "管理员资料已更新").catch(() => undefined);
        });
      }

      function openDrawer(title, body) {
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel"><div class="drawer-head"><h3>${title}</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div><p style="color:var(--muted);line-height:1.7">${body}</p><label class="field"><span>操作原因</span><textarea rows="4" placeholder="危险或敏感操作必须填写原因"></textarea></label><button class="btn primary full">确认</button></aside>`;
      }

      function openRiskReviewDrawer(riskId) {
        const risk = state.risks.risks.find((item) => item.id === riskId);
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          <div class="drawer-head"><h3>风险复核</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div>
          <p style="color:var(--muted);line-height:1.7">${risk?.riskType || riskId} 将标记为已复核，并写入后台审计记录。</p>
          <div class="check-list">
            <div><span>风险等级</span><span class="tag ${risk?.severity === "critical" ? "warn" : "blue"}">${risk?.severity || "-"}</span></div>
            <div><span>处理决策</span><span>${risk?.decision || "-"}</span></div>
            <div><span>支付单</span><span>${risk?.orderId || risk?.paymentIntentId || "-"}</span></div>
          </div>
          <form id="risk-review-form" style="margin-top:16px;">
            <label class="field"><span>复核结论</span><textarea name="reason" rows="4" required placeholder="例如：核对支付回调与订单金额一致，允许放行"></textarea></label>
            <div class="error-text" id="risk-review-error"></div>
            <button class="btn primary full" type="submit">确认复核</button>
          </form>
        </aside>`;
        document.getElementById("risk-review-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const error = document.getElementById("risk-review-error");
          await runAdminMutation(event.currentTarget, error, async () => {
            await api(`/api/admin/risks/${riskId}/review`, {
              method: "POST",
              headers: { "idempotency-key": `admin-ui-risk-review-${riskId}-${Date.now()}` },
              body: JSON.stringify({ reason: String(form.get("reason") || "") }),
            });
            await loadRiskAudit();
            closeDrawer();
            renderShell();
          }, "风险复核已完成").catch(() => undefined);
        });
      }

      function openTaskRetryDrawer(taskId) {
        const task = state.risks.taskExceptions.find((item) => item.id === taskId);
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          <div class="drawer-head"><h3>任务重试</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div>
          <p style="color:var(--muted);line-height:1.7">${task?.taskType || taskId} 将重新进入任务队列，并写入后台审计记录。</p>
          <div class="check-list">
            <div><span>队列</span><span>${task?.queueName || "-"}</span></div>
            <div><span>当前状态</span><span class="tag warn">${task?.status || "-"}</span></div>
            <div><span>失败原因</span><span>${task?.failureCode || "-"}</span></div>
          </div>
          <form id="task-retry-form" style="margin-top:16px;">
            <label class="field"><span>重试原因</span><textarea name="reason" rows="4" required placeholder="例如：供应商超时已恢复，允许重新排队"></textarea></label>
            <div class="error-text" id="task-retry-error"></div>
            <button class="btn primary full" type="submit">确认重试</button>
          </form>
        </aside>`;
        document.getElementById("task-retry-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const error = document.getElementById("task-retry-error");
          await runAdminMutation(event.currentTarget, error, async () => {
            await api(`/api/admin/ops/tasks/${taskId}/retry`, {
              method: "POST",
              headers: { "idempotency-key": `admin-ui-task-retry-${taskId}-${Date.now()}` },
              body: JSON.stringify({ reason: String(form.get("reason") || "") }),
            });
            await loadRiskAudit();
            closeDrawer();
            renderShell();
          }, "任务已重新排队").catch(() => undefined);
        });
      }

      function openPaymentRepairDrawer(orderId) {
        const issue = state.risks.paymentIssues.find((item) => item.orderId === orderId);
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          <div class="drawer-head"><h3>支付积分修复</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div>
          <p style="color:var(--muted);line-height:1.7">${issue?.orderNo || orderId} 已支付但未发放积分。确认后将通过积分账本补发，并写入后台审计。</p>
          <div class="check-list">
            <div><span>补发积分</span><span>${Number(issue?.credits || 0).toLocaleString()}</span></div>
            <div><span>订单金额</span><span>${((Number(issue?.amountMinor || 0)) / 100).toFixed(2)} ${issue?.currency || "CNY"}</span></div>
            <div><span>支付时间</span><span>${issue?.paidAt ? new Date(issue.paidAt).toLocaleString("zh-CN") : "-"}</span></div>
          </div>
          <form id="payment-repair-form" style="margin-top:16px;">
            <label class="field"><span>修复原因</span><textarea name="reason" rows="4" required placeholder="例如：支付成功事件已核对，补发购买积分"></textarea></label>
            <div class="error-text" id="payment-repair-error"></div>
            <button class="btn primary full" type="submit">确认修复</button>
          </form>
        </aside>`;
        document.getElementById("payment-repair-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const error = document.getElementById("payment-repair-error");
          await runAdminMutation(event.currentTarget, error, async () => {
            await api(`/api/admin/ops/payments/${orderId}/repair-credit`, {
              method: "POST",
              headers: { "idempotency-key": `admin-ui-payment-repair-${orderId}-${Date.now()}` },
              body: JSON.stringify({ reason: String(form.get("reason") || "") }),
            });
            await Promise.all([loadRiskAudit(), loadDashboard()]);
            closeDrawer();
            renderShell();
          }, "支付积分修复已完成").catch(() => undefined);
        });
      }

      function openCreditGrantDrawer(userId) {
        const targetUser = state.users.find((user) => user.userId === userId);
        if (!guardUserAction(targetUser, "credit")) return;
        const displayName = targetUser?.displayName || userId;
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          ${userDrawerHead("手动添加积分", userId)}
          <p style="color:var(--muted);line-height:1.7">给 ${displayName} 添加积分。提交后会写入 credit_ledger_entries、更新余额并记录后台审计。</p>
          <form id="credit-grant-form">

      function renderTeamLimitDrawer(userId, summary) {
        const user = state.users.find((item) => item.userId === userId);

        const usedSeats = Number(summary.usedSeats ?? 0);

        const overLimit = usedSeats > effectiveSeatLimit;
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          ${userDrawerHead("团队额度", userId)}
          <p style="color:var(--muted);line-height:1.7">为特殊团队单独配置可创建子账号数量。恢复默认后，该团队会重新跟随系统默认值。</p>

            <div><span>团队</span><span>${escapeHtml(summary.organizationName || user?.organizationName || "-")}</span></div>
            <div><span>额度来源</span><span class="tag ${isOverride ? "blue" : "green"}">${isOverride ? "特殊配置" : "系统默认"}</span></div>
            <div><span>系统默认上限</span><span>${Number(summary.defaultSeatLimit ?? 50).toLocaleString()}</span></div>
            <div><span>当前有效上限</span><span>${effectiveSeatLimit.toLocaleString()}</span></div>

          </div>
          ${overLimit ? `<p class="error-text" style="margin:12px 0 0;">当前已用数量超过配置上限。系统不会删除已有账号，但前端会阻止继续创建，直到已用数量低于上限。</p>` : ""}

            <label class="field"><span>可创建子账号上限</span><input id="team-limit-seat-input" name="seatLimit" type="number" min="0" step="1" value="${effectiveSeatLimit}" required /></label>
            <small style="color:var(--muted);line-height:1.6;display:block;margin-top:-6px;">特殊团队可配置为任意非负整数；普通团队仍使用系统默认上限。</small>

            <label class="field"><span>操作原因</span><textarea name="reason" rows="4" required placeholder="例如：企业客户申请扩容 / 合同降级恢复默认"></textarea></label>

        </aside>`;
        const formElement = document.getElementById("team-limit-form");
        const input = document.getElementById("team-limit-seat-input");
        const preview = document.getElementById("team-limit-preview");
        const updatePreview = () => {
          const nextLimit = Number(input.value);
          if (!Number.isInteger(nextLimit) || nextLimit < 0) {
            preview.textContent = "请输入大于等于 0 的整数。";
            return;
          }
          const nextRemaining = Math.max(0, nextLimit - usedSeats);
          preview.textContent = nextLimit < usedSeats
            ? `保存后不会删除已有账号，但会禁止继续创建；当前已用 ${usedSeats.toLocaleString()}，新上限 ${nextLimit.toLocaleString()}。`

              method: "PATCH",
