      function openCreditSetBalanceDrawer(userId) {
        const user = state.users.find((item) => item.userId === userId);
        if (!guardUserAction(user, "credit")) return;
        const currentCredits = Number(user?.availableCredits || 0);
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel">
          ${userDrawerHead("调整到目标积分", userId)}
          <p style="color:var(--muted);line-height:1.7">为 ${user?.displayName || userId} 手动修改可用积分。系统会自动计算差额，并通过添加或扣减接口写入 credit_ledger_entries，不直接改余额缓存。</p>
          <form id="credit-set-balance-form">
            <div class="check-list" style="margin-bottom:14px;">
              <div><span>当前可用积分</span><span id="credit-current-balance">${currentCredits.toLocaleString()}</span></div>
              <div><span>调整差额</span><span id="credit-balance-delta">-</span></div>
            </div>
            <label class="field"><span>目标可用积分</span><input name="targetBalance" type="number" min="0" step="1" required /></label>
            <label class="field"><span>调整场景</span><select name="adjustmentScenario">${adjustmentScenarioOptions("correction")}</select></label>
            <label class="field"><span>关联工单号（选填）</span><input name="workOrderNo" placeholder="例如：CS-20260605-001" /></label>
            <label class="field"><span>操作原因</span><textarea name="reason" rows="4" required placeholder="例如：财务核账后修正用户可用积分"></textarea></label>
            <div class="error-text" id="credit-set-balance-error"></div>
            <button class="btn primary full" type="submit">确认调整积分</button>
          </form>
        </aside>`;
        const formElement = document.getElementById("credit-set-balance-form");
        const targetInput = formElement.elements.targetBalance;
        const deltaNode = document.getElementById("credit-balance-delta");
        const updateDelta = () => {
          const target = Number(targetInput.value);
          if (!Number.isFinite(target) || targetInput.value === "") {
            deltaNode.textContent = "-";
            return;
          }
          const delta = Math.trunc(target) - currentCredits;
          deltaNode.textContent = `${delta > 0 ? "+" : ""}${delta.toLocaleString()}`;
        };
        targetInput.addEventListener("input", updateDelta);
        formElement.addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const error = document.getElementById("credit-set-balance-error");
          const workOrderNo = optionalWorkOrder(form, error);
          if (workOrderNo === null) return;
          const targetBalance = Number(form.get("targetBalance"));
          if (!Number.isInteger(targetBalance) || targetBalance < 0) {
            error.textContent = "目标可用积分必须是大于等于 0 的整数";
            return;
          }
          const delta = targetBalance - currentCredits;
          if (delta === 0) {
            error.textContent = "目标积分与当前积分一致，无需调整";
            return;
          }
          const direction = delta > 0 ? "grant" : "deduct";
          const payload = {
            amount: Math.abs(delta),
            reason: String(form.get("reason") || "").trim(),
            adjustmentScenario: String(form.get("adjustmentScenario") || "manual_adjustment"),
          };
          if (workOrderNo) payload.workOrderNo = workOrderNo;
          await runAdminMutation(event.currentTarget, error, async () => {
            await api(`/api/admin/users/${userId}/credits/${direction}`, {
              method: "POST",
              headers: { "idempotency-key": `admin-ui-credit-set-balance-${userId}-${Date.now()}` },
              body: JSON.stringify(payload),
            });
            await loadUsers();
            closeDrawer();
            renderShell();
          }, "积分已调整到目标值").catch(() => undefined);
        });
      }

      async function openRuntimeConfigHistoryDrawer(configKey) {
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel" style="width:min(760px,100%);">
          <div class="drawer-head"><h3>配置历史</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div>

        </aside>`;
        try {
          const result = await api(`/api/admin/settings/revisions?key=${encodeURIComponent(configKey)}&pageSize=20`);
          const rows = (result.data || []).map((revision) => {
            const previous = escapeHtml(compactJson(revision.previousValue));
            const next = escapeHtml(compactJson(revision.nextValue));
            return `<tr><td>${new Date(revision.createdAt).toLocaleString("zh-CN")}<div class="metric-note">${revision.reason || "-"}</div></td><td title="${previous}">${previous}</td><td title="${next}">${next}</td><td class="actions"><button class="icon-btn" title="回滚" onclick="openRuntimeConfigRollbackDrawer('${configKey}','${revision.id}')">回</button></td></tr>`;
          }).join("") || `<tr><td colspan="4">暂无修订记录</td></tr>`;
          document.getElementById("config-history-panel").innerHTML = `<div class="table-wrap"><table><thead><tr><th>时间 / 原因</th><th>旧值</th><th>新值</th><th class="actions">操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        } catch (err) {
          document.getElementById("config-history-panel").innerHTML = `<span class="error-text">${err.payload?.error?.message || "配置历史加载失败"}</span>`;
        }
      }

      function parseConfigValue(rawValue, valueType) {
        if (valueType === "string") return rawValue;
        if (valueType === "number") {
          const value = Number(rawValue);
          if (!Number.isFinite(value)) throw new Error("请输入有效数字");
          return value;
        }
        if (valueType === "boolean") {
          if (rawValue === "true" || rawValue === "开启" || rawValue === "1") return true;
          if (rawValue === "false" || rawValue === "关闭" || rawValue === "0") return false;
          throw new Error("布尔值请输入 true 或 false");
        }
        if (valueType === "string_array") {
          const parsed = rawValue.trim().startsWith("[")
            ? JSON.parse(rawValue)
            : rawValue.split(",").map((item) => item.trim()).filter(Boolean);
          if (!Array.isArray(parsed) || parsed.some((item) => typeof item !== "string")) {
            throw new Error("字符串数组请输入 JSON 数组或逗号分隔文本");
          }
          return parsed;
        }
        return JSON.parse(rawValue);

      function parseJsonTextarea(form, name) {
        const raw = String(form.get(name) || "").trim();
        if (!raw) return {};
        const value = JSON.parse(raw);
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          throw new Error(`${name} 必须是 JSON 对象`);
        }
        return value;
      }

      function parameterSchemaFromForm(form) {
        const schema = parseJsonTextarea(form, "parameterSchema");
        return addManualParameterToSchema(schema, {
          key: String(form.get("manualParameterKey") || ""),
          label: String(form.get("manualParameterLabel") || ""),
          type: String(form.get("manualParameterType") || "string"),
          options: String(form.get("manualParameterOptions") || ""),
          required: Boolean(form.get("manualParameterRequired")),
          visible: Boolean(form.get("manualParameterVisible")),

      function modelParameterDisplayName(key, parameter) {
        const knownNames = {
          prompt: "正向提示词",
          negativePrompt: "反向提示词",

          editInstruction: "编辑指令",
          aspectRatio: "画面比例",
          quality: "质量档位",
          count: "生成数量",
        };
        return knownNames[key] || parameter.label || key;
      }

      function parameterTypeLabel(type) {
        const labels = {
          string: "文本",
          number: "数字",
          integer: "整数",
          boolean: "开关",
          enum: "选项",
          array: "列表",
          file: "文件",
          "file[]": "文件列表",
          json: "JSON",
        };

      }

      function parameterSchemaRows(schema) {
        const entries = Object.entries(schema || {});
        if (entries.length === 0) {
          return `<tr><td colspan="5">暂无现有参数</td></tr>`;
        }
        return entries.map(([key, value]) => {
          const parameter = value && typeof value === "object" ? value : {};
          const options = Array.isArray(parameter.options) ? parameter.options.join(", ") : "-";
          const visibleChecked = parameter.visible !== false ? "checked" : "";
          return `<tr><td>${escapeHtml(modelParameterDisplayName(key, parameter))}<div class="metric-note">${escapeHtml(key)}</div></td><td><span class="tag blue">${escapeHtml(parameterTypeLabel(parameter.type || "json"))}</span></td><td>${escapeHtml(options)}</td><td class="parameter-visible-cell"><label class="parameter-visible-toggle"><input type="checkbox" ${visibleChecked} onchange="toggleParameterVisibilityInSchema('${escapeAttribute(key)}', this.checked)" /> 显示</label></td><td class="actions"><div class="actions-row"><button class="icon-btn" title="编辑参数" type="button" onclick="fillManualParameterEditor('${escapeAttribute(key)}')">编</button><button class="icon-btn" title="删除参数" type="button" onclick="removeManualParameterFromSchema('${escapeAttribute(key)}')">删</button></div></td></tr>`;
        }).join("");
      }

      function refreshParameterSchemaList(schema) {
        const list = document.querySelector("#parameter-schema-list tbody");
        if (list) list.innerHTML = parameterSchemaRows(schema);
      }

      function currentModelEditorSchema() {
        const form = document.getElementById("model-editor-form");
        return form ? parseJsonTextarea(new FormData(form), "parameterSchema") : {};
      }

      function fillManualParameterEditor(parameterKey) {
        const form = document.getElementById("model-editor-form");
        if (!form) return;
        const schema = currentModelEditorSchema();
        const parameter = schema[parameterKey] || {};
        form.elements.manualParameterKey.value = parameterKey;
        form.elements.manualParameterLabel.value = modelParameterDisplayName(parameterKey, parameter);
        form.elements.manualParameterType.value = parameter.type || "string";
        form.elements.manualParameterOptions.value = Array.isArray(parameter.options) ? parameter.options.join(", ") : "";
        form.elements.manualParameterRequired.checked = Boolean(parameter.required);
        form.elements.manualParameterVisible.checked = parameter.visible !== false;
      }

      function toggleParameterVisibilityInSchema(parameterKey, visible) {
        const form = document.getElementById("model-editor-form");
        if (!form) return;
        const schema = currentModelEditorSchema();
        const parameter = schema[parameterKey] && typeof schema[parameterKey] === "object" && !Array.isArray(schema[parameterKey])
          ? schema[parameterKey]
          : {};
        schema[parameterKey] = {
          ...parameter,
          visible: Boolean(visible),
        };
        form.elements.parameterSchema.value = JSON.stringify(schema, null, 2);
        refreshParameterSchemaList(schema);
      }

      function removeManualParameterFromSchema(parameterKey) {
        const form = document.getElementById("model-editor-form");
        if (!form) return;
        const schema = currentModelEditorSchema();
        delete schema[parameterKey];
        form.elements.parameterSchema.value = JSON.stringify(schema, null, 2);
        refreshParameterSchemaList(schema);
      }

      function addManualParameterToSchema(schema, input) {
        const key = String(input.key || "").trim();
        if (!key) return schema;
        if (!/^[A-Za-z][A-Za-z0-9_]*$/.test(key)) {
          throw new Error("参数键只能使用英文、数字和下划线，并且必须以字母开头");
        }
        const type = String(input.type || "string").trim();
        const parameter = {
          label: String(input.label || key).trim(),
          type,
          required: Boolean(input.required),
          visible: input.visible !== false,
        };
        const options = String(input.options || "")
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
        if (options.length > 0) {
          parameter.options = options;
          parameter.adminEditableOptions = true;
        }
        return {
          ...schema,
          [key]: parameter,
        };
      }

      function valueForTextarea(value, valueType) {
        if (value === undefined || value === null) return "";
        if (valueType === "string") return String(value);
        return JSON.stringify(value, null, 2);

            const payload = scenePromptPayloadFromForm(form, existing);
            if (!payload.name || !payload.code) throw new Error("名称和编码必填");
            if (!payload.prompt_content || payload.prompt_content.length < 20) throw new Error("场景提示词正文不得为空，建议不少于 20 字");
            try {
              await api(existing ? `/api/admin/scene-prompt/templates/${encodeURIComponent(existing.id)}` : "/api/admin/scene-prompt/templates", {
                method: existing ? "PUT" : "POST",
                headers: { "idempotency-key": `admin-ui-scene-prompt-template-${existing?.id || payload.code}-${Date.now()}` },
                body: JSON.stringify(payload),
              });
              await loadScenePromptTemplates();
            } catch {
              const others = (state.scenePromptTemplates || []).filter((item) => String(item.id) !== String(payload.id));
              state.scenePromptTemplates = [...others, payload];
              persistScenePromptTemplates();
            }
            state.scenePromptStage = payload.stage;
            closeDrawer();
            renderShell();
          }, "场景提示词已保存").catch(() => undefined);
        });
      }

      async function copyScenePromptTemplate(templateId) {
        const existing = scenePromptTemplateById(templateId);
        if (!existing) return;
        try {
          await api(`/api/admin/scene-prompt/templates/${encodeURIComponent(templateId)}/copy`, {
            method: "POST",
            headers: { "idempotency-key": `admin-ui-scene-prompt-copy-${templateId}-${Date.now()}` },
            body: "{}",
          });
          await loadScenePromptTemplates();
        } catch {
          state.scenePromptTemplates = [...(state.scenePromptTemplates || []), { ...existing, id: `${existing.id}-copy-${Date.now()}`, name: `${existing.name} 副本`, code: `${existing.code}_copy_${Date.now()}`, is_default: false }];

          });
          await loadScenePromptTemplates();

          state.scenePromptTemplates = (state.scenePromptTemplates || []).map((item) => String(item.id) === String(templateId) ? { ...item, status } : item);

          persistScenePromptTemplates();

        showToast("默认提示词已更新");

      function persistShotPromptTemplates() { localStorage.setItem("admin-shot-prompt-templates", JSON.stringify(state.shotPromptTemplates || [])); }
      function shotPromptPayloadFromForm(form, existing) {
        const splitList = (name) => String(form.get(name) || "").split(",").map((item) => item.trim()).filter(Boolean);
        return { id: existing?.id || `shot-prompt-${String(form.get("code") || Date.now()).trim()}`, name: String(form.get("name") || "").trim(), code: String(form.get("code") || "").trim(), stage: String(form.get("stage") || "outline"), model_family: String(form.get("model_family") || "general"), tags: splitList("tags"), variables: splitList("variables"), json_schema: String(form.get("json_schema") || "").trim(), prompt_content: String(form.get("prompt_content") || "").trim(), negative_prompt: String(form.get("negative_prompt") || "").trim(), is_default: form.get("is_default") === "on", status: String(form.get("status") || "enabled"), sort_order: Number(form.get("sort_order") || 0), remark: String(form.get("remark") || "").trim() };
      }
      function openShotPromptTemplateDrawer(templateId = "") {
        const existing = shotPromptTemplateById(templateId);
        const stage = existing?.stage || existing?.promptStage || state.shotPromptStage || "outline";
        const defaults = existing || shotPromptTemplateFallback.find((item) => item.stage === stage) || shotPromptTemplateFallback[0];
        const drawer = document.getElementById("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `<aside class="drawer-panel" style="width:min(900px,100%);"><div class="drawer-head"><h3>${existing ? "编辑分镜提示词" : "新增分镜提示词"}</h3><button class="icon-btn" onclick="closeDrawer()">×</button></div><form id="shot-prompt-template-form"><div class="form-grid"><label class="field"><span>名称</span><input name="name" value="${escapeAttribute(existing?.name || "")}" required /></label><label class="field"><span>编码</span><input name="code" value="${escapeAttribute(existing?.code || "")}" pattern="[a-z0-9_]+" required /></label><label class="field"><span>阶段</span><select name="stage">${optionList(["outline"], stage)}</select></label><label class="field"><span>模型族</span><select name="model_family">${optionList(["general", "doubao", "seedream"], existing?.model_family || existing?.modelFamily || defaults?.model_family || "general")}</select></label><label class="field"><span>状态</span><select name="status">${optionList(["enabled", "disabled"], existing?.status || "enabled")}</select></label><label class="field"><span>排序权重</span><input name="sort_order" type="number" value="${Number(existing?.sort_order || existing?.sortOrder || defaults?.sort_order || 100)}" /></label></div><label class="inline-check"><input name="is_default" type="checkbox" ${existing?.is_default || existing?.isDefault || defaults?.is_default ? "checked" : ""} /> 设为该阶段默认模板</label><label class="field"><span>标签</span><input name="tags" value="${escapeAttribute((existing?.tags || defaults?.tags || []).join(", "))}" placeholder="分镜大纲, 节奏, JSON" /></label><label class="field"><span>变量</span><input name="variables" value="${escapeAttribute((existing?.variables || defaults?.variables || []).join(", "))}" placeholder="{{script_scene}}" /></label><label class="field"><span>JSON Schema / 输出结构</span><textarea name="json_schema" rows="4">${escapeHtml(existing?.json_schema || existing?.jsonSchema || defaults?.json_schema || "")}</textarea></label><label class="field"><span>提示词正文</span><textarea name="prompt_content" rows="14" required>${escapeHtml(existing?.prompt_content || existing?.promptContent || defaults?.prompt_content || "")}</textarea></label><label class="field"><span>负向约束</span><textarea name="negative_prompt" rows="3">${escapeHtml(existing?.negative_prompt || existing?.negativePrompt || defaults?.negative_prompt || "")}</textarea></label><label class="field"><span>备注</span><textarea name="remark" rows="3">${escapeHtml(existing?.remark || defaults?.remark || "")}</textarea></label><div class="error-text" id="shot-prompt-template-error"></div><div class="toolbar"><button class="btn ghost" type="button" onclick="closeDrawer()">取消</button><button class="btn primary" type="submit">保存分镜提示词</button></div></form></aside>`;
        document.getElementById("shot-prompt-template-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const error = document.getElementById("shot-prompt-template-error");
          await runAdminMutation(event.currentTarget, error, async () => {
            const payload = shotPromptPayloadFromForm(form, existing);
            if (!payload.name || !payload.code) throw new Error("名称和编码不能为空");
            if (!payload.prompt_content || payload.prompt_content.length < 20) throw new Error("分镜提示词正文不能为空，建议不少于 20 字");
            try {
              await api(existing ? `/api/admin/shot-prompt/templates/${encodeURIComponent(existing.id)}` : "/api/admin/shot-prompt/templates", { method: existing ? "PUT" : "POST", headers: { "idempotency-key": `admin-ui-shot-prompt-template-${existing?.id || payload.code}-${Date.now()}` }, body: JSON.stringify(payload) });
              await loadShotPromptTemplates();
            } catch {
              const others = (state.shotPromptTemplates || []).filter((item) => String(item.id) !== String(payload.id));
              state.shotPromptTemplates = [...others, payload];
              persistShotPromptTemplates();
            }
            state.shotPromptStage = payload.stage;
            closeDrawer(); renderShell();
          }, "分镜提示词已保存").catch(() => undefined);
        });
      }
      async function copyShotPromptTemplate(templateId) {
        const existing = shotPromptTemplateById(templateId); if (!existing) return;
        try { await api(`/api/admin/shot-prompt/templates/${encodeURIComponent(templateId)}/copy`, { method: "POST", headers: { "idempotency-key": `admin-ui-shot-prompt-copy-${templateId}-${Date.now()}` }, body: "{}" }); await loadShotPromptTemplates(); }
        catch { state.shotPromptTemplates = [...(state.shotPromptTemplates || []), { ...existing, id: `${existing.id}-copy-${Date.now()}`, name: `${existing.name} 副本`, code: `${existing.code}_copy_${Date.now()}`, is_default: false }]; persistShotPromptTemplates(); }
        renderShell(); showToast("分镜提示词已复制");
      }
      async function toggleShotPromptTemplateStatus(templateId, status) {
        try { await api(`/api/admin/shot-prompt/templates/${encodeURIComponent(templateId)}/status`, { method: "PATCH", headers: { "idempotency-key": `admin-ui-shot-prompt-status-${templateId}-${Date.now()}` }, body: JSON.stringify({ status }) }); await loadShotPromptTemplates(); }
        catch { state.shotPromptTemplates = (state.shotPromptTemplates || []).map((item) => String(item.id) === String(templateId) ? { ...item, status } : item); persistShotPromptTemplates(); }
        renderShell(); showToast(status === "enabled" ? "分镜提示词已启用" : "分镜提示词已停用");
      }
      async function setShotPromptTemplateDefault(templateId) {
        const existing = shotPromptTemplateById(templateId); if (!existing) return;
        const payload = { ...existing, is_default: true, isDefault: true };
        try { await api(`/api/admin/shot-prompt/templates/${encodeURIComponent(templateId)}`, { method: "PUT", headers: { "idempotency-key": `admin-ui-shot-prompt-default-${templateId}-${Date.now()}` }, body: JSON.stringify(payload) }); await loadShotPromptTemplates(); }
        catch { const stage = existing.stage || existing.promptStage || "outline"; state.shotPromptTemplates = setDefaultInList(state.shotPromptTemplates, templateId, (item) => (item.stage || item.promptStage) === stage); persistShotPromptTemplates(); }
        renderShell(); showToast("默认提示词已更新");
      }
      function optionList(options, selected) {
        return options.map((option) => `<option value="${option}" ${option === selected ? "selected" : ""}>${option}</option>`).join("");

        return escapeHtml(value).replaceAll('"', "&quot;");
